<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORICA Auto Nega | Mega Baza 1000+</title>
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --dark: #111; }
        body {
            background: var(--black); color: white; font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }
        .card {
            background: rgba(20, 20, 20, 0.98); padding: 30px; border-radius: 25px;
            border: 1px solid var(--gold); width: 100%; max-width: 500px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        h1 { color: var(--gold); margin: 0; letter-spacing: 5px; text-transform: uppercase; font-size: 32px; font-weight: 800; }
        .subtitle { color: #888; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 25px; }
        .group { text-align: left; margin-bottom: 20px; }
        label { display: block; color: var(--gold); margin-bottom: 8px; font-weight: 600; font-size: 11px; text-transform: uppercase; }
        select {
            width: 100%; padding: 15px; background: var(--dark); color: white;
            border: 1px solid #333; border-radius: 12px; font-size: 16px; outline: none; cursor: pointer;
        }
        .info-box {
            display: none; margin-top: 12px; padding: 12px; 
            background: rgba(212, 175, 55, 0.05); border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 10px; font-size: 13px; color: #ddd; text-align: center; line-height: 1.6;
        }
        .info-box b { color: var(--gold); }
        .services-container {
            background: var(--dark); padding: 15px; border-radius: 12px; border: 1px solid #333;
            display: flex; flex-direction: column; gap: 12px;
        }
        .service-item { display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 15px; }
        input[type="checkbox"] { accent-color: var(--gold); width: 22px; height: 22px; cursor: pointer; }
        .price-box {
            margin: 25px 0; padding: 25px; background: rgba(212, 175, 55, 0.05);
            border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .price-tag { font-size: 48px; color: var(--gold); font-weight: 800; }
        .time-info { color: #00ffcc; font-size: 12px; margin-top: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .btn {
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: black; border: none; padding: 22px; width: 100%;
            border-radius: 15px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 16px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: 0.3s;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(212,175,55,0.2); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
    <h1>KORICA</h1>
    <div class="subtitle">Premium Auto Nega | Sremčica</div>
    
    <div class="group">
        <label>1. Proizvođač</label>
        <select id="markaSel" onchange="azurirajModele()">
            <option value="" selected disabled>Izaberite marku...</option>
        </select>
    </div>

    <div class="group">
        <label>2. Model</label>
        <select id="modelSel" onchange="izracunaj()">
            <option value="">Prvo odaberite marku...</option>
        </select>
        <div id="detaljiVozila" class="info-box"></div>
    </div>

    <div class="group">
        <label>3. Paket održavanja</label>
        <div class="services-container">
            <label class="service-item"><input type="checkbox" id="spolja" onchange="izracunaj()" checked> Spoljašnje pranje (Dekontaminacija)</label>
            <label class="service-item"><input type="checkbox" id="unutra" onchange="izracunaj()" checked> Enterijer (Dubinsko usisavanje i nega)</label>
        </div>
    </div>

    <div class="price-box">
        <div class="price-tag" id="rezultat">0 RSD</div>
        <div id="vreme" class="time-info">--</div>
    </div>

    <button class="btn" onclick="zakazi()">Zakaži termin</button>
</div>

    const cene = { "XS": 1400, "S": 1600, "M": 2000, "L": 2500, "XL": 3500 };
    const opisi = { "XS": "Mini gradski", "S": "Malo vozilo", "M": "Srednje vozilo", "L": "Limuzina / Veći SUV", "XL": "Ekstra veliko / Kombi" };

    function inicijalizuj() {
        const mSel = document.getElementById("markaSel");
        Object.keys(b).sort().forEach(m => {
            let o = document.createElement("option"); o.value = m; o.text = m; mSel.appendChild(o);
        });
    }

    function azurirajModele() {
        const m = document.getElementById("markaSel").value;
        const modSel = document.getElementById("modelSel");
        modSel.innerHTML = '<option value="" disabled selected>Odaberi model...</option>';
        b[m].sort().forEach(mo => {
            let [ime, s, u] = mo.split('|');
            let o = document.createElement("option"); o.value = mo; o.text = ime; modSel.appendChild(o);
        });
        izracunaj();
    }

    function izracunaj() {
        const val = document.getElementById("modelSel").value;
        const info = document.getElementById("detaljiVozila");
        if(!val) { info.style.display = "none"; return; }

        let [ime, katS, katU] = val.split('|');
        info.innerHTML = `Spoljašnost: <b>${opisi[katS]}</b><br>Unutrašnjost: <b>${opisi[katU]}</b>`;
        info.style.display = "block";

        let ukupno = 0;
        let v_min = 0;

        if(document.getElementById("spolja").checked) {
            ukupno += cene[katS] * 0.5;
            v_min += (katS === "XS" ? 25 : katS === "S" ? 30 : katS === "M" ? 40 : katS === "L" ? 50 : 70);
        }
        if(document.getElementById("unutra").checked) {
            ukupno += cene[katU] * 0.5;
            v_min += (katU === "XS" ? 20 : katU === "S" ? 25 : katU === "M" ? 35 : katU === "L" ? 50 : 80);
        }

        document.getElementById("rezultat").innerText = Math.round(ukupno).toLocaleString() + " RSD";
        document.getElementById("vreme").innerText = v_min > 0 ? "Očekivano trajanje: ~" + v_min + " min" : "--";
    }

    function zakazi() {
        const m = document.getElementById("markaSel").value;
        const moRaw = document.getElementById("modelSel").value;
        if(!moRaw) { alert("Molimo odaberite vozilo!"); return; }
        const cena = document.getElementById("rezultat").innerText;
        window.open(`https://docs.google.com/forms/d/e/1FAIpQLSe1ZLTC1otAYCUCuvvZgsE8fOmNQR9JygNXWfyhfViyzA7LeQ/viewform?usp=pp_url&entry.345073777=${encodeURIComponent(m + " " + moRaw.split('|')[0])}&entry.988818818=${encodeURIComponent(cena)}`, '_blank');
    }

    inicijalizuj();
</script>
