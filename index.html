<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>KORICA | Auto nega</title>
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --dark: #121212; --accent: #d4af37; }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--black); color: white; display: flex; justify-content: center; padding: 15px; margin: 0; min-height: 100vh; background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%); }
        
        .card { background: var(--dark); padding: 35px; border-radius: 25px; border: 1px solid rgba(212, 175, 55, 0.3); width: 100%; max-width: 500px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        
        .header { margin-bottom: 30px; }
        h1 { color: var(--gold); margin: 0; letter-spacing: 8px; text-transform: uppercase; font-size: 36px; font-weight: 900; }
        .tagline { color: #fff; font-size: 15px; letter-spacing: 2px; text-transform: uppercase; display: block; margin-top: 5px; }
        .synonym { color: var(--gold); font-size: 10px; text-transform: uppercase; letter-spacing: 4px; margin-top: 4px; opacity: 0.7; }

        .group { text-align: left; margin-bottom: 20px; }
        label { display: block; color: var(--gold); margin-bottom: 8px; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Lepši padajući meni */
        select { 
            width: 100%; padding: 16px; background: #000; color: white; border: 1px solid #333; border-radius: 15px; 
            font-size: 15px; outline: none; appearance: none; cursor: pointer; transition: 0.3s;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23d4af37' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 15px center; background-size: 16px;
        }
        select:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }

        /* Tehnički panel ispod vozila */
        .tech-sheet { 
            background: rgba(0,0,0,0.4); border: 1px solid #222; padding: 20px; border-radius: 15px; 
            margin-bottom: 25px; display: none; /* Skriven dok se ne izabere vozilo */
        }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; }
        .data-label { color: #666; text-transform: uppercase; font-size: 10px; }
        .data-value { color: #fff; font-weight: bold; font-family: 'Courier New', monospace; }

        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .config-btn { 
            background: #111; border: 1px solid #333; padding: 15px; border-radius: 12px; 
            text-align: center; cursor: pointer; font-size: 12px; color: #666; transition: 0.3s; font-weight: bold;
        }
        .config-btn.active { border-color: var(--gold); color: #fff; background: rgba(212, 175, 55, 0.1); }

        .price-section { margin-top: 35px; border-top: 1px solid #222; padding-top: 25px; }
        .price-label { font-size: 10px; color: #555; letter-spacing: 2px; text-transform: uppercase; }
        .price-value { display: block; font-size: 45px; color: var(--gold); font-weight: 900; line-height: 1; margin-top: 5px; }

        .btn-booking { 
            background: linear-gradient(135deg, var(--gold), #b8860b); color: black; border: none; 
            padding: 22px; width: 100%; border-radius: 18px; margin-top: 30px; 
            cursor: pointer; text-transform: uppercase; font-weight: 900; letter-spacing: 2px; transition: 0.3s;
        }
        .btn-booking:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3); }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>KORICA</h1>
        <span class="tagline">Auto nega</span>
        <span class="synonym">Sinonim kvaliteta</span>
    </div>

    <div class="group">
        <label>Marka vozila</label>
        <select id="marka" onchange="updateModels()"></select>
    </div>

    <div class="group">
        <label>Model i godište</label>
        <select id="model" onchange="calculate()"></select>
    </div>

    <div class="tech-sheet" id="techSheet">
        <div class="data-row">
            <span class="data-label">Dužina:</span>
            <span class="data-value" id="val-duzina">-- cm</span>
        </div>
        <div class="data-row">
            <span class="data-label">Širina:</span>
            <span class="data-value" id="val-sirina">-- cm</span>
        </div>
        <div class="data-row">
            <span class="data-label">Vremenski normativ:</span>
            <span class="data-value" id="val-vreme">-- min</span>
        </div>
    </div>

    <div class="group">
        <label>Konfiguracija tretmana</label>
        <div class="config-grid">
            <div class="config-btn active" id="btn-s" onclick="toggle('s')">SPOLJA</div>
            <div class="config-btn active" id="btn-u" onclick="toggle('u')">UNUTRA</div>
        </div>
    </div>

    <div class="price-section">
        <span class="price-label">Obračunata cena</span>
        <span class="price-value" id="final-price">0 RSD</span>
    </div>

    <button class="btn-booking" onclick="sendWA()">Rezerviši termin</button>
</div>

<script>
const db = {
    "Volkswagen": [
        "Golf 7 (2012-2020)|1000|900|425|179|70",
        "Passat B8 (2014-2023)|1100|1000|476|183|90",
        "Passat Variant B8 (Karavan)|1200|1100|477|183|110",
        "Touareg (2018-2024)|1400|1300|487|198|140"
    ],
    "BMW": [
        "Serija 3 G20 (2019-2024)|1100|1000|470|182|90",
        "Serija 5 G30 (2017-2023)|1200|1100|493|186|115",
        "X5 G05 (2018-2024)|1400|1300|492|200|140"
    ],
    "Audi": [
        "A4 B9 (2015-2024)|1100|1000|472|184|90",
        "A6 C8 (2018-2024)|1200|1100|493|188|120",
        "Q7 4M (2015-2024)|1400|1300|506|197|150"
    ],
    "Mercedes-Benz": [
        "C-Klasa W205 (2014-2021)|1100|1000|468|181|90",
        "E-Klasa W213 (2016-2023)|1200|1100|492|185|115",
        "GLE W167 (2019-2024)|1400|1300|492|194|145"
    ]
};

let activeS = true;
let activeU = true;

function init() {
    const mSel = document.getElementById("marka");
    Object.keys(db).sort().forEach(m => mSel.options.add(new Option(m, m)));
    updateModels();
}

function updateModels() {
    const m = document.getElementById("marka").value;
    const modSel = document.getElementById("model");
    modSel.innerHTML = "";
    db[m].forEach((item, index) => modSel.options.add(new Option(item.split('|')[0], index)));
    calculate();
}

function toggle(type) {
    if(type === 's') activeS = !activeS; else activeU = !activeU;
    document.getElementById('btn-s').className = activeS ? 'config-btn active' : 'config-btn';
    document.getElementById('btn-u').className = activeU ? 'config-btn active' : 'config-btn';
    calculate();
}

function calculate() {
    const m = document.getElementById("marka").value;
    const idx = document.getElementById("model").value;
    const [name, pS, pU, len, wid, time] = db[m][idx].split('|');

    let total = 0;
    if(activeS) total += parseInt(pS);
    if(activeU) total += parseInt(pU);
    if((activeS && !activeU) || (!activeS && activeU)) total += 100;

    // Ažuriranje tehničkih podataka i prikaz panela
    document.getElementById("techSheet").style.display = "block";
    document.getElementById("val-duzina").innerText = len + " cm";
    document.getElementById("val-sirina").innerText = wid + " cm";
    
    let currentTime = 0;
    if(activeS) currentTime += (time * 0.6);
    if(activeU) currentTime += (time * 0.4);
    document.getElementById("val-vreme").innerText = Math.round(currentTime) + " min";
    
    document.getElementById("final-price").innerText = total.toLocaleString() + " RSD";
}

function sendWA() {
    const m = document.getElementById("marka").value;
    const mod = document.getElementById("model").options[document.getElementById("model").selectedIndex].text;
    const price = document.getElementById("final-price").innerText;
    window.open(`https://wa.me/38164XXXXXXX?text=KORICA - Rezervacija: ${m} ${mod}. Cena: ${price}.`);
}

window.onload = init;
</script>
</body>
</html>
