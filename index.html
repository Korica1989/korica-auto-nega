<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>KORICA | Auto nega</title>
    <style>
        :root { --gold: #d4af37; --black: #000; --dark: #111; }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--black); 
            color: white; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            margin: 0; 
            min-height: 100vh;
        }

        .card { width: 100%; max-width: 450px; }
        
        .header { 
            margin-bottom: 30px; 
            border-left: 4px solid var(--gold); 
            padding-left: 20px; 
        }
        
        h1 { 
            color: var(--gold); 
            margin: 0; 
            letter-spacing: 10px; 
            text-transform: uppercase; 
            font-size: 38px; 
            font-weight: 900; 
        }
        
        .tagline { 
            color: #fff; 
            font-size: 16px; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            display: block; 
            margin-top: 5px; 
        }
        
        .synonym { 
            color: #fff; 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            display: block; 
            margin-top: 2px; 
        }

        .group { margin-bottom: 25px; }
        
        label { 
            display: block; 
            color: #666; 
            font-size: 10px; 
            text-transform: uppercase; 
            margin-bottom: 10px; 
        }
        
        select { 
            width: 100%; 
            padding: 16px; 
            background: #000; 
            color: white; 
            border: 1px solid #333; 
            border-radius: 0; 
            font-size: 15px; 
            outline: none; 
            appearance: none;
        }

        #main-ui { display: none; }

        .tech-data { 
            margin: 25px 0; 
            padding: 18px; 
            border-top: 1px solid #222; 
            border-bottom: 1px solid #222; 
        }
        
        .data-line { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 10px; 
            font-size: 13px; 
            font-family: monospace; 
        }
        
        .data-label { color: #555; text-transform: uppercase; }
        .data-val { color: var(--gold); }

        .services { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 8px; 
        }
        
        .opt { 
            background: #000; 
            border: 1px solid #222; 
            padding: 18px; 
            text-align: center; 
            cursor: pointer; 
            font-size: 12px; 
            color: #666; 
            font-weight: bold;
            transition: 0.3s; 
        }
        
        .opt.active { 
            border-color: var(--gold); 
            color: #ffffff; 
            background: #111;
        }

        .notice { 
            background: rgba(212, 175, 55, 0.05); 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            padding: 15px; 
            margin-top: 20px; 
            font-size: 11px; 
            color: #ccc; 
            display: none; 
            line-height: 1.5;
        }

        .price-panel { 
            margin-top: 40px; 
            text-align: right; 
            display: none;
        }
        
        .price-label { font-size: 10px; color: #666; text-transform: uppercase; }
        .price-val { display: block; font-size: 45px; color: var(--gold); font-weight: 900; }
        
        .btn { 
            background: var(--gold); 
            color: black; 
            border: none; 
            padding: 22px; 
            width: 100%; 
            margin-top: 30px; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-weight: 900; 
            letter-spacing: 2px; 
            display: none;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>KORICA</h1>
        <span class="tagline">Auto nega</span>
        <span class="synonym">Sinonim kvaliteta</span>
    </div>

    <div class="group">
        <label>Marka vozila</label>
        <select id="marka" onchange="updateModels()">
            <option value="" disabled selected>Izaberite marku...</option>
        </select>
    </div>

    <div class="group">
        <label>Model i godište</label>
        <select id="model" onchange="showUI()">
            <option value="" disabled selected>Prvo izaberite marku...</option>
        </select>
    </div>

    <div id="main-ui">
        <div class="tech-data">
            <div class="data-line"><span class="data-label">Dužina vozila:</span> <span class="data-val" id="len">-- cm</span></div>
            <div class="data-line"><span class="data-label">Širina vozila:</span> <span class="data-val" id="wid">-- cm</span></div>
            <div class="data-line"><span class="data-label">Vremenski normativ:</span> <span class="data-val" id="time">-- min</span></div>
        </div>

        <div class="group">
            <label>Odaberite uslugu odabirom željenog polja</label>
            <div class="services">
                <div class="opt" id="btn-s" onclick="toggle('s')">SPOLJAŠNJOST</div>
                <div class="opt" id="btn-u" onclick="toggle('u')">UNUTRAŠNJOST</div>
            </div>
            <div id="pragovi-notice" class="notice">
                ⚠️ Napomena: Cena pranja će porasti za 100 dinara zbog detaljnog pranja pragova jer se vodi računa o detaljima.
            </div>
        </div>

        <div id="price-panel" class="price-panel">
            <span class="price-label">Cena održavanja</span>
            <span class="price-val" id="total">0 RSD</span>
        </div>

        <button id="booking-btn" class="btn" onclick="sendWA()">Rezerviši termin</button>
    </div>
</div>

<script>
const db = {
    "Audi": [
        "A3 8V (2012-2020)|850|850|431|178|70",
        "A4 B9 (2015-2024)|1000|1000|472|184|85",
        "A6 C8 (2018-2024)|1050|1050|493|188|110"
    ],
    "BMW": [
        "Serija 1|850|850|432|176|70",
        "Serija 3|1000|1000|470|182|85",
        "Serija 5|1050|1050|493|186|110"
    ],
    "Volkswagen": [
        "Polo|750|750|405|175|55",
        "Golf 7|850|850|425|179|65",
        "Passat B8|1000|1000|476|183|85"
    ]
};

let activeS = false, activeU = false;

function init() {
    const mSel = document.getElementById("marka");
    Object.keys(db).sort().forEach(m => mSel.options.add(new Option(m, m)));
}

function updateModels() {
    const m = document.getElementById("marka").value;
    const modSel = document.getElementById("model");
    modSel.innerHTML = '<option value="" disabled selected>Izaberite model...</option>';
    db[m].forEach((item, index) => modSel.options.add(new Option(item.split('|')[0], index)));
    document.getElementById("main-ui").style.display = "none";
}

function showUI() {
    document.getElementById("main-ui").style.display = "block";
    activeS = false; activeU = false;
    updateButtons();
    calculate();
}

function toggle(type) {
    if(type === 's') activeS = !activeS; else activeU = !activeU;
    updateButtons();
    calculate();
}

function updateButtons() {
    document.getElementById('btn-s').className = activeS ? 'opt active' : 'opt';
    document.getElementById('btn-u').className = activeU ? 'opt active' : 'opt';
}

function calculate() {
    const m = document.getElementById("marka").value;
    const idx = document.getElementById("model").value;
    if (idx === "") return;
    const [name, pS, pU, len, wid, time] = db[m][idx].split('|');

    document.getElementById("len").innerText = len + " cm";
    document.getElementById("wid").innerText = wid + " cm";
    
    if (!activeS && !activeU) {
        document.getElementById("price-panel").style.display = "none";
        document.getElementById("booking-btn").style.display = "none";
        document.getElementById("pragovi-notice").style.display = "none";
        return;
    }

    let finalTime = 0;
    if (activeS && activeU) finalTime = time;
    else if (activeS) finalTime = Math.round(time * 0.6);
    else if (activeU) finalTime = Math.round(time * 0.4);
    document.getElementById("time").innerText = finalTime + " min";
    
    let total = 0;
    if(activeS) total += parseInt(pS);
    if(activeU) total += parseInt(pU);
    
    // KLJUČNA ISPRAVKA: Napomena i doplata idu SAMO za Spoljašnjost
    if(activeS && !activeU) {
        total += 100;
        document.getElementById("pragovi-notice").style.display = "block";
    } else {
        document.getElementById("pragovi-notice").style.display = "none";
    }

    document.getElementById("total").innerText = total.toLocaleString() + " RSD";
    document.getElementById("price-panel").style.display = "block";
    document.getElementById("booking-btn").style.display = "block";
}

function sendWA() {
    const m = document.getElementById("marka").value;
    const mod = document.getElementById("model").options[document.getElementById("model").selectedIndex].text;
    const price = document.getElementById("total").innerText;
    window.open(`https://wa.me/38164XXXXXXX?text=KORICA - Rezervacija: ${m} ${mod}. Cena: ${price}.`);
}

window.onload = init;
</script>
</body>
</html>
