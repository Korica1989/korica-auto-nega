    function inicijalizujMarke() {
        const mSel = document.getElementById("markaSel");
        const marke = Object.keys(baza).sort();
        marke.forEach(m => {
            let o = document.createElement("option"); o.value = m; o.text = m; mSel.appendChild(o);
        });
    }

    function azurirajModele() {
        const m = document.getElementById("markaSel").value;
        const modSel = document.getElementById("modelSel");
        modSel.innerHTML = '<option value="" disabled selected>Izaberi model...</option>';
        if(baza[m]) {
            baza[m].sort((a,b)=>a.n.localeCompare(b.n)).forEach(mo => {
                let o = document.createElement("option"); o.value = mo.c; o.text = mo.n; modSel.appendChild(o);
            });
        }
        izracunaj();
    }

    function izracunaj() {
        const mc = parseInt(document.getElementById("modelSel").value);
        const tc = parseFloat(document.getElementById("tretmanSel").value);
        const r = document.getElementById("rezultat");
        if(mc) { r.innerText = (mc * tc).toLocaleString() + " RSD"; } else { r.innerText = "0 RSD"; }
    }

    function zakazi() {
        const m = document.getElementById("markaSel").value;
        const modEl = document.getElementById("modelSel");
        if(modEl.selectedIndex <= 0) { alert("Odaberi auto!"); return; }
        const mo = modEl.options[modEl.selectedIndex].text;
        const c = document.getElementById("rezultat").innerText;
        const bURL = "https://docs.google.com/forms/d/e/1FAIpQLSe1ZLTC1otAYCUCuvvZgsE8fOmNQR9JygNXWfyhfViyzA7LeQ/viewform?usp=pp_url";
        window.open(`${bURL}&entry.345073777=${encodeURIComponent(m + " " + mo)}&entry.988818818=${encodeURIComponent(c)}`, '_blank');
    }

    inicijalizujMarke();
