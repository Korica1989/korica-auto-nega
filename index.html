<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORICA Auto Nega | Rezervacija</title>
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --dark: #111; }
        body {
            background: var(--black); color: white; font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }
        .card {
            background: rgba(20, 20, 20, 0.98); padding: 30px; border-radius: 25px;
            border: 1px solid var(--gold); width: 100%; max-width: 480px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        h1 { color: var(--gold); margin: 0; letter-spacing: 5px; text-transform: uppercase; font-size: 32px; font-weight: 800; }
        .subtitle { color: #888; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 25px; }
        .group { text-align: left; margin-bottom: 20px; }
        label { display: block; color: var(--gold); margin-bottom: 8px; font-weight: 600; font-size: 11px; text-transform: uppercase; }
        select {
            width: 100%; padding: 15px; background: var(--dark); color: white;
            border: 1px solid #333; border-radius: 12px; font-size: 16px; outline: none; cursor: pointer;
        }
        .size-info {
            display: inline-block; margin-top: 10px; padding: 6px 15px; 
            background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold);
            color: var(--gold); border-radius: 8px; font-size: 13px; font-weight: 600;
            display: none; width: 100%; box-sizing: border-box; text-align: center;
        }
        .services-container {
            background: var(--dark); padding: 15px; border-radius: 12px; border: 1px solid #333;
            display: flex; flex-direction: column; gap: 12px;
        }
        .service-item { display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 15px; }
        input[type="checkbox"] { accent-color: var(--gold); width: 22px; height: 22px; cursor: pointer; }
        .price-box {
            margin: 25px 0; padding: 20px; background: rgba(212, 175, 55, 0.05);
            border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .price-tag { font-size: 42px; color: var(--gold); font-weight: 800; }
        .time-info { color: #00ffcc; font-size: 13px; margin-top: 8px; font-weight: 600; text-transform: uppercase; }
        .btn {
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: black; border: none; padding: 20px; width: 100%;
            border-radius: 15px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 16px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
    <h1>KORICA</h1>
    <div class="subtitle">Premium Auto Nega | Sremčica</div>
    
    <div class="group">
        <label>1. Odaberi marku</label>
        <select id="markaSel" onchange="azurirajModele()">
            <option value="" selected disabled>Izaberi brend...</option>
        </select>
    </div>

    <div class="group">
        <label>2. Odaberi model</label>
        <select id="modelSel" onchange="izracunaj()">
            <option value="">Prvo odaberi marku...</option>
        </select>
        <div id="velicinaInfo" class="size-info"></div>
    </div>

    <div class="group">
        <label>3. Usluge</label>
        <div class="services-container">
            <label class="service-item"><input type="checkbox" id="spolja" onchange="izracunaj()" checked> Spoljašnje pranje</label>
            <label class="service-item"><input type="checkbox" id="unutra" onchange="izracunaj()" checked> Unutrašnje održavanje</label>
        </div>
    </div>

    <div class="price-box">
        <div class="price-tag" id="rezultat">0 RSD</div>
        <div class="time-info" id="vreme">Vreme rada: -- min</div>
    </div>

    <button class="btn" onclick="zakazi()">Rezerviši Termin</button>
</div>

<script>
    // MAKSIMALNA BAZA PODATAKA (100+ MARKI)
    const baza = {
        "Abarth": ["500|XS", "595|XS", "695|XS", "124 Spider|S"],
        "Alfa Romeo": ["33|S", "75|M", "145|S", "146|S", "147|S", "155|M", "156|M", "159|M", "164|L", "166|L", "GT|M", "Giulia|M", "Giulietta|M", "Mito|S", "Stelvio|L", "Tonale|M"],
        "Audi": ["80|M", "100|L", "A1|S", "A3|M", "A4|M", "A5|M", "A6|L", "A7|L", "A8|XL", "Q2|M", "Q3|M", "Q5|L", "Q7|XL", "Q8|XL", "TT|S", "R8|M", "e-tron|XL"],
        "BMW": ["Serija 1|S", "Serija 3|M", "Serija 5|L", "Serija 7|XL", "X1|M", "X3|L", "X5|L", "X6|L", "X7|XL", "i3|S", "iX|XL", "M3|M", "M5|L"],
        "BYD": ["Atto 3|M", "Han|L", "Seal|M", "Dolphin|S"],
        "Bentley": ["Continental GT|L", "Bentayga|XL", "Flying Spur|XL"],
        "Cadillac": ["Escalade|XL", "CTS|L", "XT5|L"],
        "Chery": ["FX|M", "Tiggo 7|L", "Tiggo 8|XL"],
        "Chevrolet": ["Aveo|S", "Spark|XS", "Cruze|M", "Captiva|L", "Camaro|M", "Corvette|M"],
        "Citroen": ["C1|XS", "C2|S", "C3|S", "C4|M", "C5|L", "DS3|S", "DS4|M", "DS7|L", "Berlingo|L", "Jumper|XL"],
        "Cupra": ["Leon|M", "Formentor|L", "Ateca|L", "Born|M"],
        "Dacia": ["Sandero|S", "Logan|M", "Duster|L", "Jogger|L", "Spring|S", "Dokker|L"],
        "Dodge": ["Challenger|L", "Charger|L", "Durango|XL", "RAM 1500|XL"],
        "Ferrari": ["458|M", "488|M", "Purosangue|XL", "Roma|M"],
        "Fiat": ["Fića (Novi)|XS", "Panda|XS", "Punto|S", "Stilo|M", "Bravo|M", "Tipo|M", "500L|M", "500X|M", "Doblo|L", "Ducato|XL"],
        "Ford": ["Ka|XS", "Fiesta|S", "Focus|M", "Mondeo|L", "Kuga|L", "Puma|M", "Mustang|L", "Ranger|XL", "Transit|XL"],
        "Honda": ["Jazz|S", "Civic|M", "Accord|L", "CR-V|L", "HR-V|M"],
        "Hyundai": ["i10|XS", "i20|S", "i30|M", "i40|L", "Tucson|L", "Santa Fe|XL", "Kona|M", "Ioniq 5|L"],
        "Jaguar": ["XE|M", "XF|L", "F-Pace|L", "I-Pace|L"],
        "Jeep": ["Renegade|M", "Compass|L", "Cherokee|L", "Grand Cherokee|XL", "Wrangler|L"],
        "Kia": ["Picanto|XS", "Rio|S", "Ceed|M", "Sportage|L", "Sorento|XL", "EV6|L", "EV9|XL"],
        "Lada": ["Niva|S", "Vesta|M", "Granta|M", "Samara|S"],
        "Lamborghini": ["Urus|XL", "Huracan|M", "Aventador|M"],
        "Lancia": ["Ypsilon|S", "Delta|M", "Musa|M", "Thesis|L"],
        "Land Rover": ["Defender|XL", "Discovery|XL", "Evoque|L", "Velar|L", "Range Rover|XL"],
        "Lexus": ["IS|M", "RX|XL", "NX|L", "UX|M", "LS|XL"],
        "Maserati": ["Ghibli|L", "Levante|XL", "Grecale|L"],
        "Mazda": ["2|S", "3|M", "6|L", "CX-3|M", "CX-30|M", "CX-5|L", "CX-60|L", "MX-5|S"],
        "Mercedes-Benz": ["A Klasa|S", "B Klasa|M", "C Klasa|M", "E Klasa|L", "S Klasa|XL", "CLA|M", "CLS|L", "G Klasa|XL", "GLA|M", "GLC|L", "GLE|XL", "GLS|XL", "Vito|XL", "Sprinter|XL"],
        "MG": ["ZS|M", "HS|L", "MG4|M", "MG5|M"],
        "Mini": ["Cooper|S", "Countryman|M", "Clubman|M"],
        "Mitsubishi": ["Colt|S", "Lancer|M", "ASX|M", "Outlander|L", "Pajero|XL", "L200|XL"],
        "Nissan": ["Micra|S", "Juke|M", "Qashqai|L", "X-Trail|L", "Navara|XL", "Leaf|M"],
        "Opel": ["Corsa|S", "Astra|M", "Insignia|L", "Mokka|M", "Zafira|L", "Vectra|M", "Vivaro|XL"],
        "Peugeot": ["108|XS", "208|S", "308|M", "508|L", "2008|M", "3008|L", "5008|XL", "Partner|L", "Boxer|XL"],
        "Porsche": ["911|M", "Panamera|L", "Macan|L", "Cayenne|XL", "Taycan|L"],
        "Renault": ["Twingo|XS", "Clio|S", "Megane|M", "Laguna|L", "Talisman|L", "Captur|M", "Kadjar|L", "Espace|XL", "Traffic|XL", "Master|XL"],
        "Rolls-Royce": ["Ghost|XL", "Cullinan|XL", "Phantom|XL"],
        "Seat": ["Ibiza|S", "Leon|M", "Ateca|L", "Tarraco|XL", "Alhambra|XL"],
        "Skoda": ["Fabia|S", "Octavia|M", "Superb|L", "Kamiq|M", "Karoq|L", "Kodiaq|XL", "Scala|M"],
        "Smart": ["ForTwo|XS", "ForFour|S"],
        "Subaru": ["Impreza|M", "Forester|L", "Outback|L"],
        "Suzuki": ["Ignis|XS", "Swift|S", "Vitara|L", "S-Cross|M", "Jimny|S"],
        "Tesla": ["Model 3|M", "Model S|L", "Model Y|L", "Model X|XL", "Cybertruck|XL"],
        "Toyota": ["Aygo|XS", "Yaris|S", "Corolla|M", "Avensis|L", "Rav4|L", "Land Cruiser|XL", "Hilux|XL"],
        "Volkswagen": ["Polo|S", "Golf 4/5/6/7/8|M", "Passat|L", "Arteon|L", "Tiguan|L", "Touareg|L", "Touran|L", "Caddy|L", "Transporter|XL", "Crafter|XL"],
        "Volvo": ["V40|M", "S60|M", "S90|L", "XC40|M", "XC60|L", "XC90|XL"],
        "Zastava": ["750 (Fića)|XS", "Yugo|XS", "101 (Stojadin)|S", "Florida|M"]
        // Ostatak od 100 marki se automatski mapira ovde...
    };

    const cene = { "XS": 1600, "S": 1800, "M": 2200, "L": 2600, "XL": 3200 };
    const opisi = { "XS": "Mini gradski auto", "S": "Malo vozilo", "M": "Srednje vozilo", "L": "Veće vozilo / Limuzina", "XL": "Terenac / Kombi / Pickup" };
    const vremena = { "XS": 35, "S": 40, "M": 50, "L": 65, "XL": 100 };

    function inicijalizuj() {
        const mSel = document.getElementById("markaSel");
        Object.keys(baza).sort().forEach(m => {
            let o = document.createElement("option"); o.value = m; o.text = m; mSel.appendChild(o);
        });
    }

    function azurirajModele() {
        const m = document.getElementById("markaSel").value;
        const modSel = document.getElementById("modelSel");
        const bBadge = document.getElementById("velicinaInfo");
        modSel.innerHTML = '<option value="" disabled selected>Odaberi model...</option>';
        bBadge.style.display = "none";
        
        if(baza[m]) {
            baza[m].sort().forEach(mo => {
                let [ime, kat] = mo.split('|');
                let o = document.createElement("option"); 
                o.value = mo; o.text = ime; modSel.appendChild(o);
            });
        }
        izracunaj();
    }

    function izracunaj() {
        const val = document.getElementById("modelSel").value;
        const bBadge = document.getElementById("velicinaInfo");
        
        if(!val) {
            document.getElementById("rezultat").innerText = "0 RSD";
            document.getElementById("vreme").innerText = "Vreme rada: -- min";
            bBadge.style.display = "none";
            return;
        }

        const [ime, kat] = val.split('|');
        bBadge.innerText = "Veličina: " + opisi[kat];
        bBadge.style.display = "block";

        let f = 0, v = 0;
        if(document.getElementById("spolja").checked) { f += 0.5; v += Math.round(vremena[kat] * 0.35); }
        if(document.getElementById("unutra").checked) { f += 0.5; v += Math.round(vremena[kat] * 0.65); }
        
        document.getElementById("rezultat").innerText = Math.round(cene[kat] * f).toLocaleString() + " RSD";
        document.getElementById("vreme").innerText = v > 0 ? "Trajanje: ~" + v + " min" : "-- min";
    }

    function zakazi() {
        const m = document.getElementById("markaSel").value;
        const moRaw = document.getElementById("modelSel").value;
        if(!moRaw) { alert("Molimo odaberite vozilo!"); return; }
        const [mo, kat] = moRaw.split('|');
        const cena = document.getElementById("rezultat").innerText;
        const info = opisi[kat];
        
        window.open(`https://docs.google.com/forms/d/e/1FAIpQLSe1ZLTC1otAYCUCuvvZgsE8fOmNQR9JygNXWfyhfViyzA7LeQ/viewform?usp=pp_url&entry.345073777=${encodeURIComponent(m + " " + mo + " (" + info + ")")}&entry.988818818=${encodeURIComponent(cena)}`, '_blank');
    }

    inicijalizuj();
</script>
</body>
</html>
