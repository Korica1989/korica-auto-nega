<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORICA Auto Nega | Pametna Rezervacija</title>
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --dark: #111; }
        body {
            background: var(--black); color: white; font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }
        .card {
            background: rgba(20, 20, 20, 0.98); padding: 30px; border-radius: 25px;
            border: 1px solid var(--gold); width: 100%; max-width: 480px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        h1 { color: var(--gold); margin: 0; letter-spacing: 5px; text-transform: uppercase; font-size: 32px; font-weight: 800; }
        .subtitle { color: #888; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 25px; }
        .group { text-align: left; margin-bottom: 20px; }
        label { display: block; color: var(--gold); margin-bottom: 8px; font-weight: 600; font-size: 11px; text-transform: uppercase; }
        select {
            width: 100%; padding: 15px; background: var(--dark); color: white;
            border: 1px solid #333; border-radius: 12px; font-size: 16px; outline: none; cursor: pointer;
        }
        .info-box {
            display: none; margin-top: 10px; padding: 10px; 
            background: rgba(212, 175, 55, 0.05); border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 8px; font-size: 13px; color: #ddd; text-align: left;
        }
        .info-box b { color: var(--gold); }
        .services-container {
            background: var(--dark); padding: 15px; border-radius: 12px; border: 1px solid #333;
            display: flex; flex-direction: column; gap: 12px;
        }
        .service-item { display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 15px; }
        input[type="checkbox"] { accent-color: var(--gold); width: 22px; height: 22px; cursor: pointer; }
        .price-box {
            margin: 25px 0; padding: 20px; background: rgba(212, 175, 55, 0.05);
            border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .price-tag { font-size: 42px; color: var(--gold); font-weight: 800; }
        .time-info { color: #00ffcc; font-size: 12px; margin-top: 5px; font-weight: 600; text-transform: uppercase; }
        .btn {
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: black; border: none; padding: 20px; width: 100%;
            border-radius: 15px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 16px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>KORICA</h1>
    <div class="subtitle">Auto Nega | Pametno Tarofiranje</div>
    
    <div class="group">
        <label>Marka vozila</label>
        <select id="markaSel" onchange="azurirajModele()">
            <option value="" selected disabled>Izaberite brend...</option>
        </select>
    </div>

    <div class="group">
        <label>Model vozila</label>
        <select id="modelSel" onchange="izracunaj()">
            <option value="">Prvo odaberite marku...</option>
        </select>
        <div id="detaljiVozila" class="info-box"></div>
    </div>

    <div class="group">
        <label>Odaberite tip nege</label>
        <div class="services-container">
            <label class="service-item"><input type="checkbox" id="spolja" onchange="izracunaj()" checked> Spoljašnje pranje (karoserija)</label>
            <label class="service-item"><input type="checkbox" id="unutra" onchange="izracunaj()" checked> Enterijer (kabinski prostor)</label>
        </div>
    </div>

    <div class="price-box">
        <div class="price-tag" id="rezultat">0 RSD</div>
        <div id="vreme" class="time-info">--</div>
    </div>

    <button class="btn" onclick="zakazi()">Rezerviši termin</button>
</div>

<script>
    // Baza: [Ime modela | Kat Spolja | Kat Unutra]
    const baza = {
        "Audi": ["A1|S|S", "A3|M|M", "A4|M|M", "A6|L|L", "A8|XL|XL", "Q3|M|M", "Q5|L|L", "Q7|XL|XL", "Q8|XL|L"],
        "BMW": ["Serija 1|S|S", "Serija 3|M|M", "Serija 5|L|L", "X1|M|M", "X3|L|L", "X5|L|L", "X7|XL|XL"],
        "Mercedes-Benz": ["A Klasa|S|S", "C Klasa|M|M", "E Klasa|L|L", "S Klasa|XL|XL", "GLC|L|L", "GLE|XL|L", "G Klasa|XL|L", "Sprinter|XL|XL"],
        "Volkswagen": ["Polo|S|S", "Golf|M|M", "Passat|L|M", "Tiguan|L|M", "Touran|L|XL", "Caddy|L|L", "Crafter|XL|XL"],
        "Tesla": ["Model 3|M|M", "Model S|L|L", "Model Y|L|L", "Model X|XL|XL", "Cybertruck|XL|S"],
        "Ford": ["Fiesta|S|S", "Focus|M|M", "Kuga|L|M", "Ranger|XL|S", "Transit|XL|XL"],
        "Toyota": ["Yaris|S|S", "Corolla|M|M", "Rav4|L|L", "Land Cruiser|XL|L", "Hilux|XL|S"],
        "Zastava": ["750 Fića|XS|XS", "Yugo|XS|XS", "101 Stojadin|S|S"]
        // ... ovde dodaješ ostale po istom principu
    };

    const cene = { "XS": 1400, "S": 1600, "M": 2000, "L": 2500, "XL": 3500 };
    const opisi = { "XS": "Mini", "S": "Malo", "M": "Srednje", "L": "Veliko", "XL": "Ekstra veliko" };

    function inicijalizuj() {
        const mSel = document.getElementById("markaSel");
        Object.keys(baza).sort().forEach(m => {
            let o = document.createElement("option"); o.value = m; o.text = m; mSel.appendChild(o);
        });
    }

    function azurirajModele() {
        const m = document.getElementById("markaSel").value;
        const modSel = document.getElementById("modelSel");
        modSel.innerHTML = '<option value="" disabled selected>Odaberi model...</option>';
        baza[m].sort().forEach(mo => {
            let [ime, s, u] = mo.split('|');
            let o = document.createElement("option"); o.value = mo; o.text = ime; modSel.appendChild(o);
        });
        izracunaj();
    }

    function izracunaj() {
        const val = document.getElementById("modelSel").value;
        const info = document.getElementById("detaljiVozila");
        if(!val) { info.style.display = "none"; return; }

        let [ime, katS, katU] = val.split('|');
        info.innerHTML = `Spoljašnost: <b>${opisi[katS]}</b><br>Kabina: <b>${opisi[katU]}</b>`;
        info.style.display = "block";

        let ukupno = 0;
        if(document.getElementById("spolja").checked) ukupno += cene[katS] * 0.5;
        if(document.getElementById("unutra").checked) ukupno += cene[katU] * 0.5;

        document.getElementById("rezultat").innerText = Math.round(ukupno).toLocaleString() + " RSD";
        document.getElementById("vreme").innerText = "Personalizovana cena na osnovu dimenzija";
    }

    function zakazi() {
        // Logika za slanje na Google Formu sa svim podacima
        const marka = document.getElementById("markaSel").value;
        const modelRaw = document.getElementById("modelSel").value;
        if(!modelRaw) { alert("Izaberite auto!"); return; }
        const cena = document.getElementById("rezultat").innerText;
        window.open(`https://docs.google.com/forms/d/e/1FAIpQLSe1ZLTC1otAYCUCuvvZgsE8fOmNQR9JygNXWfyhfViyzA7LeQ/viewform?usp=pp_url&entry.345073777=${encodeURIComponent(marka + " " + modelRaw)}&entry.988818818=${encodeURIComponent(cena)}`, '_blank');
    }

    inicijalizuj();
</script>
</body>
</html>
