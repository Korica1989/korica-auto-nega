        "A / B Klasa": [["Sve generacije|800|750|55|Kompakt|Hatchback"]],
        "C Klasa": [["Limuzina (Sve gen.)|1000|900|75|4.70m|Limuzina"], ["Karavan|1100|1000|85|Karavan"]],

        "Land Cruiser": [["V8 / Prado|1600|1500|130|Maksimalni gabariti|SUV"]]
    }
    // ... i tako dalje za svih 100 marki
};

function calculate() {
    const m = document.getElementById("markaSel").value;
    const mod = document.getElementById("modelSel").value;
    const genIdx = document.getElementById("genSel").value;
    
    if (genIdx === "") return;

    const entry = data[m][mod][genIdx][0].split('|');
    const cS = parseInt(entry[1]);
    const cU = parseInt(entry[2]);
    const min = parseInt(entry[3]);

    let ukupno = 0;
    const isSpolja = document.getElementById("spolja").checked;
    const isUnutra = document.getElementById("unutra").checked;

    if(isSpolja) ukupno += cS;
    if(isUnutra) ukupno += cU;
    
    // KORICA LOGIKA: Pragovi +100 ako ide SAMO SPOLJA
    if(isSpolja && !isUnutra) {
        ukupno += 100;
        document.getElementById("pragoviNote").style.display = "block";
    } else {
        document.getElementById("pragoviNote").style.display = "none";
    }

    document.getElementById("rezultat").innerText = ukupno.toLocaleString() + " RSD";
    document.getElementById("vreme").innerText = "~" + min + " MINUTA";
}
</script>
