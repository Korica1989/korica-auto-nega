<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORICA Auto Nega | Premium Detailing</title>
    <style>
        :root {
            --gold: #d4af37;
            --black: #050505;
        }

        body {
            background-color: var(--black);
            /* Tamna pozadina sa teksturom */
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            position: relative;
            /* Slika Hrama je sada fiksirana UNUTAR kalkulatora kao pozadina */
            background: linear-gradient(rgba(10, 10, 10, 0.7), rgba(10, 10, 10, 0.7)), 
                        url('https://upload.wikimedia.org/wikipedia/commons/5/52/Hram_Svetog_Save_no%C4%87u.jpg');
            background-size: cover;
            background-position: center;
            padding: 40px;
            border-radius: 24px;
            border: 2px solid var(--gold);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            width: 100%;
            max-width: 420px;
            text-align: center;
            overflow: hidden;
        }

        /* Dodatni sjaj da slova budu čitljiva preko slike */
        .logo-area h1 { 
            color: var(--gold); 
            margin: 0; 
            font-size: 38px; 
            letter-spacing: 6px; 
            font-weight: 800;
            text-shadow: 0 0 15px rgba(0,0,0,1), 0 0 5px rgba(212, 175, 55, 0.5);
        }

        .subtitle { 
            color: #fff; 
            font-size: 13px; 
            letter-spacing: 4px; 
            text-transform: uppercase;
            margin-top: 5px;
            text-shadow: 2px 2px 4px #000;
        }

        .group { text-align: left; margin-bottom: 25px; position: relative; z-index: 2; }
        label { display: block; margin-bottom: 10px; color: var(--gold); font-size: 13px; font-weight: 600; text-transform: uppercase; }

        select {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--gold);
            color: #fff;
            border-radius: 12px;
            outline: none;
            font-size: 15px;
        }

        .price-container {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 15px;
            padding: 20px;
            margin: 30px 0;
            border: 1px solid rgba(212, 175, 55, 0.4);
            position: relative;
            z-index: 2;
        }

        .price-tag {
            font-size: 44px;
            font-weight: 700;
            color: var(--gold);
            margin: 0;
            text-shadow: 0 0 10px rgba(0,0,0,1);
        }

        .order-btn {
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: black;
            border: none;
            padding: 20px;
            width: 100%;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            font-size: 16px;
            text-transform: uppercase;
            position: relative;
            z-index: 2;
        }

        .info-text { font-size: 11px; color: #fff; margin-top: 20px; text-shadow: 1px 1px 3px #000; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
    <div class="logo-area">
        <h1>KORICA</h1>
        <div class="subtitle">Auto Nega Sremčica</div>
    </div>

    <div class="group">
        <label>Vozilo</label>
        <select id="auto">
            <option value="0" disabled selected>Izaberi vozilo...</option>
            <option value="1800">Malo vozilo</option>
            <option value="2000">Srednje vozilo</option>
            <option value="2300">Limuzina/Karavan</option>
            <option value="2600">Džip/SUV</option>
            <option value="3200">Kombi / Lux</option>
        </select>
    </div>

    <div class="group">
        <label>Tretman</label>
        <select id="tretman">
            <option value="1">Standard</option>
            <option value="1.5">Premium</option>
            <option value="2.5">Deep Clean</option>
        </select>
    </div>

    <div class="price-container">
        <div class="price-tag" id="displayCena">0 RSD</div>
    </div>

    <button class="order-btn" onclick="zakazi()">Rezerviši</button>
    
    <div class="info-text">BEOGRAD - SREMČICA</div>
</div>

<script>
    const autoEl = document.getElementById('auto');
    const tretmanEl = document.getElementById('tretman');
    const display = document.getElementById('displayCena');

    function osveziCenu() {
        const baza = parseInt(autoEl.value);
        const mnozilac = parseFloat(tretmanEl.value);
        if (baza > 0) {
            const ukupno = baza * mnozilac;
            display.innerText = ukupno.toLocaleString() + " RSD";
        }
    }

    autoEl.addEventListener('change', osveziCenu);
    tretmanEl.addEventListener('change', osveziCenu);

    function zakazi() {
        const cena = display.innerText;
        const model = autoEl.options[autoEl.selectedIndex].text;
        if (cena === "0 RSD" || autoEl.value === "0") {
            alert("Izaberite vozilo.");
            return;
        }
        const baseURL = "https://docs.google.com/forms/d/e/1FAIpQLSe1ZLTC1otAYCUCuvvZgsE8fOmNQR9JygNXWfyhfViyzA7LeQ/viewform?usp=pp_url";
        const finalURL = `${baseURL}&entry.345073777=${encodeURIComponent(model)}&entry.988818818=${encodeURIComponent(cena)}`;
        window.open(finalURL, '_blank');
    }
</script>

</body>
</html>
