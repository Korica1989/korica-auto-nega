<script>
    const vehicleDB = {
        // Format: "Model|Koef_Spolja|Koef_Unutra"
        "Audi": [
            "A3 8V|1.1|1.1", 
            "A4 B9|1.2|1.2", 
            "A6 C8|1.4|1.4", 
            "Q7 4M|1.8|2.2" // Ovde enterijer vuče više zbog kvadrature i 7 sedišta
        ],
        "BMW": [
            "Serija 1|1.0|1.0", 
            "Serija 3 G20|1.2|1.2", 
            "Serija 5 G30|1.4|1.4", 
            "X5 G05|1.8|2.0"
        ],
        "Mercedes": [
            "A-Klasa|1.0|1.0", 
            "C-Klasa|1.2|1.2", 
            "E-Klasa|1.5|1.5", 
            "GLE V167|1.8|2.1"
        ],
        "Volkswagen": [
            "Golf 8|1.1|1.1", 
            "Passat B8|1.3|1.3", 
            "Tiguan|1.5|1.6", 
            "Touareg CR|1.8|2.0"
        ]
    };

    const CENA_SPOLJA = 900;
    const CENA_UNUTRA = 800;
    const DOPLATA_KORICA = 100; // Za "Sinonim Kvaliteta"

    function kalkulacija() {
        const marka = document.getElementById('brand-select').value;
        const modelIdx = document.getElementById('model-select').value;
        const checkSpolja = document.getElementById('check-spolja').checked;
        const checkUnutra = document.getElementById('check-unutra').checked;

        if(!marka || modelIdx === "" || (!checkSpolja && !checkUnutra)) return;

        const podaci = vehicleDB[marka][modelIdx].split('|');
        const ks = parseFloat(podaci[1]); // Koef spolja
        const ku = parseFloat(podaci[2]); // Koef unutra

        let finalnaCena = 0;

        if(checkSpolja) finalnaCena += CENA_SPOLJA * ks;
        if(checkUnutra) finalnaCena += CENA_UNUTRA * ku;

        // "KORICA" dodatak ako se uzme samo spolja
        if(checkSpolja && !checkUnutra) {
            finalnaCena += DOPLATA_KORICA;
            document.getElementById('napomena').innerText = "U cenu je uračunata obavezna Koch-Chemie zaštita laka.";
        } else {
            document.getElementById('napomena').innerText = "";
        }

        // Zaokruživanje na najbližih 50 dinara radi lakše naplate
        let zaokruzeno = Math.ceil(finalnaCena / 50) * 50;
        document.getElementById('prikaz-cene').innerText = zaokruzeno + " RSD";
    }
</script>
