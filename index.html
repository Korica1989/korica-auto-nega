<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>KORICA Auto Nega | Rezervacija</title>
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --dark: #111; }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--black); color: white; display: flex; justify-content: center; padding: 15px; margin: 0; min-height: 100vh; background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%); }
        .card { background: rgba(15, 15, 15, 0.98); padding: 25px; border-radius: 25px; border: 1px solid var(--gold); width: 100%; max-width: 500px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        h1 { color: var(--gold); margin: 0; letter-spacing: 6px; text-transform: uppercase; font-size: 32px; font-weight: 900; }
        .subtitle { color: #888; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 25px; }
        .group { text-align: left; margin-bottom: 20px; }
        label { display: block; color: var(--gold); margin-bottom: 8px; font-weight: 600; font-size: 11px; text-transform: uppercase; }
        select { width: 100%; padding: 15px; background: var(--dark); color: white; border: 1px solid #333; border-radius: 12px; font-size: 15px; outline: none; appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23d4af37' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 15px center; background-size: 14px; }
        .services { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .service-item { background: #111; padding: 16px; border-radius: 12px; border: 1px solid #333; display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 14px; }
        .price-box { margin: 30px 0; padding: 25px; background: rgba(212, 175, 55, 0.03); border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.1); }
        .price-tag { font-size: 48px; color: var(--gold); font-weight: 900; display: block; }
        .btn { background: linear-gradient(135deg, var(--gold), #b8860b); color: black; border: none; padding: 20px; width: 100%; border-radius: 18px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 16px; }
    </style>
</head>
<body>

<div class="card">
    <h1>KORICA</h1>
    <div class="subtitle">Premium Auto Nega | Sremčica</div>
    
    <div class="group">
        <label>1. Izaberite Marku</label>
        <select id="markaSel" onchange="updateModels()">
            <option value="" disabled selected>Marka vozila...</option>
        </select>
    </div>

    <div class="group">
        <label>2. Model i Karoserija</label>
        <select id="modelSel" onchange="calculate()">
            <option value="" disabled selected>Prvo izaberite marku...</option>
        </select>
    </div>

    <div class="group">
        <label>3. Usluge</label>
        <div class="services">
            <label class="service-item"><input type="checkbox" id="spolja" checked onchange="calculate()"> Spolja</label>
            <label class="service-item"><input type="checkbox" id="unutra" checked onchange="calculate()"> Unutra</label>
        </div>
    </div>

    <div class="price-box">
        <div class="price-tag" id="rezultat">0 RSD</div>
        <div id="vreme" style="color: #00ffcc; font-size: 12px; margin-top: 5px;">Spreman</div>
    </div>

    <button class="btn" onclick="sendWA()">Rezerviši termin</button>
</div>

<script>
// Format: [Prikaz u meniju|CenaSpolja|CenaUnutra|Minuti]
const data = {
    "Volkswagen": [
        "Golf (Limuzina/Hatch)|950|850|65",
        "Passat (Limuzina)|1000|900|85",
        "Passat Variant (Karavan)|1050|950|100",
        "Touareg (SUV)|1300|1200|130",
        "Tiguan (SUV)|1200|1100|90",
        "T5/T6 Multivan (Kombi)|1500|1300|120"
    ],
    "BMW": [
        "Serija 1 (Hatchback)|950|850|60",
        "Serija 3 (Limuzina)|1000|900|85",
        "Serija 3 Touring (Karavan)|1050|950|100",
        "Serija 5 (Limuzina)|1150|1050|115",
        "Serija 5 Touring (Karavan)|1100|900|125",
        "X5 / X6 (SUV)|1300|1200|130"
    ],
    "Audi": [
        "A3 (Sportback/Lim)|950|850|65",
        "A4 (Limuzina)|1000|900|85",
        "A4 Avant (Karavan)|1050|950|100",
        "A6 (Limuzina)|1100|1000|110",
        "A6 Avant (Karavan)|1100|900|120",
        "Q7 / Q8 (SUV)|1300|1200|130"
    ],
    "Mercedes-Benz": [
        "A / B Klasa|950|850|60",
        "C-Klasa (Limuzina)|1000|900|90",
        "C-Klasa T (Karavan)|1050|950|100",
        "E-Klasa (Limuzina)|1150|1050|115",
        "GLE / GLS (SUV)|1300|1200|140",
        "Vito / V-Klasa (Kombi)|1500|1300|120"
    ],
    "Skoda": [
        "Fabia|950|850|55",
        "Octavia (Limuzina)|1000|900|85",
        "Octavia Combi (Karavan)|1050|950|100",
        "Superb Combi (Karavan)|1050|950|115",
        "Kodiaq (SUV)|1250|1150|110"
    ]
};

function init() {
    const mSel = document.getElementById("markaSel");
    Object.keys(data).sort().forEach(m => { mSel.options.add(new Option(m, m)); });
}

function updateModels() {
    const m = document.getElementById("markaSel").value;
    const modSel = document.getElementById("modelSel");
    modSel.innerHTML = "";
    data[m].forEach((item, index) => {
        modSel.options.add(new Option(item.split('|')[0], index));
    });
    calculate();
}

function calculate() {
    const m = document.getElementById("markaSel").value;
    const idx = document.getElementById("modelSel").value;
    if (!m || idx === "") return;

    const [ime, cS, cU, min] = data[m][idx].split('|');
    const isS = document.getElementById("spolja").checked;
    const isU = document.getElementById("unutra").checked;
    
    let total = 0;
    if (isS) total += parseInt(cS);
    if (isU) total += parseInt(cU);
    if (isS && !isU) total += 100; // KORICA Standard pragovi

    document.getElementById("rezultat").innerText = total.toLocaleString() + " RSD";
    document.getElementById("vreme").innerText = "~" + min + " MINUTA RADA";
}

function sendWA() {
    const m = document.getElementById("markaSel").value;
    const mod = document.getElementById("modelSel").options[document.getElementById("modelSel").selectedIndex].text;
    const cena = document.getElementById("rezultat").innerText;
    const msg = `Pozdrav Korica! Rezervisao bih pranje: ${m} ${mod}. Cena: ${cena}.`;
    window.open(`https://wa.me/38164XXXXXXX?text=${encodeURIComponent(msg)}`);
}

window.onload = init;
</script>
</body>
</html>
