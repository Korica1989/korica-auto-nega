<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>KORICA | Expert System</title>
    <style>
        :root { --gold: #d4af37; --black: #000; --dark: #0a0a0a; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--black); color: white; padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; background: #050505; border: 1px solid #222; padding: 30px; border-radius: 10px; }
        .header { border-left: 5px solid var(--gold); padding-left: 15px; margin-bottom: 30px; }
        h1 { color: var(--gold); margin: 0; letter-spacing: 5px; text-transform: uppercase; font-size: 26px; }
        .section { margin-bottom: 20px; }
        label { display: block; color: #555; font-size: 11px; text-transform: uppercase; margin-bottom: 8px; }
        select { width: 100%; padding: 15px; background: #111; color: white; border: 1px solid #333; border-radius: 5px; font-size: 16px; outline: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        .card { background: #111; border: 1px solid #333; padding: 12px; border-radius: 5px; text-align: center; cursor: pointer; font-size: 11px; font-weight: bold; color: #666; }
        .card.active { border-color: var(--gold); color: var(--gold); background: #1a160a; }
        .addon { margin-top: 15px; display: none; padding: 15px; border: 1px dashed #444; justify-content: space-between; align-items: center; }
        .result-box { margin-top: 30px; padding: 20px; background: #0a0a0a; border: 1px solid var(--gold); text-align: center; display: none; }
        .price { font-size: 42px; color: var(--gold); font-weight: 900; display: block; }
        .time { color: #888; font-size: 14px; margin-top: 5px; display: block; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header"><h1>KORICA</h1><small style="color:var(--gold)">SINONIM KVALITETA</small></div>
    
    <div class="section">
    <label>Marka vozila</label>
    <select id="marka" onchange="fillModels()">
        <option value="" disabled selected>Učitavanje marki...</option>
    </select>
</div>

<div class="section">
    <label>Model i generacija</label>
    <select id="model" onchange="calculate()">
        <option value="" disabled selected>Prvo izaberi marku</option>
    </select>
</div>

    <div class="section">
        <label>Odaberi uslugu</label>
        <div class="grid">
            <div class="card" id="btn-spolja" onclick="setMode('spolja')">SPOLJA</div>
            <div class="card" id="btn-unutra" onclick="setMode('unutra')">UNUTRA</div>
            <div class="card" id="btn-komplet" onclick="setMode('komplet')">KOMPLET</div>
        </div>
    </div>

    <div class="addon" id="pragovi-div">
        <span style="font-size: 12px;">Doplata za pragove (+200 RSD)</span>
        <input type="checkbox" id="pragovi-check" onchange="calculate()" style="width:20px; height:20px; accent-color:var(--gold)">
    </div>

    <div class="result-box" id="results">
        <span style="font-size: 10px; color: #555; letter-spacing: 2px;">UKUPNO ZA NAPLATU</span>
        <span class="price" id="res-price">0 RSD</span>
        <span class="time" id="res-time">Vreme: -- min</span>
        <div style="margin-top: 10px; font-size: 11px; color: #444;" id="res-dim"></div>
    </div>
</div>

            "Lancer X|457|176|1.20", "ASX|430|177|1.35", "Outlander G3|465|180|1.60", "Pajero V80|490|187|1.95", "L200|520|181|2.10"
        ],
        "Chevrolet": [
            "Aveo T300|404|173|1.00", "Cruze Sedan|460|179|1.25", "Captiva|467|185|1.65", "Spark M300|364|160|0.75", "Orlando|465|183|1.50"
   }; // Ovde se završava tvoja masterDB baza

    // --- KLJUČNA LOGIKA I AKTIVACIJA ---
    let currentMode = '';
    const cene = { spolja: 800, unutra: 800, komplet: 1500 };
    const vremena = { spolja: 30, unutra: 35, komplet: 60 };

    function initApp() {
        const s = document.getElementById('marka');
        if(!s) return;
        s.innerHTML = '<option value="" disabled selected>Izaberi marku...</option>';
        Object.keys(masterDB).sort().forEach(m => {
            s.options.add(new Option(m, m));
        });
    }

    // Aktiviraj bazu čim se stranica učita
    window.onload = initApp;

    function fillModels() {
        const m = document.getElementById('marka').value;
        const s = document.getElementById('model');
        if(!s) return;
        s.innerHTML = '<option value="" disabled selected>Izaberi model...</option>';
        if(masterDB[m]) {
            masterDB[m].forEach((item, idx) => {
                s.options.add(new Option(item.split('|')[0], idx));
            });
        }
        document.getElementById('results').style.display = 'none';
    }

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        const btn = document.getElementById('btn-' + mode);
        if(btn) btn.classList.add('active');
        const pragoviDiv = document.getElementById('pragovi-div');
        if(pragoviDiv) pragoviDiv.style.display = (mode === 'spolja') ? 'flex' : 'none';
        calculate();
    }

    function calculate() {
        const m = document.getElementById('marka').value;
        const i = document.getElementById('model').value;
        if(!m || i === "" || !currentMode) return;

        const data = masterDB[m][i].split('|');
        const koef = parseFloat(data[3]);
        
        let finalPrice = Math.round(cene[currentMode] * koef);
        let finalTime = Math.round(vremena[currentMode] * koef);

        const pragoviCheck = document.getElementById('pragovi-check');
        if(currentMode === 'spolja' && pragoviCheck && pragoviCheck.checked) {
            finalPrice += 200;
            finalTime += 5;
        }

        document.getElementById('res-price').innerText = finalPrice + " RSD";
        document.getElementById('res-time').innerText = "Vreme rada: cca " + finalTime + " min";
        document.getElementById('res-dim').innerText = "Gabariti: " + data[1] + "x" + data[2] + " cm";
        document.getElementById('results').style.display = "block";
    }

    // Sigurnosni okidač - ako window.onload zakaže
    document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
