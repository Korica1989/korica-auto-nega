<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORICA Auto Nega | Rezervacija</title>
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --dark: #111; }
        body {
            background: var(--black); color: white; font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }
        .card {
            background: rgba(20, 20, 20, 0.98); padding: 35px; border-radius: 30px;
            border: 1px solid var(--gold); width: 100%; max-width: 480px; text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
        }
        h1 { color: var(--gold); margin: 0; letter-spacing: 6px; text-transform: uppercase; font-size: 34px; font-weight: 800; }
        .subtitle { color: #888; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 30px; }
        
        .group { text-align: left; margin-bottom: 22px; }
        label { display: block; color: var(--gold); margin-bottom: 10px; font-weight: 600; font-size: 12px; text-transform: uppercase; }
        
        select {
            width: 100%; padding: 16px; background: var(--dark); color: white;
            border: 1px solid #333; border-radius: 14px; font-size: 16px; outline: none;
        }
        
        .info-tag {
            display: none; margin-top: 12px; padding: 15px; 
            background: rgba(212, 175, 55, 0.07); border-left: 4px solid var(--gold);
            border-radius: 4px 12px 12px 4px; font-size: 13px; color: #eee; text-align: left;
        }

        .services-container {
            background: var(--dark); padding: 18px; border-radius: 14px; border: 1px solid #333;
            display: flex; flex-direction: column; gap: 14px;
        }
        .service-item { display: flex; align-items: center; gap: 14px; cursor: pointer; font-size: 15px; }
        input[type="checkbox"] { accent-color: var(--gold); width: 22px; height: 22px; cursor: pointer; }

        .note-box {
            display: none; margin-top: 15px; padding: 15px; 
            background: rgba(0, 255, 204, 0.05); border: 1px dashed #00ffcc;
            border-radius: 12px; font-size: 12px; color: #00ffcc; text-align: left; line-height: 1.5;
        }

        .price-box {
            margin: 25px 0; padding: 25px; background: rgba(212, 175, 55, 0.03);
            border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .price-tag { font-size: 48px; color: var(--gold); font-weight: 800; }
        .time-info { color: #00ffcc; font-size: 13px; margin-top: 12px; font-weight: 600; text-transform: uppercase; }

        .btn {
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: black; border: none; padding: 20px; width: 100%;
            border-radius: 16px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 16px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
    <h1>KORICA</h1>
    <div class="subtitle">Auto Nega | Sremčica</div>
    
    <div class="group">
        <label>1. Odaberi vozilo</label>
        <select id="markaSel" onchange="azurirajModele()"></select>
        <select id="modelSel" onchange="izracunaj()" style="margin-top:10px;"></select>
        <div id="detalji" class="info-tag"></div>
    </div>

    <div class="group">
        <label>2. Vrsta tretmana</label>
        <div class="services-container">
            <label class="service-item"><input type="checkbox" id="spolja" onchange="izracunaj()" checked> Nega karoserije (Eksterijer)</label>
            <label class="service-item"><input type="checkbox" id="unutra" onchange="izracunaj()" checked> Nega kabine (Enterijer)</label>
        </div>
        <div id="pragoviNote" class="note-box">
            ✨ <b>KORICA Standard:</b> Budući da se radi samo spoljašnost, u cenu smo uključili i detaljno čišćenje pragova (+100 RSD). Ne želimo da bilo koji detalj ostane zapostavljen, kako bi Vaš ulazak u čist automobil bio potpun.
        </div>
    </div>

    <div class="price-box">
        <div class="price-tag" id="rezultat">0 RSD</div>
        <div class="time-info" id="vreme">Spreman za rad</div>
    </div>

    <button class="btn" onclick="zakazi()">Rezerviši termin</button>
</div>

<script>
    const baza = {
        "Audi": ["A1|700|500|40", "A3|800|600|50", "A4|1000|800|60", "A6|1100|900|70", "A8|1400|1200|90"],
        "BMW": ["Serija 1|800|600|45", "Serija 3|900|700|55", "Serija 5|1100|900|70", "Serija 7|1400|1200|90"],
        "Mercedes-Benz": ["A Klasa|800|600|45", "C Klasa|1000|800|60", "E Klasa|1100|900|70", "S Klasa|1400|1200|90"],
        "Volkswagen": ["Polo|700|500|40", "Golf|850|650|50", "Passat|1000|800|65"],
        "Skoda": ["Fabia|700|500|40", "Octavia|900|700|55", "Superb|1100|900|70"],
        "Zastava": ["Yugo|500|400|30", "Fića|400|300|25"]
    };

    function inicijalizuj() {
        const mSel = document.getElementById("markaSel");
        mSel.innerHTML = '<option value="" disabled selected>Marka vozila...</option>';
        Object.keys(baza).sort().forEach(m => {
            let o = document.createElement("option"); o.value = m; o.text = m; mSel.appendChild(o);
        });
    }

    function azurirajModele() {
        const m = document.getElementById("markaSel").value;
        const modSel = document.getElementById("modelSel");
        modSel.innerHTML = '<option value="" disabled selected>Model...</option>';
        baza[m].sort().forEach(mo => {
            let [ime] = mo.split('|');
            let o = document.createElement("option"); o.value = mo; o.text = ime; modSel.appendChild(o);
        });
        izracunaj();
    }

    function izracunaj() {
        const val = document.getElementById("modelSel").value;
        const det = document.getElementById("detalji");
        const note = document.getElementById("pragoviNote");
        
        if(!val) {
            document.getElementById("rezultat").innerText = "0 RSD";
            document.getElementById("vreme").innerText = "Spreman";
            det.style.display = "none";
            return;
        }

        let [ime, cS, cU, min] = val.split('|');
        const isSpolja = document.getElementById("spolja").checked;
        const isUnutra = document.getElementById("unutra").checked;
        
        let ukupno = 0;
        let t = 0;
        let analizaText = "";

        if(isSpolja) { 
            ukupno += parseInt(cS); 
            t += parseInt(min) * 0.5;
            analizaText += `Nega karoserije: <b>${cS} RSD</b>`;
        }
        
        if(isUnutra) { 
            ukupno += parseInt(cU); 
            t += parseInt(min) * 0.5;
            analizaText += (analizaText ? " + " : "") + `Nega kabine: <b>${cU} RSD</b>`;
        }

        if(isSpolja && !isUnutra) {
            ukupno += 100;
            note.style.display = "block";
            analizaText += ` + Čišćenje pragova: <b>100 RSD</b>`;
            if(t < 30) t = 30; 
        } else {
            note.style.display = "none";
        }

        det.style.display = "block";
        det.innerHTML = `Analiza za ${ime}: <br>${analizaText}`;

        document.getElementById("rezultat").innerText = ukupno.toLocaleString() + " RSD";
        document.getElementById("vreme").innerText = t > 0 ? "Okvirno vreme: ~" + Math.round(t) + " min" : "Spreman";
    }

    function zakazi() {
        const m = document.getElementById("markaSel").value;
        const moRaw = document.getElementById("modelSel").value;
        if(!moRaw) { alert("Odaberite vozilo."); return; }
        const cena = document.getElementById("rezultat").innerText;
        window.open(`https://docs.google.com/forms/d/e/1FAIpQLSe1ZLTC1otAYCUCuvvZgsE8fOmNQR9JygNXWfyhfViyzA7LeQ/viewform?usp=pp_url&entry.345073777=${encodeURIComponent(m + " " + moRaw.split('|')[0])}&entry.988818818=${encodeURIComponent(cena)}`, '_blank');
    }

    inicijalizuj();
</script>
</body>
</html>
