<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>KORICA Auto Nega</title>
    <style>
        :root { --gold: #d4af37; --black: #000; --dark: #0f0f0f; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { background: var(--black); color: white; -webkit-tap-highlight-color: transparent; }

        /* JEDNOSTAVAN I MOĆAN HEADER */
        .header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #1a1a1a, var(--black));
            border-bottom: 1px solid #222;
        }

        .header h1 {
            font-size: 28px;
            letter-spacing: 5px;
            color: var(--gold);
            text-transform: uppercase;
            font-weight: 900;
        }

        .header p {
            font-size: 14px;
            letter-spacing: 3px;
            color: #ccc;
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* MOBILNA FORMA */
        .content { padding: 20px; max-width: 500px; margin: 0 auto; }

        .form-group { margin-bottom: 20px; }
        label { display: block; color: #666; font-size: 11px; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; }
        
        select { 
            width: 100%; padding: 16px; background: var(--dark); color: white; border: 1px solid #333; 
            border-radius: 8px; font-size: 16px; outline: none; appearance: none;
        }

        /* VELIKA DUGMAD ZA MOBILNI */
        .btn-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .service-btn { 
            background: var(--dark); border: 1px solid #333; padding: 18px; 
            text-align: center; cursor: pointer; font-size: 14px; font-weight: bold; color: #888; 
            border-radius: 8px; text-transform: uppercase;
        }
        .service-btn.active { border-color: var(--gold); color: var(--gold); background: #1a160a; }

        /* PRAGOVI ČEKBOX - Povećan za prst */
        .check-container {
            margin-top: 20px; display: none; padding: 15px; background: var(--dark);
            border-radius: 8px; align-items: center; justify-content: space-between;
        }

        /* REZULTAT */
        .result-card { 
            margin-top: 30px; padding: 30px; background: var(--dark); border: 1px solid var(--gold); 
            border-radius: 12px; text-align: center; display: none;
        }
        .result-card .price { font-size: 40px; color: var(--gold); font-weight: 900; display: block; }
        .result-card .time { color: #666; font-size: 12px; margin-top: 5px; text-transform: uppercase; }

        .call-btn {
            display: block; width: 100%; padding: 18px; background: var(--gold); color: black;
            text-align: center; text-decoration: none; font-weight: 900; border-radius: 8px;
            margin-top: 20px; text-transform: uppercase; font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>KORICA AUTO NEGA</h1>
        <p>Sinonim kvaliteta</p>
    </div>

    <div class="content">
        <div class="form-group">
            <label>Izaberite marku</label>
            <select id="brand" onchange="loadModels()">
                <option value="" disabled selected>Marka vozila...</option>
            </select>
        </div>

        <div class="form-group">
            <label>Izaberite model</label>
            <select id="model" onchange="calculate()">
                <option value="" disabled selected>Model...</option>
            </select>
        </div>

        <div class="form-group">
            <label>Izaberite uslugu</label>
            <div class="btn-grid">
                <div class="service-btn" id="b-spolja" onclick="selectType('spolja')">Spoljašnje pranje</div>
                <div class="service-btn" id="b-unutra" onclick="selectType('unutra')">Unutrašnje čišćenje</div>
                <div class="service-btn" id="b-komplet" onclick="selectType('komplet')">Komplet tretman</div>
            </div>
        </div>

        <div class="check-container" id="pragovi-box">
            <span style="font-size: 13px;">Doplata za pragove (+200)</span>
            <input type="checkbox" id="pragovi-check" onchange="calculate()" style="width:25px; height:25px;">
        </div>

        <div class="result-card" id="results">
            <span style="font-size: 10px; letter-spacing: 1px; color: #555;">PROCENA USLUGE</span>
            <span class="price" id="res-price">0 RSD</span>
            <span class="time" id="res-time"></span>
            <a href="tel:+38160000000" class="call-btn">Pozovi i zakaži</a>
        </div>
    </div>

<script>
    const data = {
        "Audi": ["A3|1.10", "A4|1.25", "A6|1.45", "Q7|1.90"],
        "BMW": ["Serija 3|1.20", "Serija 5|1.45", "X5|1.95"],
        "Mercedes-Benz": ["C-Klasa|1.20", "E-Klasa|1.50", "GLE|1.95"],
        "Volkswagen": ["Golf|1.10", "Passat|1.35", "Tiguan|1.45"]
    };

    let type = '';
    const baseP = { spolja: 800, unutra: 800, komplet: 1500 };
    const baseT = { spolja: 30, unutra: 35, komplet: 60 };

    (function init() {
        const s = document.getElementById('brand');
        Object.keys(data).sort().forEach(m => {
            let o = document.createElement('option');
            o.value = m; o.textContent = m;
            s.appendChild(o);
        });
    })();

    function loadModels() {
        const m = document.getElementById('brand').value;
        const s = document.getElementById('model');
        s.innerHTML = '<option value="" disabled selected>Model...</option>';
        data[m].forEach((v, i) => {
            let o = document.createElement('option');
            o.value = i; o.textContent = v.split('|')[0];
            s.appendChild(o);
        });
        document.getElementById('results').style.display = 'none';
    }

    function selectType(t) {
        type = t;
        document.querySelectorAll('.service-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('b-' + t).classList.add('active');
        document.getElementById('pragovi-box').style.display = (t === 'spolja') ? 'flex' : 'none';
        calculate();
    }

    function calculate() {
        const b = document.getElementById('brand').value;
        const mi = document.getElementById('model').value;
        if(!b || mi === "" || !type) return;

        const k = parseFloat(data[b][mi].split('|')[1]);
        let p = Math.round(baseP[type] * k);
        let t = Math.round(baseT[type] * k);

        if(type === 'spolja' && document.getElementById('pragovi-check').checked) {
            p += 200; t += 5;
        }

        document.getElementById('res-price').innerText = p + " RSD";
        document.getElementById('res-time').innerText = "Vreme: cca " + t + " min";
        document.getElementById('results').style.display = "block";
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>
</body>
</html>
