<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>KORICA Auto Nega | Sinonim Kvaliteta</title>
    <style>
        :root { --gold: #d4af37; --black: #000; --dark: #0a0a0a; --grey: #151515; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        
        body { background: var(--black); color: white; padding-bottom: 50px; }

        /* HEADER */
        .header {
            padding: 50px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #1a1a1a, var(--black));
            border-bottom: 2px solid var(--gold);
        }
        .header h1 { font-size: 32px; letter-spacing: 6px; color: var(--gold); text-transform: uppercase; font-weight: 900; }
        .header p { font-size: 14px; letter-spacing: 4px; color: #ccc; text-transform: uppercase; margin-top: 8px; }

        /* CONTENT */
        .container { max-width: 450px; margin: 0 auto; padding: 25px; }
        
        .label-text { display: block; color: #555; font-size: 11px; text-transform: uppercase; margin-bottom: 10px; font-weight: bold; letter-spacing: 1px; }
        
        select { 
            width: 100%; padding: 18px; background: var(--grey); color: white; border: 1px solid #222; 
            border-radius: 8px; font-size: 16px; outline: none; margin-bottom: 25px; appearance: none;
        }
        select:focus { border-color: var(--gold); }

        /* OPCIJE */
        .option-card {
            background: var(--grey); border: 1px solid #222; padding: 22px; border-radius: 10px;
            margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between;
            transition: 0.3s; cursor: pointer;
        }
        .option-card.active { border-color: var(--gold); background: #1a160a; }
        .option-card span { font-weight: bold; text-transform: uppercase; font-size: 14px; color: #888; }
        .option-card.active span { color: var(--gold); }

        input[type="checkbox"] { width: 26px; height: 26px; accent-color: var(--gold); cursor: pointer; }

        /* NAPOMENA */
        .quality-alert {
            background: #1a160a; border: 1px solid var(--gold); padding: 15px;
            border-radius: 8px; margin: 20px 0; display: none; font-size: 13px; color: var(--gold);
            line-height: 1.5; text-align: center; font-style: italic;
        }

        /* REZULTAT */
        .result-box { 
            margin-top: 30px; padding: 35px; background: var(--grey); border: 1px solid #222; 
            border-radius: 15px; text-align: center; display: none; border-top: 4px solid var(--gold);
        }
        .result-box .total-label { font-size: 10px; color: #555; letter-spacing: 2px; font-weight: bold; }
        .result-box .price { font-size: 52px; color: var(--gold); font-weight: 900; display: block; margin: 10px 0; }
        
        .call-now {
            display: block; width: 100%; padding: 20px; background: var(--gold); color: black;
            text-align: center; text-decoration: none; font-weight: 900; border-radius: 8px;
            margin-top: 25px; text-transform: uppercase; font-size: 15px; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>KORICA</h1>
        <p>Sinonim kvaliteta</p>
    </div>

    <div class="container">
        <label class="label-text">Brend vozila</label>
        <select id="brand" onchange="loadModels()">
            <option value="" disabled selected>Izaberite brend...</option>
        </select>

        <label class="label-text">Model vozila</label>
        <select id="model" onchange="calculate()">
            <option value="" disabled selected>Prvo izaberite brend</option>
        </select>

        <label class="label-text">Usluge (moguće sabiranje)</label>
        
        <div class="option-card" id="card-spolja" onclick="toggleOption('spolja')">
            <span>Spoljašnje pranje (Koch-Chemie)</span>
            <input type="checkbox" id="check-spolja" onchange="calculate()" onclick="event.stopPropagation()">
        </div>

        <div class="option-card" id="card-unutra" onclick="toggleOption('unutra')">
            <span>Unutrašnje održavanje</span>
            <input type="checkbox" id="check-unutra" onchange="calculate()" onclick="event.stopPropagation()">
        </div>

        <div id="quality-msg" class="quality-alert">
            <strong>KORICA Standard:</strong> Uz samostalno spoljašnje pranje, obavezna je dekontaminacija i Koch-Chemie zaštita (+100 RSD). Kvalitet nema alternativu.
        </div>

        <div class="result-box" id="results">
            <span class="total-label">UKUPNA INVESTICIJA</span>
            <span class="price" id="res-price">0 RSD</span>
            <span id="res-time" style="font-size: 12px; color: #666; text-transform: uppercase; font-weight: bold;"></span>
            <a href="tel:+38160000000" class="call-now">Zakaži termin</a>
        </div>
    </div>

<script>
    const vehicleDB = {
        // Model | Koef_Spolja | Koef_Unutra
        "Audi": ["A1|0.9|0.9", "A3|1.1|1.1", "A4|1.25|1.25", "A6|1.45|1.45", "A8|1.6|1.7", "Q3|1.3|1.4", "Q5|1.5|1.6", "Q7|1.8|2.2"],
        "BMW": ["Serija 1|1.0|1.0", "Serija 3|1.2|1.2", "Serija 5|1.45|1.45", "Serija 7|1.6|1.7", "X1|1.3|1.4", "X3|1.5|1.6", "X5|1.8|2.1", "X7|2.0|2.5"],
        "Mercedes-Benz": ["A-Klasa|1.0|1.0", "C-Klasa|1.25|1.25", "E-Klasa|1.5|1.5", "S-Klasa|1.6|1.7", "GLA|1.3|1.4", "GLC|1.5|1.6", "GLE|1.8|2.1", "GLS|2.0|2.5"],
        "Volkswagen": ["Polo|0.9|0.9", "Golf|1.1|1.1", "Passat|1.35|1.35", "Arteon|1.45|1.45", "T-Roc|1.3|1.3", "Tiguan|1.5|1.6", "Touareg|1.8|2.1"]
    };

    const BAZA_SPOLJA = 900;
    const BAZA_UNUTRA = 800;
    const MIN_VREME = 30;

    (function init() {
        const s = document.getElementById('brand');
        Object.keys(vehicleDB).sort().forEach(m => {
            let o = document.createElement('option');
            o.value = m; o.textContent = m;
            s.appendChild(o);
        });
    })();

    function loadModels() {
        const b = document.getElementById('brand').value;
        const s = document.getElementById('model');
        s.innerHTML = '<option value="" disabled selected>Izaberite model...</option>';
        vehicleDB[b].forEach((v, i) => {
            let o = document.createElement('option');
            o.value = i; o.textContent = v.split('|')[0];
            s.appendChild(o);
        });
        calculate();
    }

    function toggleOption(id) {
        const cb = document.getElementById('check-' + id);
        cb.checked = !cb.checked;
        calculate();
    }

    function calculate() {
        const b = document.getElementById('brand').value;
        const mi = document.getElementById('model').value;
        const isS = document.getElementById('check-spolja').checked;
        const isU = document.getElementById('check-unutra').checked;

        document.getElementById('card-spolja').className = isS ? 'option-card active' : 'option-card';
        document.getElementById('card-unutra').className = isU ? 'option-card active' : 'option-card';

        if(!b || mi === "" || (!isS && !isU)) {
            document.getElementById('results').style.display = 'none';
            document.getElementById('quality-msg').style.display = 'none';
            return;
        }

        const podaci = vehicleDB[b][mi].split('|');
        const ks = parseFloat(podaci[1]);
        const ku = parseFloat(podaci[2]);

        let total = 0;
        let time = 0;

        if(isS) { total += BAZA_SPOLJA * ks; time += MIN_VREME * ks; }
        if(isU) { total += BAZA_UNUTRA * ku; time += (MIN_VREME + 5) * ku; }

        if(isS && !isU) {
            total += 100;
            document.getElementById('quality-msg').style.display = 'block';
        } else {
            document.getElementById('quality-msg').style.display = 'none';
        }

        // Zaokruživanje na 50 dinara
        let finalP = Math.ceil(total / 50) * 50;

        document.getElementById('res-price').innerText = finalP + " RSD";
        document.getElementById('res-time').innerText = "Očekivano vreme: cca " + Math.round(time) + " min";
        document.getElementById('results').style.display = "block";
    }
</script>

</body>
</html>
