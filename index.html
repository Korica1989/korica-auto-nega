        label { display: block; color: #666; font-size: 10px; text-transform: uppercase; margin-bottom: 10px; }
        select { width: 100%; padding: 16px; background: #000; color: white; border: 1px solid #333; border-radius: 0; font-size: 15px; outline: none; appearance: none; cursor: pointer; }
        #main-ui { display: none; }
        .tech-data { margin: 25px 0; padding: 18px; border-top: 1px solid #222; border-bottom: 1px solid #222; background: rgba(255,255,255,0.02); }
        .data-line { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; font-family: monospace; }
        .data-label { color: #555; text-transform: uppercase; }
        .data-val { color: var(--gold); font-weight: bold; }
        .services { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .opt { background: #000; border: 1px solid #222; padding: 18px; text-align: center; cursor: pointer; font-size: 12px; color: #777; font-weight: bold; transition: 0.3s; }
        .opt.active { border-color: var(--gold); color: #ffffff !important; background: #111; }
        .notice { background: rgba(212, 175, 55, 0.05); border: 1px solid rgba(212, 175, 55, 0.2); padding: 15px; margin-top: 20px; font-size: 11px; color: #ccc; display: none; line-height: 1.5; }
        .price-panel { margin-top: 40px; text-align: right; display: none; }
        .price-label { font-size: 10px; color: #666; text-transform: uppercase; }
        .price-val { display: block; font-size: 45px; color: var(--gold); font-weight: 900; }
        .btn { background: var(--gold); color: black; border: none; padding: 22px; width: 100%; margin-top: 30px; cursor: pointer; text-transform: uppercase; font-weight: 900; letter-spacing: 2px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>KORICA</h1>
        <span class="tagline">Auto nega</span>
        <span class="synonym">Sinonim kvaliteta</span>

    <div class="group">

        <select id="marka" onchange="updateModels()">

    </div>

    <div class="group">

</div>

    const mSel = document.getElementById("marka");
    const sortedMarke = Object.keys(db).sort((a, b) => a.localeCompare(b, 'sr'));
    sortedMarke.forEach(m => mSel.options.add(new Option(m, m)));
}

function updateModels() {
    const m = document.getElementById("marka").value;
    const modSel = document.getElementById("model");
    modSel.innerHTML = '<option value="" disabled selected>Izaberite model...</option>';
    
    // Sortiranje modela unutar marke
    const models = db[m].sort((a, b) => a.split('|')[0].localeCompare(b.split('|')[0], 'sr'));
    
    models.forEach((item, index) => {
        let parts = item.split('|');
        modSel.options.add(new Option(parts[0], index));
    });
    document.getElementById("main-ui").style.display = "none";
}

function showUI() {
    document.getElementById("main-ui").style.display = "block";
    activeS = false; activeU = false;
    updateButtons();
    calculate();
}

function toggle(type) {
    if(type === 's') activeS = !activeS; else activeU = !activeU;
    updateButtons();
    calculate();
}

function updateButtons() {
    document.getElementById('btn-s').className = activeS ? 'opt active' : 'opt';
    document.getElementById('btn-u').className = activeU ? 'opt active' : 'opt';
}

function calculate() {
    const m = document.getElementById("marka").value;
    const idx = document.getElementById("model").value;
    if (idx === "" || m === "") return;
    
    // Moramo ponovo dohvatiti ispravan string jer je lista u selectu sortirana
    const sortedModels = db[m].sort((a, b) => a.split('|')[0].localeCompare(b.split('|')[0], 'sr'));
    const [name, pS, pU, len, wid, time] = sortedModels[idx].split('|');

    document.getElementById("len").innerText = len + " cm";
    document.getElementById("wid").innerText = wid + " cm";
    
    if (!activeS && !activeU) {
        document.getElementById("time").innerText = "-- min";
        document.getElementById("price-panel").style.display = "none";
        document.getElementById("booking-btn").style.display = "none";
        document.getElementById("pragovi-notice").style.display = "none";
        return;
    }

    let finalTime = 0;
    if (activeS && activeU) finalTime = time;
    else if (activeS) finalTime = Math.round(time * 0.6);
    else if (activeU) finalTime = Math.round(time * 0.5);
    document.getElementById("time").innerText = finalTime + " min";
    
    let total = 0;
    if(activeS) total += parseInt(pS);
    if(activeU) total += parseInt(pU);
    
    if(activeS && !activeU) {
        total += 100;
        document.getElementById("pragovi-notice").style.display = "block";
    } else {
        document.getElementById("pragovi-notice").style.display = "none";
    }

    document.getElementById("total").innerText = total.toLocaleString() + " RSD";
    document.getElementById("price-panel").style.display = "block";
    document.getElementById("booking-btn").style.display = "block";
}

function sendWA() {
    const m = document.getElementById("marka").value;
    const mod = document.getElementById("model").options[document.getElementById("model").selectedIndex].text;
    const price = document.getElementById("total").innerText;
    // Broj telefona se menja ovde
    window.open(`https://wa.me/38164XXXXXXX?text=KORICA Auto nega: Rezervacija za ${m} ${mod}. Cena: ${price}.`);
}

window.onload = init;
</script>
</body>
</html>
