<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>KORICA Auto Nega | Profesionalni Kalkulator</title>
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --dark: #111; --gray: #222; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            background: var(--black); color: white; font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 15px;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }
        .card {
            background: rgba(20, 20, 20, 0.98); padding: 25px; border-radius: 25px;
            border: 1px solid var(--gold); width: 100%; max-width: 600px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        h1 { color: var(--gold); margin: 0; letter-spacing: 4px; text-transform: uppercase; font-size: 24px; font-weight: 800; }
        .subtitle { color: #888; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; }
        
        .group { text-align: left; margin-bottom: 15px; }
        label { display: block; color: var(--gold); margin-bottom: 6px; font-weight: 600; font-size: 11px; text-transform: uppercase; }
        
        select {
            width: 100%; padding: 14px; background: var(--dark); color: white;
            border: 1px solid #333; border-radius: 12px; font-size: 14px; outline: none; appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23d4af37' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 15px center; background-size: 15px;
        }

        .info-panel {
            display: none; background: #161616; border-radius: 15px; padding: 15px;
            margin-top: 10px; border-left: 4px solid var(--gold); text-align: left;
        }
        .info-panel h4 { margin: 0 0 5px 0; font-size: 12px; color: var(--gold); text-transform: uppercase; }
        .info-panel p { margin: 0; font-size: 13px; color: #ccc; line-height: 1.4; }
        .spec-tag { display: inline-block; background: #222; padding: 3px 8px; border-radius: 5px; font-size: 11px; margin-top: 5px; color: #fff; border: 1px solid #444; }

        .services-container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;
        }
        .service-item { 
            background: #111; padding: 12px; border-radius: 12px; border: 1px solid #333;
            display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 13px;
        }
        input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--gold); }

        .price-box { margin: 20px 0; padding: 20px; background: rgba(212, 175, 55, 0.05); border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.2); }
        .price-tag { font-size: 48px; color: var(--gold); font-weight: 800; }
        .time-tag { color: #00ffcc; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .btn {
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: black; border: none; padding: 18px; width: 100%;
            border-radius: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 14px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
    <h1>KORICA</h1>
    <div class="subtitle">Premium Auto Nega | Sremčica</div>
    
    <div class="group">
        <label>Marka vozila</label>
        <select id="markaSel" onchange="updateModels()"></select>
    </div>

    <div class="group">
        <label>Model i Karoserija</label>
        <select id="modelSel" onchange="updateGenerations()"></select>
    </div>

    <div class="group">
        <label>Generacija / Godište</label>
        <select id="genSel" onchange="calculate()"></select>
        
        <div id="infoPanel" class="info-panel">
            <h4>Tehničke specifikacije:</h4>
            <p id="dimText"></p>
            <div id="tags" style="margin-top: 5px;"></div>
        </div>
    </div>

    <div class="group">
        <label>Usluge</label>
        <div class="services-container">
            <label class="service-item"><input type="checkbox" id="spolja" checked onchange="calculate()"> Spolja</label>
            <label class="service-item"><input type="checkbox" id="unutra" checked onchange="calculate()"> Unutra</label>
        </div>
    </div>

    <div class="price-box">
        <div class="price-tag" id="rezultat">0 RSD</div>
        <div class="time-tag" id="vreme">Spreman</div>
    </div>

    <button class="btn" onclick="sendWhatsApp()">Rezerviši termin</button>
</div>

<script>
/* STRUKTURA BAZE:
   Marka -> Karoserija -> Generacije [Ime, CenaS, CenaU, Minuti, Dimenzije, Tip]
   Tipovi: L (Limuzina), K (Karavan), H (Hatchback), S (SUV), P (Pickup), V (Van/Teretni)
*/
const data = {
    "Volkswagen": {
        "Golf": [
            ["Golf 1, 2, 3 (1974-1997)|500|450|35|Dužina: 3.70-4.02m / Širina: 1.61-1.69m|H"],
            ["Golf 4, 5, 6 (1997-2012)|700|650|50|Dužina: 4.15-4.20m / Širina: 1.73-1.78m|H"],
            ["Golf 7, 8 (2012-Danas)|850|800|60|Dužina: 4.25-4.28m / Širina: 1.79-1.80m|H"]
        ],
        "Passat": [
            ["B5, B5.5 (1996-2005) Limuzina|800|750|60|4.67m x 1.74m|L"],
            ["B5, B5.5 (1996-2005) Karavan|900|850|70|4.67m x 1.74m|K"],
            ["B6, B7, B8 (2005-Danas) Limuzina|950|900|70|4.77m x 1.83m|L"],
            ["B6, B7, B8 (2005-Danas) Karavan|1050|1000|80|4.77m x 1.83m|K"]
        ],
        "Caddy": [
            ["Caddy Putnički (Sve gen.)|900|850|70|4.40m x 1.79m|V"],
            ["Caddy Teretni (2 sedišta)|900|1100|85|Fokus na tovarni prostor|V"]
        ],
        "Amarok": [
            ["Amarok Single Cab (2 vrata)|1100|900|80|5.25m x 1.95m|P"],
            ["Amarok Double Cab (4 vrata)|1300|1100|95|5.25m x 1.95m|P"]
        ]
    },
    "BMW": {
        "Serija 3": [
            ["E36, E46 (1990-2006) Limuzina|800|750|55|4.43m x 1.70m|L"],
            ["E90, F30, G20 (2005-Danas) Limuzina|950|900|70|4.60-4.70m|L"],
            ["Touring (Karavan) Sve gen.|1050|1000|80|Povećana stakla|K"]
        ],
        "Serija 5": [
            ["E39, E60 (1995-2010)|950|900|75|4.80m x 1.80m|L"],
            ["F10, G30 (2010-Danas)|1100|1050|85|4.95m x 1.86m|L"]
        ],
        "X5 / X6": [
            ["E53, E70 (1999-2013)|1300|1200|90|4.85m x 1.93m|S"],
            ["F15, G05 (2013-Danas)|1500|1400|110|4.92m x 2.00m|S"]
        ]
    },
    "Toyota": {
        "Hilux": [
            ["Single Cab (Teretni)|1100|900|80|5.30m x 1.80m|P"],
            ["Double Cab (Putnički)|1300|1100|100|5.33m x 1.85m|P"]
        ],
        "Corolla": [
            ["Hatchback (Sve gen.)|750|700|50|4.37m|H"],
            ["Sedan / Karavan|900|850|65|4.63m|L"]
        ]
    }
    // Ovde se dodaju ostalih 97 marki po istom principu
};

function init() {
    const mSel = document.getElementById("markaSel");
    mSel.innerHTML = '<option value="" disabled selected>Izaberi marku...</option>';
    Object.keys(data).sort().forEach(m => {
        mSel.options.add(new Option(m, m));
    });
}

function updateModels() {
    const m = document.getElementById("markaSel").value;
    const modSel = document.getElementById("modelSel");
    modSel.innerHTML = '<option value="" disabled selected>Izaberi model...</option>';
    Object.keys(data[m]).forEach(mod => {
        modSel.options.add(new Option(mod, mod));
    });
}

function updateGenerations() {
    const m = document.getElementById("markaSel").value;
    const mod = document.getElementById("modelSel").value;
    const genSel = document.getElementById("genSel");
    genSel.innerHTML = '<option value="" disabled selected>Izaberi specifikaciju...</option>';
    data[m][mod].forEach((g, index) => {
        let [ime] = g[0].split('|');
        genSel.options.add(new Option(ime, index));
    });
}

function calculate() {
    const m = document.getElementById("markaSel").value;
    const mod = document.getElementById("modelSel").value;
    const genIdx = document.getElementById("genSel").value;
    
    if (genIdx === "") return;

    const entry = data[m][mod][genIdx][0].split('|');
    const cS = parseInt(entry[1]);
    const cU = parseInt(entry[2]);
    const min = parseInt(entry[3]);
    const dim = entry[4];
    const tip = entry[5];

    let ukupno = 0;
    if(document.getElementById("spolja").checked) ukupno += cS;
    if(document.getElementById("unutra").checked) ukupno += cU;
    
    // KORICA LOGIKA: Pragovi +100 ako ide samo spolja
    if(document.getElementById("spolja").checked && !document.getElementById("unutra").checked) {
        ukupno += 100;
    }

    document.getElementById("rezultat").innerText = ukupno.toLocaleString() + " RSD";
    document.getElementById("vreme").innerText = "~" + min + " MINUTA";
    
    // Info Panel
    document.getElementById("infoPanel").style.display = "block";
    document.getElementById("dimText").innerText = dim;
    
    let tipNaziv = "";
    if(tip == "L") tipNaziv = "Limuzina";
    if(tip == "K") tipNaziv = "Karavan";
    if(tip == "P") tipNaziv = "Pickup";
    if(tip == "S") tipNaziv = "SUV / Džip";
    if(tip == "V") tipNaziv = "VAN / Teretni";
    
    document.getElementById("tags").innerHTML = `<span class="spec-tag">${tipNaziv}</span> <span class="spec-tag">Godište: ${entry[0].split('(')[1]?.replace(')','') || 'N/A'}</span>`;
}

function sendWhatsApp() {
    const m = document.getElementById("markaSel").value;
    const mod = document.getElementById("modelSel").value;
    const gen = document.getElementById("genSel").options[document.getElementById("genSel").selectedIndex].text;
    const cena = document.getElementById("rezultat").innerText;
    
    const text = `Pozdrav Korica! Rezervisao bih termin:\nVozilo: ${m} ${mod}\nSpecifikacija: ${gen}\nCena: ${cena}`;
    window.open(`https://wa.me/38164XXXXXXX?text=${encodeURIComponent(text)}`);
}

window.onload = init;
</script>
</body>
</html>
