<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>KORICA Auto Nega | Profesionalni Kalkulator</title>
    <style>
        :root { --gold: #d4af37; --black: #000; --grey: #151515; --dark-grey: #222; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: var(--black); color: white; padding-bottom: 60px; }

        .header { padding: 40px 20px; text-align: center; border-bottom: 2px solid var(--gold); }
        .header h1 { font-size: 26px; color: var(--gold); text-transform: uppercase; font-weight: 900; letter-spacing: 2px; }
        .header .slogan { font-size: 12px; letter-spacing: 4px; color: #fff; margin-top: 8px; text-transform: uppercase; }

        .container { max-width: 450px; margin: 0 auto; padding: 20px; }
        
        .search-wrapper { position: relative; margin-top: 20px; }
        #search-input { width: 100%; padding: 18px; background: var(--grey); color: white; border: 1px solid var(--dark-grey); border-radius: 12px; font-size: 16px; outline: none; border-left: 4px solid var(--gold); }
        
        .results-dropdown { 
            position: absolute; width: 100%; background: var(--grey); border: 1px solid var(--dark-grey); 
            border-radius: 0 0 12px 12px; max-height: 250px; overflow-y: auto; z-index: 100; display: none;
        }
        .search-item { padding: 15px; border-bottom: 1px solid #111; cursor: pointer; font-size: 14px; }
        .search-item:hover { background: #1a160a; color: var(--gold); }

        .selected-vehicle-display { 
            background: #1a160a; padding: 15px; border-radius: 12px; border: 1px dashed var(--gold);
            margin-top: 15px; display: none; text-align: center; font-weight: bold; color: var(--gold);
        }

        .label-text { display: block; color: #666; font-size: 10px; text-transform: uppercase; margin: 25px 0 8px 0; font-weight: bold; letter-spacing: 1px; }

        .option-card { background: var(--grey); border: 1px solid var(--dark-grey); padding: 16px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .option-card.active { border-color: var(--gold); background: #1a160a; }
        .option-card span { font-weight: bold; text-transform: uppercase; font-size: 12px; color: #888; }
        .option-card.active span { color: var(--gold); }
        .option-card small { display: block; font-size: 10px; color: #555; margin-top: 4px; }

        input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--gold); }

        .result-box { margin-top: 25px; padding: 25px; background: var(--grey); border-radius: 15px; text-align: center; display: none; border-top: 4px solid var(--gold); }
        .price { font-size: 44px; color: var(--gold); font-weight: 900; display: block; margin: 5px 0; }
        .call-now { display: block; width: 100%; padding: 18px; background: var(--gold); color: black; text-align: center; text-decoration: none; font-weight: 900; border-radius: 8px; margin-top: 20px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <h1>KORICA Auto Nega</h1>
        <div class="slogan">Sinonim kvaliteta</div>
    </div>

    <div class="container">
        <label class="label-text">Pronađi vozilo (npr. Audi A6, Golf, Trafic...)</label>
        <div class="search-wrapper">
            <input type="text" id="search-input" placeholder="Ukucaj model..." oninput="filterVehicles()">
            <div id="search-results" class="results-dropdown"></div>
        </div>

        <div id="selected-info" class="selected-vehicle-display"></div>

        <label class="label-text">Usluge pranja</label>
        <div class="option-card" id="card-spolja" onclick="toggleOption('spolja')">
            <div class="txt-wrap"><span>Spoljašnje pranje</span><small>Pragovi i felne uključeni.</small></div>
            <input type="checkbox" id="check-spolja" onchange="calculate()" onclick="event.stopPropagation()">
        </div>
        <div class="option-card" id="card-unutra" onclick="toggleOption('unutra')">
            <div class="txt-wrap"><span>Unutrašnje pranje</span><small>Detaljno usisavanje i plastike.</small></div>
            <input type="checkbox" id="check-unutra" onchange="calculate()" onclick="event.stopPropagation()">
        </div>
        <div class="option-card" id="card-vosak" onclick="toggleOption('vosak')">
            <div class="txt-wrap"><span>Zaštitni vosak</span><small>Hidrofobni sjaj.</small></div>
            <input type="checkbox" id="check-vosak" onchange="calculate()" onclick="event.stopPropagation()">
        </div>

        <div class="result-box" id="results-box">
            <span style="font-size: 10px; color: #555; letter-spacing: 2px;">FIKSNA CENA</span>
            <span class="price" id="res-price">0 RSD</span>
            <span id="res-time" style="font-size: 11px; color: #666; text-transform: uppercase;"></span>
            <a href="tel:+38160000000" class="call-now">Rezerviši odmah</a>
        </div>
    </div>

<script>
    // Proširena baza vozila sa koeficijentima
    const vehicleData = [
        { name: "Audi A4 Limuzina", ks: 1.2, ku: 1.1 },
        { name: "Audi A4 Karavan", ks: 1.3, ku: 1.2 },
        { name: "Audi A6 Limuzina", ks: 1.4, ku: 1.2 },
        { name: "Audi A6 Karavan", ks: 1.5, ku: 1.3 },
        { name: "BMW Serija 3 Sedan", ks: 1.2, ku: 1.1 },
        { name: "BMW Serija 3 Karavan", ks: 1.3, ku: 1.2 },
        { name: "BMW Serija 5 Sedan", ks: 1.4, ku: 1.2 },
        { name: "BMW Serija 5 Karavan", ks: 1.5, ku: 1.3 },
        { name: "VW Golf 7/8 Hatchback", ks: 1.1, ku: 1.0 },
        { name: "VW Golf 7/8 Variant (Karavan)", ks: 1.25, ku: 1.15 },
        { name: "VW Passat Limuzina", ks: 1.3, ku: 1.1 },
        { name: "VW Passat Karavan", ks: 1.4, ku: 1.25 },
        { name: "VW Transporter Teretni", ks: 2.1, ku: 1.1 },
        { name: "VW Transporter Putnički", ks: 2.1, ku: 2.3 },
        { name: "Renault Megane Karavan", ks: 1.25, ku: 1.2 },
        { name: "Renault Trafic Teretni", ks: 2.1, ku: 1.1 },
        { name: "Renault Trafic Putnički", ks: 2.1, ku: 2.3 },
        { name: "Mercedes C Klasa Karavan", ks: 1.3, ku: 1.2 },
        { name: "Mercedes E Klasa Limuzina", ks: 1.4, ku: 1.2 },
        { name: "Mercedes Vito Teretni", ks: 2.1, ku: 1.1 },
        { name: "Mercedes Vito Putnički", ks: 2.1, ku: 2.3 },
        { name: "Škoda Octavia Limuzina", ks: 1.25, ku: 1.1 },
        { name: "Škoda Octavia Karavan", ks: 1.35, ku: 1.25 },
        { name: "Škoda Superb Limuzina", ks: 1.4, ku: 1.2 },
        { name: "Škoda Superb Karavan", ks: 1.5, ku: 1.3 },
        { name: "Fiat Punto", ks: 0.9, ku: 0.9 },
        { name: "Fiat Tipo Karavan", ks: 1.25, ku: 1.2 },
        { name: "Peugeot 308 Karavan", ks: 1.25, ku: 1.2 },
        { name: "Dacia Duster", ks: 1.4, ku: 1.2 },
        { name: "Hyundai Tucson", ks: 1.5, ku: 1.3 }
    ];

    let selectedVehicle = null;
    const BAZA_SPOLJA = 800;
    const BAZA_UNUTRA = 700;
    const BAZA_VOSAK = 300;

    function filterVehicles() {
        const input = document.getElementById('search-input').value.toLowerCase();
        const resultsDiv = document.getElementById('search-results');
        resultsDiv.innerHTML = '';
        if (input.length < 2) { resultsDiv.style.display = 'none'; return; }
        const filtered = vehicleData.filter(v => v.name.toLowerCase().includes(input));
        if (filtered.length > 0) {
            resultsDiv.style.display = 'block';
            filtered.forEach(v => {
                const div = document.createElement('div');
                div.className = 'search-item';
                div.innerText = v.name;
                div.onclick = () => selectVehicle(v);
                resultsDiv.appendChild(div);
            });
        } else { resultsDiv.style.display = 'none'; }
    }

    function selectVehicle(v) {
        selectedVehicle = v;
        document.getElementById('search-input').value = v.name;
        document.getElementById('search-results').style.display = 'none';
        document.getElementById('selected-info').innerText = v.name;
        document.getElementById('selected-info').style.display = 'block';
        calculate();
    }

    function toggleOption(id) {
        document.getElementById('check-' + id).checked = !document.getElementById('check-' + id).checked;
        calculate();
    }

    function calculate() {
        if (!selectedVehicle) return;
        const isSpolja = document.getElementById('check-spolja').checked;
        const isUnutra = document.getElementById('check-unutra').checked;
        const isVosak = document.getElementById('check-vosak').checked;

        document.getElementById('card-spolja').className = isSpolja ? 'option-card active' : 'option-card';
        document.getElementById('card-unutra').className = isUnutra ? 'option-card active' : 'option-card';
        document.getElementById('card-vosak').className = isVosak ? 'option-card active' : 'option-card';

        if (!isSpolja && !isUnutra && !isVosak) {
            document.getElementById('results-box').style.display = 'none';
            return;
        }

        let total = 0;
        let time = 0;

        if(isSpolja) { total += (BAZA_SPOLJA * selectedVehicle.ks); time += 30 * selectedVehicle.ks; }
        if(isUnutra) { total += (BAZA_UNUTRA * selectedVehicle.ku); time += 35 * selectedVehicle.ku; }
        if(isVosak) { total += (BAZA_VOSAK * selectedVehicle.ks); time += 15 * selectedVehicle.ks; }

        // Zaokruživanje na nulu (na 100 dinara naniže)
        let finalPrice = Math.floor(total / 100) * 100;

        document.getElementById('res-price').innerText = finalPrice + " RSD";
        document.getElementById('res-time').innerText = "Oko " + Math.round(time) + " min";
        document.getElementById('results-box').style.display = "block";
    }
</script>
</body>
</html>
