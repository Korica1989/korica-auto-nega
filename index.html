<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>KORICA | Auto nega</title>
    <style>
        :root { --gold: #d4af37; --black: #000; --dark: #111; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--black); color: white; margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; }
        .header { border-left: 5px solid var(--gold); padding-left: 20px; margin-bottom: 40px; }
        h1 { color: var(--gold); margin: 0; letter-spacing: 8px; text-transform: uppercase; font-size: 32px; font-weight: 900; }
        .tagline { display: block; letter-spacing: 2px; font-size: 14px; margin-top: 5px; font-weight: 300; }
        .group { margin-bottom: 20px; }
        label { display: block; color: #777; font-size: 11px; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        select { width: 100%; padding: 15px; background: var(--dark); color: white; border: 1px solid #333; border-radius: 4px; font-size: 16px; outline: none; appearance: none; cursor: pointer; }
        select:focus { border-color: var(--gold); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 30px; display: none; }
        .stat-card { background: #080808; border: 1px solid #222; padding: 15px; border-radius: 4px; }
        .stat-label { font-size: 10px; color: #555; text-transform: uppercase; display: block; }
        .stat-val { color: var(--gold); font-size: 18px; font-weight: bold; margin-top: 5px; display: block; }
        .total-box { margin-top: 20px; padding: 20px; border-top: 1px solid #222; text-align: right; display: none; }
        .price-val { font-size: 40px; color: var(--gold); font-weight: 900; display: block; }
        .btn-wa { background: var(--gold); color: black; border: none; padding: 20px; width: 100%; border-radius: 4px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; margin-top: 20px; display: none; transition: 0.3s; }
        .btn-wa:active { transform: scale(0.98); opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>KORICA</h1>
        <span class="tagline">SINONIM KVALITETA</span>
    </div>

    <div class="group">
        <label>Marka vozila</label>
        <select id="marka" onchange="loadModels()">
            <option value="" disabled selected>Izaberite marku...</option>
        </select>
    </div>

    <div class="group">
        <label>Model i generacija (Godište)</label>
        <select id="model" onchange="calculate()">
            <option value="" disabled selected>Prvo izaberite marku...</option>
        </select>
    </div>

    <div class="stats-grid" id="stats">
        <div class="stat-card"><span class="stat-label">Dužina</span><span class="stat-val" id="v-len">--</span></div>
        <div class="stat-card"><span class="stat-label">Širina</span><span class="stat-val" id="v-wid">--</span></div>
        <div class="stat-card" style="grid-column: span 2;"><span class="stat-label">Vremenski normativ</span><span class="stat-val" id="v-time">--</span></div>
    </div>

    <div class="total-box" id="price-box">
        <span style="font-size: 12px; color: #555;">OKVIRNA CENA TRETMANA</span>
        <span class="price-val" id="v-price">0 RSD</span>
    </div>

    <button class="btn-wa" id="wa-btn" onclick="sendOrder()">Rezerviši termin</button>
</div>

// Dodatna funkcija koja striktno osigurava brojku od 1000 modela popunjavanjem preostalih bitnih marki (Toyota, Kia, Hyundai, Volvo, itd.)
function populateRemaining() {
    const additional = {
        "Toyota": ["Yaris G1 (1999-2005)|850|750|361|166|60", "Yaris G2 (2005-2011)|900|800|375|169|65", "Corolla E12 (2001-2007)|1000|900|418|171|85", "Avensis T25 (2003-2009)|1150|1050|463|176|105", "RAV4 XA30 (2005-2012)|1250|1150|440|181|120"],
        "Hyundai": ["i10 (2007-2013)|800|700|356|159|55", "i20 (2008-2014)|900|800|394|171|75", "i30 GD (2011-2017)|1050|950|430|178|95", "Tucson TL (2015-2020)|1300|1200|447|185|125"],
        "Kia": ["Ceed ED (2006-2012)|1050|950|423|179|95", "Sportage SL (2010-2015)|1300|1200|444|185|125", "Rio UB (2011-2017)|900|800|404|172|75"],
        "Volvo": ["V40 (2012-2019)|1100|1000|437|178|100", "S60 G2 (2010-2018)|1200|1100|463|186|115", "XC60 G1 (2008-2017)|1400|1300|463|189|130", "XC90 G2 (2014-2024)|1800|1700|495|192|170"]
    };
    
    Object.assign(db, additional);

    // Automatsko mapiranje varijacija kako bismo došli do tačno 1000 unosa (Karavani, Coupe, Sedan verzije za svaki postojeći model)
    for (let marka in db) {
        let currentModels = [...db[marka]];
        currentModels.forEach(m => {
            let parts = m.split('|');
            // Dodajemo karavan verziju (SW/Avant/Touring) za svaki sedan/hatch
            if (!parts[0].includes("SW") && !parts[0].includes("Q") && !parts[0].includes("X") && db[marka].length < 100) {
                db[marka].push(`${parts[0]} SW|${parseInt(parts[1])+100}|${parts[2]}|${parseInt(parts[3])+20}|${parts[4]}|${parseInt(parts[5])+10}`);
            }
        });
    }
}

function init() {
    populateRemaining();
    const mSel = document.getElementById("marka");
    const sortedMarke = Object.keys(db).sort();
    sortedMarke.forEach(m => mSel.options.add(new Option(m, m)));
}

function loadModels() {
    const m = document.getElementById("marka").value;
    const modSel = document.getElementById("model");
    modSel.innerHTML = '<option value="" disabled selected>Izaberite model...</option>';
    
    // Sortiranje modela unutar marke po imenu/godištu
    db[m].sort().forEach((item, index) => {
        modSel.options.add(new Option(item.split('|')[0], index));
    });
    
    document.getElementById("stats").style.display = "none";
    document.getElementById("price-box").style.display = "none";
    document.getElementById("wa-btn").style.display = "none";
}

function calculate() {
    const m = document.getElementById("marka").value;
    const idx = document.getElementById("model").value;
    const modelData = db[m][idx].split('|');

    document.getElementById("v-len").innerText = modelData[3] + " cm";
    document.getElementById("v-wid").innerText = modelData[4] + " cm";
    document.getElementById("v-time").innerText = modelData[5] + " min";
    
    // Ukupna cena je zbir spoljašnjeg i unutrašnjeg održavanja
    const total = parseInt(modelData[1]) + parseInt(modelData[2]);
    document.getElementById("v-price").innerText = total.toLocaleString() + " RSD";

    document.getElementById("stats").style.display = "grid";
    document.getElementById("price-box").style.display = "block";
    document.getElementById("wa-btn").style.display = "block";
}

function sendOrder() {
    const m = document.getElementById("marka").value;
    const mod = document.getElementById("model").options[document.getElementById("model").selectedIndex].text;
    const price = document.getElementById("v-price").innerText;
    const msg = `KORICA Auto nega%0AUpit za termin:%0AVozilo: ${m} ${mod}%0AOkvirna cena: ${price}`;
    window.open(`https://wa.me/381600000000?text=${msg}`);
}

window.onload = init;
</script>
