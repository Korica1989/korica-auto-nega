<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORICA Auto Nega | Rezervacija</title>
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; }
        body {
            background: var(--black); color: white; font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }
        .card {
            background: rgba(20, 20, 20, 0.98); padding: 30px; border-radius: 25px;
            border: 1px solid var(--gold); width: 100%; max-width: 450px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        h1 { color: var(--gold); margin: 0; letter-spacing: 5px; text-transform: uppercase; font-size: 30px; font-weight: 800; }
        .subtitle { color: #888; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 25px; }
        .group { text-align: left; margin-bottom: 20px; }
        label { display: block; color: var(--gold); margin-bottom: 8px; font-weight: 600; font-size: 11px; text-transform: uppercase; }
        select {
            width: 100%; padding: 15px; background: #111; color: white;
            border: 1px solid #333; border-radius: 12px; font-size: 16px; outline: none; cursor: pointer;
            -webkit-appearance: none;
        }
        select:focus { border-color: var(--gold); }
        .services-container {
            background: #111; padding: 15px; border-radius: 12px; border: 1px solid #333;
            display: flex; flex-direction: column; gap: 12px;
        }
        .service-item { display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 15px; }
        input[type="checkbox"] { accent-color: var(--gold); width: 22px; height: 22px; cursor: pointer; }
        .price-box {
            margin: 25px 0; padding: 20px; background: rgba(212, 175, 55, 0.05);
            border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .price-tag { font-size: 40px; color: var(--gold); font-weight: 800; }
        .time-info { color: #00ffcc; font-size: 13px; margin-top: 8px; font-weight: 600; }
        .btn {
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: black; border: none; padding: 20px; width: 100%;
            border-radius: 15px; font-weight: 800; cursor: pointer; text-transform: uppercase;
            font-size: 16px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
    <h1>KORICA</h1>
    <div class="subtitle">Auto Nega Sremčica</div>
    
    <div class="group">
        <label>1. Odaberi marku</label>
        <select id="markaSel" onchange="azurirajModele()">
            <option value="" selected disabled>Izaberi brend...</option>
        </select>
    </div>

    <div class="group">
        <label>2. Odaberi model</label>
        <select id="modelSel" onchange="izracunaj()">
            <option value="">Prvo odaberi marku...</option>
        </select>
    </div>

    <div class="group">
        <label>3. Usluge</label>
        <div class="services-container">
            <label class="service-item"><input type="checkbox" id="spolja" onchange="izracunaj()" checked> Spoljašnje pranje</label>
            <label class="service-item"><input type="checkbox" id="unutra" onchange="izracunaj()" checked> Unutrašnje održavanje</label>
        </div>
    </div>

    <div class="price-box">
        <div class="price-tag" id="rezultat">0 RSD</div>
        <div class="time-info" id="vreme">Vreme rada: -- min</div>
    </div>

    <button class="btn" onclick="zakazi()">Rezerviši Termin</button>
</div>

<script>
    const baza = {
        "Alfa Romeo": ["145 (S)", "146 (S)", "147 (S)", "155 (M)", "156 (M)", "159 (M)", "164 (L)", "166 (L)", "Brera (M)", "GT (M)", "Giulia (M)", "Giulietta (M)", "Mito (S)", "Stelvio (L)", "Tonale (M)"],
        "Audi": ["80 (M)", "90 (M)", "100 (L)", "200 (L)", "A1 (S)", "A2 (S)", "A3 (M)", "A4 (M)", "A5 (M)", "A6 (L)", "A7 (L)", "A8 (XL)", "Q1 (M)", "Q2 (M)", "Q3 (M)", "Q4 (L)", "Q5 (L)", "Q7 (XL)", "Q8 (XL)", "RS3 (M)", "RS4 (M)", "RS5 (M)", "RS6 (L)", "RS7 (L)", "TT (S)"],
        "BMW": ["Serija 1 (S)", "Serija 2 (M)", "Serija 3 (M)", "Serija 4 (M)", "Serija 5 (L)", "Serija 6 (L)", "Serija 7 (XL)", "Serija 8 (L)", "X1 (M)", "X2 (M)", "X3 (L)", "X4 (L)", "X5 (L)", "X6 (L)", "X7 (XL)", "Z4 (S)", "i3 (S)", "i4 (M)", "iX (XL)"],
        "Citroen": ["Berlingo (L)", "C1 (XS)", "C2 (S)", "C3 (S)", "C4 (M)", "C5 (L)", "C6 (L)", "DS3 (S)", "DS4 (M)", "DS5 (L)", "Xsara (M)"],
        "Dacia": ["Dokker (L)", "Duster (L)", "Jogger (L)", "Logan (M)", "Sandero (S)", "Spring (S)"],
        "Fiat": ["500 (XS)", "500L (M)", "500X (M)", "Bravo (M)", "Doblo (L)", "Ducato (XL)", "Panda (XS)", "Punto (S)", "Stilo (M)", "Tipo (M)"],
        "Ford": ["Fiesta (S)", "Focus (M)", "Fusion (M)", "Kuga (L)", "Mondeo (L)", "Puma (M)", "Ranger (XL)", "S-Max (L)", "Transit (XL)"],
        "Hyundai": ["Accent (M)", "Elantra (M)", "Getz (S)", "Santa Fe (XL)", "Tucson (L)", "i10 (XS)", "i20 (S)", "i30 (M)", "i40 (L)"],
        "Kia": ["Ceed (M)", "Picanto (XS)", "Rio (S)", "Sorento (XL)", "Sportage (L)", "Stonic (M)"],
        "Mazda": ["2 (S)", "3 (M)", "6 (L)", "CX-3 (M)", "CX-30 (M)", "CX-5 (L)"],
        "Mercedes": ["A Klasa (S)", "B Klasa (M)", "C Klasa (M)", "CLA (M)", "CLS (L)", "E Klasa (L)", "G Klasa (XL)", "GLA (M)", "GLC (L)", "GLE (XL)", "S Klasa (XL)", "Vito (XL)", "Sprinter (XL)"],
        "Nissan": ["Juke (M)", "Micra (S)", "Navara (XL)", "Qashqai (L)", "X-Trail (L)"],
        "Opel": ["Astra (M)", "Corsa (S)", "Insignia (L)", "Meriva (M)", "Mokka (M)", "Vectra (M)", "Vivaro (XL)", "Zafira (L)"],
        "Peugeot": ["206 (S)", "207 (S)", "208 (S)", "307 (M)", "308 (M)", "508 (L)", "2008 (M)", "3008 (L)", "5008 (XL)", "Partner (L)", "Boxer (XL)"],
        "Renault": ["Captur (M)", "Clio (S)", "Espace (XL)", "Kadjar (L)", "Kangoo (L)", "Laguna (L)", "Megane (M)", "Scenic (L)", "Talisman (L)", "Traffic (XL)", "Twingo (XS)", "Master (XL)"],
        "Seat": ["Arona (M)", "Ateca (L)", "Ibiza (S)", "Leon (M)", "Tarraco (XL)"],
        "Skoda": ["Fabia (S)", "Kamiq (M)", "Karoq (L)", "Kodiaq (XL)", "Octavia (M)", "Rapid (M)", "Scala (M)", "Superb (L)"],
        "Suzuki": ["Ignis (XS)", "Jimny (S)", "Swift (S)", "SX4 (M)", "Vitara (L)"],
        "Toyota": ["Aygo (XS)", "Corolla (M)", "Hilux (XL)", "Land Cruiser (XL)", "Rav4 (L)", "Yaris (S)"],
        "Volkswagen": ["Amarok (XL)", "Arteon (L)", "Caddy (L)", "Golf 2 (S)", "Golf 4 (S)", "Golf 5 (M)", "Golf 6 (M)", "Golf 7 (M)", "Golf 8 (M)", "Passat (L)", "Polo (S)", "Tiguan (L)", "Touareg (L)", "Touran (L)", "Transporter (XL)", "Crafter (XL)"],
        "Volvo": ["S60 (M)", "S90 (L)", "V40 (M)", "XC40 (M)", "XC60 (L)", "XC90 (XL)"],
        "Zastava": ["Florinda (M)", "Skala (S)", "Yugo (XS)", "10 (S)"]
    };

    const cene = { "XS": 1600, "S": 1800, "M": 2200, "L": 2600, "XL": 3200 };
    const vremena = { "XS": 40, "S": 45, "M": 55, "L": 70, "XL": 110 };

    function inicijalizuj() {
        const mSel = document.getElementById("markaSel");
        Object.keys(baza).sort().forEach(m => {
            let o = document.createElement("option"); o.value = m; o.text = m; mSel.appendChild(o);
        });
    }

    function azurirajModele() {
        const m = document.getElementById("markaSel").value;
        const modSel = document.getElementById("modelSel");
        modSel.innerHTML = '<option value="" disabled selected>Odaberi model...</option>';
        baza[m].sort().forEach(mo => {
            let o = document.createElement("option"); o.value = mo; o.text = mo; modSel.appendChild(o);
        });
        izracunaj();
    }

    function izracunaj() {
        const modelStr = document.getElementById("modelSel").value;
        if(!modelStr || modelStr.includes("Odaberi")) {
            document.getElementById("rezultat").innerText = "0 RSD";
            document.getElementById("vreme").innerText = "Vreme rada: -- min";
            return;
        }
        const kat = modelStr.match(/\(([^)]+)\)/)[1];
        let f = 0, v = 0;
        if(document.getElementById("spolja").checked) { f += 0.5; v += Math.round(vremena[kat] * 0.35); }
        if(document.getElementById("unutra").checked) { f += 0.5; v += Math.round(vremena[kat] * 0.65); }
        document.getElementById("rezultat").innerText = Math.round(cene[kat] * f).toLocaleString() + " RSD";
        document.getElementById("vreme").innerText = v > 0 ? "Procenjeno vreme: ~" + v + " min" : "-- min";
    }

    function zakazi() {
        const m = document.getElementById("markaSel").value;
        const mo = document.getElementById("modelSel").value;
        if(!mo || mo.includes("Odaberi")) { alert("Odaberi auto!"); return; }
        const cena = document.getElementById("rezultat").innerText;
        const v = document.getElementById("vreme").innerText;
        window.open(`https://docs.google.com/forms/d/e/1FAIpQLSe1ZLTC1otAYCUCuvvZgsE8fOmNQR9JygNXWfyhfViyzA7LeQ/viewform?usp=pp_url&entry.345073777=${encodeURIComponent(m + " " + mo + " | " + v)}&entry.988818818=${encodeURIComponent(cena)}`, '_blank');
    }

    inicijalizuj();
</script>
</body>
</html>
