<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>KORICA | Auto nega</title>
    <style>
        :root { --gold: #d4af37; --black: #000; --dark: #111; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--black); color: white; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; }
        .header { border-left: 5px solid var(--gold); padding-left: 20px; margin-bottom: 40px; }
        h1 { color: var(--gold); margin: 0; letter-spacing: 8px; text-transform: uppercase; font-size: 32px; font-weight: 900; }
        .tagline { display: block; letter-spacing: 2px; font-size: 14px; margin-top: 5px; opacity: 0.8; }
        .group { margin-bottom: 20px; }
        label { display: block; color: #555; font-size: 11px; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        select { width: 100%; padding: 15px; background: var(--dark); color: white; border: 1px solid #333; border-radius: 4px; font-size: 16px; outline: none; appearance: none; }
        select:focus { border-color: var(--gold); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 30px; display: none; }
        .stat-card { background: #080808; border: 1px solid #222; padding: 15px; border-radius: 4px; }
        .stat-label { font-size: 10px; color: #555; text-transform: uppercase; display: block; }
        .stat-val { color: var(--gold); font-size: 18px; font-weight: bold; margin-top: 5px; display: block; }
        .total-box { margin-top: 20px; padding: 20px; border-top: 1px solid #222; text-align: right; display: none; }
        .price-val { font-size: 40px; color: var(--gold); font-weight: 900; display: block; }
        .btn-wa { background: var(--gold); color: black; border: none; padding: 20px; width: 100%; border-radius: 4px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>KORICA</h1>
        <span class="tagline">SINONIM KVALITETA</span>
    </div>

    <div class="group">
        <label>Marka</label>
        <select id="marka" onchange="loadModels()">
            <option value="" disabled selected>Izaberite marku...</option>
        </select>
    </div>

    <div class="group">
        <label>Model i godište</label>
        <select id="model" onchange="calculate()">
            <option value="" disabled selected>Prvo izaberite marku...</option>
        </select>
    </div>

    <div class="stats-grid" id="stats">
        <div class="stat-card"><span class="stat-label">Dužina</span><span class="stat-val" id="v-len">--</span></div>
        <div class="stat-card"><span class="stat-label">Širina</span><span class="stat-val" id="v-wid">--</span></div>
        <div class="stat-card" style="grid-column: span 2;"><span class="stat-label">Vremenski normativ</span><span class="stat-val" id="v-time">--</span></div>
    </div>

    <div class="total-box" id="price-box">
        <span style="font-size: 12px; color: #555;">UKUPNA CENA</span>
        <span class="price-val" id="v-price">0 RSD</span>
    </div>

    <button class="btn-wa" id="wa-btn" onclick="sendOrder()">Rezerviši tretman</button>
</div>

<script>
// Baza sa realnim modelima bez izmišljenih karavana
const db = {
    "Alfa Romeo": [
        "147 (2000-2010)|900|800|422|173|70",
        "156 Sedan (1997-2007)|950|850|443|174|80",
        "156 Sportwagon (1997-2007)|1050|950|443|174|90",
        "159 Sedan (2005-2011)|1100|1000|466|183|90",
        "159 Sportwagon (2005-2011)|1200|1100|466|183|100",
        "Giulia (2016-2026)|1100|1000|464|186|95",
        "Giulietta (2010-2020)|1000|900|435|180|85",
        "Stelvio (2016-2026)|1300|1200|468|190|120",
        "MiTo (2008-2018)|850|750|406|172|65",
        "Brera (2005-2010)|1000|900|441|183|80"
    ],
    "Audi": [
        "A1 (2010-2018)|850|750|395|174|65",
        "A3 8P Hatchback (2003-2013)|950|850|423|176|80",
        "A3 8P Sportback (2004-2013)|1000|900|429|176|85",
        "A4 B8 Sedan (2008-2016)|1100|1000|470|182|100",
        "A4 B8 Avant (2008-2016)|1200|1100|470|182|110",
        "A6 C7 Sedan (2011-2018)|1250|1150|491|187|120",
        "A6 C7 Avant (2011-2018)|1350|1250|491|187|130",
        "Q5 G1 (2008-2016)|1300|1200|463|188|125",
        "Q7 G2 (2015-2026)|1700|1600|506|197|175"
    ],
    "BMW": [
        "Serija 1 F20 (2011-2019)|1000|900|432|176|85",
        "Serija 3 E46 Sedan (1998-2005)|1050|950|447|174|90",
        "Serija 3 E46 Touring (1998-2005)|1150|1050|448|174|100",
        "Serija 3 E90 Sedan (2005-2011)|1100|1000|452|181|100",
        "Serija 5 F10 (2010-2017)|1300|1200|489|186|130",
        "X3 G01 (2017-2026)|1400|1300|471|189|135",
        "X5 G05 (2018-2026)|1800|1700|492|200|180"
    ],
    "Volkswagen": [
        "Golf 4 (1997-2004)|1000|900|414|173|85",
        "Golf 4 Variant (1999-2006)|1100|1000|439|173|95",
        "Golf 7 (2012-2020)|1150|1050|425|179|105",
        "Passat B6 Sedan (2005-2010)|1200|1100|476|182|115",
        "Passat B6 Variant (2005-2010)|1300|1200|477|182|125",
        "Tiguan G2 (2016-2024)|1350|1250|448|184|130"
    ],
    "Mercedes-Benz": [
        "C-Klasa W204 Sedan (2007-2014)|1200|1100|458|177|110",
        "C-Klasa S204 Karavan (2007-2014)|1300|1200|460|177|120",
        "E-Klasa W212 Sedan (2009-2016)|1300|1200|486|185|125",
        "E-Klasa S212 Karavan (2009-2016)|1450|1350|490|185|140"
    ]
};

// Funkcija koja će popuniti listu do 1000 modela bez logičkih grešaka
function fillTo1000() {
    // Ovde ćemo dodati sve preostale marke (Peugeot, Renault, Fiat, Opel...) 
    // sa njihovim realnim verzijama Hatchback, SW, Sedan tamo gde postoje.
}

function init() {
    fillTo1000();
    const mSel = document.getElementById("marka");
    Object.keys(db).sort().forEach(m => mSel.options.add(new Option(m, m)));
}

function loadModels() {
    const m = document.getElementById("marka").value;
    const modSel = document.getElementById("model");
    modSel.innerHTML = '<option value="" disabled selected>Izaberite model...</option>';
    db[m].forEach((item, index) => {
        modSel.options.add(new Option(item.split('|')[0], index));
    });
    document.getElementById("stats").style.display = "none";
    document.getElementById("price-box").style.display = "none";
    document.getElementById("wa-btn").style.display = "none";
}

function calculate() {
    const m = document.getElementById("marka").value;
    const idx = document.getElementById("model").value;
    const [name, pS, pU, len, wid, time] = db[m][idx].split('|');

    document.getElementById("v-len").innerText = len + " cm";
    document.getElementById("v-wid").innerText = wid + " cm";
    document.getElementById("v-time").innerText = time + " min";
    document.getElementById("v-price").innerText = (parseInt(pS) + parseInt(pU)).toLocaleString() + " RSD";

    document.getElementById("stats").style.display = "grid";
    document.getElementById("price-box").style.display = "block";
    document.getElementById("wa-btn").style.display = "block";
}

function sendOrder() {
    const m = document.getElementById("marka").value;
    const mod = document.getElementById("model").options[document.getElementById("model").selectedIndex].text;
    const price = document.getElementById("v-price").innerText;
    const msg = `KORICA Auto nega%0AUpit: ${m} ${mod}%0ACena: ${price}`;
    window.open(`https://wa.me/381600000000?text=${msg}`);
}

window.onload = init;
</script>
</body>
</html>
