<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORICA Auto Nega | Kalkulator Gabarita</title>
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; }
        body {
            background: var(--black); color: white; font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }
        .card {
            background: rgba(20, 20, 20, 0.98); padding: 30px; border-radius: 25px;
            border: 1px solid var(--gold); width: 100%; max-width: 450px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        h1 { color: var(--gold); margin: 0; letter-spacing: 5px; text-transform: uppercase; font-size: 30px; font-weight: 800; }
        .subtitle { color: #888; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 25px; }
        .group { text-align: left; margin-bottom: 15px; }
        label { display: block; color: var(--gold); margin-bottom: 5px; font-weight: 600; font-size: 11px; text-transform: uppercase; }
        select {
            width: 100%; padding: 12px; background: #111; color: white;
            border: 1px solid #333; border-radius: 10px; font-size: 14px; outline: none;
        }
        .services-container {
            background: #111; padding: 15px; border-radius: 12px; border: 1px solid #333;
            display: flex; flex-direction: column; gap: 12px; margin-top: 10px;
        }
        .service-item {
            display: flex; align-items: center; justify-content: flex-start; gap: 12px;
            cursor: pointer; font-size: 14px;
        }
        input[type="checkbox"] { accent-color: var(--gold); width: 20px; height: 20px; }
        .price-box {
            margin: 20px 0; padding: 15px; background: rgba(212, 175, 55, 0.05);
            border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .price-tag { font-size: 38px; color: var(--gold); font-weight: 800; }
        .time-info { color: #888; font-size: 12px; margin-top: 5px; font-style: italic; }
        .btn {
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: black; border: none; padding: 18px; width: 100%;
            border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
    <h1>KORICA</h1>
    <div class="subtitle">Auto Nega Sremčica | Koch-Chemie</div>
    
    <div class="group">
        <label>1. Marka vozila</label>
        <select id="markaSel" onchange="azurirajModele()">
            <option value="" selected disabled>Izaberi...</option>
        </select>
    </div>

    <div class="group">
        <label>2. Model vozila (Gabarit)</label>
        <select id="modelSel" onchange="izracunaj()">
            <option value="">Prvo marka...</option>
        </select>
    </div>

    <div class="group">
        <label>3. Usluge</label>
        <div class="services-container">
            <label class="service-item">
                <input type="checkbox" id="spolja" onchange="izracunaj()" checked> Spoljašnje pranje
            </label>
            <label class="service-item">
                <input type="checkbox" id="unutra" onchange="izracunaj()" checked> Unutrašnje održavanje
            </label>
        </div>
    </div>

    <div class="price-box">
        <div class="price-tag" id="rezultat">0 RSD</div>
        <div class="time-info" id="vreme">Vreme rada: -- min</div>
    </div>

    <button class="btn" onclick="zakazi()">Rezerviši Termin</button>
</div>

<script>
    // BAZA: n = naziv, c = puna cena (komplet), v = vreme u minutima za komplet
    const baza = {
        "Audi": [{n:"A1 (S)",c:1800,v:60},{n:"A3 (M)",c:2200,v:75},{n:"A4 (M)",c:2200,v:75},{n:"A6 (L)",c:2600,v:90},{n:"Q7 (XL)",c:3200,v:120}],
        "BMW": [{n:"Serija 1 (S)",c:1800,v:60},{n:"Serija 3 (M)",c:2200,v:75},{n:"Serija 5 (L)",c:2600,v:90},{n:"X5 (L)",c:2600,v:90},{n:"X7 (XL)",c:3200,v:120}],
        "Fiat": [{n:"500 (XS)",c:1600,v:50},{n:"Punto (S)",c:1800,v:60},{n:"Tipo (M)",c:2200,v:75}],
        "Mercedes": [{n:"A Klasa (S)",c:1800,v:60},{n:"C Klasa (M)",c:2200,v:75},{n:"E Klasa (L)",c:2600,v:90},{n:"GLE (L)",c:2600,v:90},{n:"S Klasa (XL)",c:3200,v:120}],
        "Volkswagen": [{n:"Up! (XS)",c:1600,v:50},{n:"Polo (S)",c:1800,v:60},{n:"Golf (M)",c:2200,v:75},{n:"Passat (L)",c:2600,v:90},{n:"Touareg (L)",c:2600,v:90},{n:"Transporter (XL)",c:3200,v:120}],
        "Skoda": [{n:"Fabia (S)",c:1800,v:60},{n:"Octavia (M)",c:2200,v:75},{n:"Superb (L)",c:2600,v:90},{n:"Kodiaq (L)",c:2600,v:90}]
    };

    function inicijalizuj() {
        const mSel = document.getElementById("markaSel");
        Object.keys(baza).sort().forEach(m => {
            let o = document.createElement("option"); o.value = m; o.text = m; mSel.appendChild(o);
        });
    }

    function azurirajModele() {
        const m = document.getElementById("markaSel").value;
        const modSel = document.getElementById("modelSel");
        modSel.innerHTML = '<option value="" disabled selected>Model...</option>';
        baza[m].forEach(mo => {
            let o = document.createElement("option"); 
            o.value = JSON.stringify({c: mo.c, v: mo.v}); 
            o.text = mo.n; 
            modSel.appendChild(o);
        });
        izracunaj();
    }

    function izracunaj() {
        const modelData = document.getElementById("modelSel").value;
        if(!modelData) return;
        const data = JSON.parse(modelData);
        
        let s = document.getElementById("spolja").checked;
        let u = document.getElementById("unutra").checked;
        
        let faktor = 0;
        let vremeFaktor = 0;
        
        if(s) { faktor += 0.5; vremeFaktor += 0.4; } // Spolja uzima oko 40% vremena kompleta
        if(u) { faktor += 0.5; vremeFaktor += 0.6; } // Unutra uzima oko 60% vremena kompleta

        document.getElementById("rezultat").innerText = Math.round(data.c * faktor).toLocaleString() + " RSD";
        document.getElementById("vreme").innerText = "Vreme rada: ~" + Math.round(data.v * vremeFaktor) + " min";
    }

    function zakazi() {
        const m = document.getElementById("markaSel").value;
        const modEl = document.getElementById("modelSel");
        if(modEl.selectedIndex <= 0) { alert("Odaberi auto!"); return; }
        const c = document.getElementById("rezultat").innerText;
        const v = document.getElementById("vreme").innerText;
        const bURL = "https://docs.google.com/forms/d/e/1FAIpQLSe1ZLTC1otAYCUCuvvZgsE8fOmNQR9JygNXWfyhfViyzA7LeQ/viewform?usp=pp_url";
        window.open(`${bURL}&entry.345073777=${encodeURIComponent(m + " " + modEl.options[modEl.selectedIndex].text)}&entry.988818818=${encodeURIComponent(c + " / " + v)}`, '_blank');
    }

    inicijalizuj();
</script>

</body>
</html>
