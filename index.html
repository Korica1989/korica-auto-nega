<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORICA Auto Nega | Pametna Rezervacija</title>
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --dark: #111; }
        body {
            background: var(--black); color: white; font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }
        .card {
            background: rgba(20, 20, 20, 0.98); padding: 35px; border-radius: 30px;
            border: 1px solid var(--gold); width: 100%; max-width: 480px; text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
        }
        h1 { color: var(--gold); margin: 0; letter-spacing: 6px; text-transform: uppercase; font-size: 34px; font-weight: 800; }
        .subtitle { color: #888; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 30px; }
        
        .group { text-align: left; margin-bottom: 22px; }
        label { display: block; color: var(--gold); margin-bottom: 10px; font-weight: 600; font-size: 12px; text-transform: uppercase; }
        
        select {
            width: 100%; padding: 16px; background: var(--dark); color: white;
            border: 1px solid #333; border-radius: 14px; font-size: 16px; outline: none;
        }

        .services-container {
            background: var(--dark); padding: 18px; border-radius: 14px; border: 1px solid #333;
            display: flex; flex-direction: column; gap: 14px;
        }
        .service-item { display: flex; align-items: center; gap: 14px; cursor: pointer; font-size: 15px; }
        input[type="checkbox"] { accent-color: var(--gold); width: 24px; height: 24px; }

        .note-box {
            display: none; margin-top: 15px; padding: 12px; 
            background: rgba(0, 255, 204, 0.05); border: 1px dashed #00ffcc;
            border-radius: 10px; font-size: 12px; color: #00ffcc; text-align: left;
        }

        .price-box {
            margin: 30px 0; padding: 30px; background: rgba(212, 175, 55, 0.05);
            border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .price-tag { font-size: 52px; color: var(--gold); font-weight: 800; line-height: 1; }
        
        .btn {
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: black; border: none; padding: 22px; width: 100%;
            border-radius: 16px; font-weight: 800; cursor: pointer; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>KORICA</h1>
    <div class="subtitle">Auto Nega | Detalji prave razliku</div>
    
    <div class="group">
        <label>Vozilo</label>
        <select id="markaSel" onchange="azurirajModele()"></select>
        <select id="modelSel" onchange="izracunaj()" style="margin-top:10px;"></select>
    </div>

    <div class="group">
        <label>Usluga</label>
        <div class="services-container">
            <label class="service-item"><input type="checkbox" id="spolja" onchange="izracunaj()" checked> Nega karoserije</label>
            <label class="service-item"><input type="checkbox" id="unutra" onchange="izracunaj()" checked> Nega kabine</label>
        </div>
        <div id="pragoviNote" class="note-box">
            ✨ <b>Premium dodatak:</b> Budući da ste odabrali samo spoljašnje pranje, uključili smo detaljno brisanje pragova (+100 RSD) kako bi ulazak u vozilo bio besprekoran.
        </div>
    </div>

    <div class="price-box">
        <div class="price-tag" id="rezultat">0 RSD</div>
    </div>

    <button class="btn" onclick="zakazi()">Zakaži termin</button>
</div>

<script>
    const baza = {
        "Audi": ["A1|700|500", "A3|800|600", "A4|1000|800", "A6|1100|900", "A8|1400|1200"],
        "BMW": ["Serija 1|800|600", "Serija 3|900|700", "Serija 5|1100|900", "Serija 7|1400|1200"],
        "Mercedes-Benz": ["A Klasa|800|600", "C Klasa|1000|800", "E Klasa|1100|900", "S Klasa|1400|1200"],
        "Volkswagen": ["Polo|700|500", "Golf|850|650", "Passat|1000|800"]
    };

    function inicijalizuj() {
        const mSel = document.getElementById("markaSel");
        mSel.innerHTML = '<option value="" disabled selected>Marka...</option>';
        Object.keys(baza).sort().forEach(m => {
            let o = document.createElement("option"); o.value = m; o.text = m; mSel.appendChild(o);
        });
    }

    function azurirajModele() {
        const m = document.getElementById("markaSel").value;
        const modSel = document.getElementById("modelSel");
        modSel.innerHTML = '<option value="" disabled selected>Model...</option>';
        baza[m].forEach(mo => {
            let [ime] = mo.split('|');
            let o = document.createElement("option"); o.value = mo; o.text = ime; modSel.appendChild(o);
        });
        izracunaj();
    }

    function izracunaj() {
        const val = document.getElementById("modelSel").value;
        if(!val) return;
        let [ime, cS, cU] = val.split('|');
        
        const isSpolja = document.getElementById("spolja").checked;
        const isUnutra = document.getElementById("unutra").checked;
        const note = document.getElementById("pragoviNote");
        
        let ukupno = 0;
        if(isSpolja) ukupno += parseInt(cS);
        if(isUnutra) ukupno += parseInt(cU);

        // LOGIKA ZA PRAGOVE: Samo ako je spolja ON, a unutra OFF
        if(isSpolja && !isUnutra) {
            ukupno += 100;
            note.style.display = "block";
        } else {
            note.style.display = "none";
        }

        document.getElementById("rezultat").innerText = ukupno.toLocaleString() + " RSD";
    }

    function zakazi() {
        const cena = document.getElementById("rezultat").innerText;
        alert("Termin rezervisan! Cena: " + cena);
    }

    inicijalizuj();
</script>
</body>
</html>
