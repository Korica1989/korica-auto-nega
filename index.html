<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>KORICA Auto Nega | Rezervacije</title>
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --dark: #111; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            background: var(--black); color: white; font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 15px;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }
        .card {
            background: rgba(20, 20, 20, 0.98); padding: 25px; border-radius: 25px;
            border: 1px solid var(--gold); width: 100%; max-width: 500px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        h1 { color: var(--gold); margin: 0; letter-spacing: 4px; text-transform: uppercase; font-size: 28px; font-weight: 800; }
        .subtitle { color: #888; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 25px; }
        
        .group { text-align: left; margin-bottom: 18px; }
        label { display: block; color: var(--gold); margin-bottom: 8px; font-weight: 600; font-size: 11px; text-transform: uppercase; }
        
        select {
            width: 100%; padding: 14px; background: var(--dark); color: white;
            border: 1px solid #333; border-radius: 12px; font-size: 15px; outline: none; appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23d4af37' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 15px center; background-size: 15px;
        }

        .services-container {
            background: var(--dark); padding: 15px; border-radius: 12px; border: 1px solid #333;
            display: flex; flex-direction: column; gap: 12px;
        }
        .service-item { display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 14px; }
        input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--gold); }

        .note-box {
            display: none; margin-top: 12px; padding: 12px; 
            border-radius: 10px; font-size: 11px; text-align: left; line-height: 1.5;
        }
        .note-standard { background: rgba(212, 175, 55, 0.05); border: 1px dashed var(--gold); color: var(--gold); }
        .note-karavan { background: rgba(0, 255, 204, 0.05); border: 1px dashed #00ffcc; color: #00ffcc; margin-top: 8px; }

        .price-box { margin: 20px 0; padding: 20px; background: rgba(212, 175, 55, 0.03); border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.1); }
        .price-tag { font-size: 42px; color: var(--gold); font-weight: 800; }
        .time-info { color: #00ffcc; font-size: 12px; margin-top: 8px; font-weight: 600; text-transform: uppercase; }

        .btn {
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: black; border: none; padding: 18px; width: 100%;
            border-radius: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 14px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
    <h1>KORICA</h1>
    <div class="subtitle">Auto Nega | Sremčica</div>
    
    <div class="group">
        <label>1. Brend vozila</label>
        <select id="markaSel"></select>
    </div>

    <div class="group">
        <label>2. Model</label>
        <select id="modelSel">
            <option value="">Prvo odaberi brend...</option>
        </select>
    </div>

    <div class="group">
        <label>3. Generacija (Godište)</label>
        <select id="genSel">
            <option value="">Prvo odaberi model...</option>
        </select>
    </div>

    <div class="group">
        <label>4. Usluge</label>
        <div class="services-container">
            <label class="service-item"><input type="checkbox" id="spolja" checked> Spoljašnje pranje</label>
            <label class="service-item"><input type="checkbox" id="unutra" checked> Unutrašnje čišćenje</label>
        </div>
        <div id="pragoviNote" class="note-box note-standard">
            ✨ <b>KORICA Standard:</b> Uz pranje spolja, uključeno je detaljno čišćenje pragova (+100 RSD).
        </div>
        <div id="karavanNote" class="note-box note-karavan">
            📦 <b>Gabariti vozila:</b> Zbog većih gabarita i obimnijeg enterijera ove generacije, potrebno je dodatno vreme za rad.
        </div>
    </div>

    <div class="price-box">
        <div class="price-tag" id="rezultat">0 RSD</div>
        <div id="vreme" class="time-info">Spreman</div>
    </div>

    <button class="btn" onclick="zakazi()">Rezerviši termin</button>
</div>

<script>
    // Baza sa strukturama po generacijama: [Ime Generacije|Spolja|Unutra|Minuta]
    const baza = {
        "Audi": {
            "A3": ["Starija generacija (do 2003)|600|500|40", "Srednja generacija (2003-2012)|700|600|50", "Moderna generacija (2012-2020)|800|700|55", "Nova generacija (2020+)|900|800|65"],
            "A4 Limuzina": ["Starija generacija (do 2008)|750|650|55", "Moderna generacija (2008-2016)|850|750|65", "Nova generacija (2016+)|950|850|75"],
            "A4 Karavan (Avant)": ["Starija generacija (do 2008)|850|750|65", "Moderna generacija (2008-2016)|950|850|75", "Nova generacija (2016+)|1050|950|85"],
            "Q5 SUV": ["Prva generacija (do 2017)|1000|900|70", "Nova generacija (2017+)|1150|1050|85"]
        },
        "Volkswagen": {
            "Golf": ["Golf 4 i stariji|650|550|40", "Golf 5 i 6|750|650|50", "Golf 7|850|750|60", "Golf 8 (2020+)|950|850|70"],
            "Passat Limuzina": ["B5.5 i stariji|750|650|55", "Passat B6 i B7|850|750|65", "Passat B8 (2015+)|950|850|75"],
            "Passat Karavan": ["B5.5 i stariji|850|750|65", "Passat B6 i B7|950|850|75", "Passat B8 (2015+)|1050|950|85"]
        },
        "Ford": {
            "Focus": ["Prva gen (do 2004)|650|550|40", "Druga i Treća gen|750|650|55", "Nova gen (2018+)|850|750|65"],
            "Mondeo Karavan": ["Stariji modeli|850|750|65", "Noviji modeli (2014+)|1000|900|80"]
        }
        // Ovde se lako dodaju ostale marke na isti način
    };

    const mSel = document.getElementById("markaSel");
    const modSel = document.getElementById("modelSel");
    const genSel = document.getElementById("genSel");
    const cSpolja = document.getElementById("spolja");
    const cUnutra = document.getElementById("unutra");

    function inicijalizuj() {
        mSel.innerHTML = '<option value="" disabled selected>Izaberi marku...</option>';
        Object.keys(baza).sort().forEach(m => {
            let o = document.createElement("option"); o.value = m; o.text = m; mSel.appendChild(o);
        });
    }

    mSel.addEventListener('change', () => {
        const m = mSel.value;
        modSel.innerHTML = '<option value="" disabled selected>Izaberi model...</option>';
        genSel.innerHTML = '<option value="">Prvo odaberi model...</option>';
        Object.keys(baza[m]).forEach(mod => {
            let o = document.createElement("option"); o.value = mod; o.text = mod; modSel.appendChild(o);
        });
        izracunaj();
    });

    modSel.addEventListener('change', () => {
        const m = mSel.value;
        const mod = modSel.value;
        genSel.innerHTML = '<option value="" disabled selected>Izaberi generaciju...</option>';
        baza[m][mod].forEach(g => {
            let [ime] = g.split('|');
            let o = document.createElement("option"); o.value = g; o.text = ime; genSel.appendChild(o);
        });
        izracunaj();
    });

    [genSel, cSpolja, cUnutra].forEach(el => {
        el.addEventListener('change', izracunaj);
    });

    function izracunaj() {
        const val = genSel.value;
        const pNote = document.getElementById("pragoviNote");
        const kNote = document.getElementById("karavanNote");
        
        if(!val || val.includes("Prvo odaberi")) {
            document.getElementById("rezultat").innerText = "0 RSD";
            document.getElementById("vreme").innerText = "Spreman";
            return;
        }

        let [ime, cS, cU, min] = val.split('|');
        let ukupno = 0;
        let t = parseInt(min);

        if(cSpolja.checked) { ukupno += Number(cS); }
        if(cUnutra.checked) { ukupno += Number(cU); }

        // Prikaz napomene za gabarite ako je model Karavan ili Nova generacija
        const modelIme = modSel.value.toLowerCase();
        const genIme = ime.toLowerCase();
        if(modelIme.includes("karavan") || modelIme.includes("suv") || genIme.includes("nova") || genIme.includes("moderna")) {
            kNote.style.display = "block";
        } else {
            kNote.style.display = "none";
        }

        if(cSpolja.checked && !cUnutra.checked) {
            ukupno += 100;
            pNote.style.display = "block";
        } else {
            pNote.style.display = "none";
        }

        document.getElementById("rezultat").innerText = ukupno.toLocaleString() + " RSD";
        document.getElementById("vreme").innerText = (cSpolja.checked || cUnutra.checked) ? "~" + t + " MINUTA" : "Spreman";
    }

    function zakazi() {
        if(!genSel.value) { alert("Molimo Vas, izaberite vozilo i generaciju."); return; }
        const poruka = `Pozdrav! Rezervisao bih termin.\nVozilo: ${mSel.value} ${modSel.value}\nGeneracija: ${genSel.value.split('|')[0]}\nCena: ${document.getElementById("rezultat").innerText}`;
        window.open(`https://wa.me/38164XXXXXXX?text=${encodeURIComponent(poruka)}`, '_blank');
    }

    window.onload = inicijalizuj;
</script>
</body>
</html>
