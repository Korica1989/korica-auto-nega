<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>KORICA | Precision Auto Care</title>
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --dark: #151515; --accent: #00ffcc; }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--black); color: white; display: flex; justify-content: center; padding: 15px; margin: 0; min-height: 100vh; }
        .card { background: var(--dark); padding: 25px; border-radius: 30px; border: 1px solid var(--gold); width: 100%; max-width: 500px; position: relative; }
        
        /* Fiksni Info Panel - Ono što si tražio da bude stalno na ekranu */
        .tech-info { 
            background: rgba(0, 0, 0, 0.5); 
            border: 1px dashed var(--gold); 
            padding: 15px; 
            border-radius: 15px; 
            margin-bottom: 20px; 
            font-size: 12px; 
            text-align: left;
        }
        .tech-line { display: flex; justify-content: space-between; margin-bottom: 5px; color: #888; }
        .tech-val { color: var(--accent); font-weight: bold; }

        h1 { color: var(--gold); margin: 0; letter-spacing: 5px; text-transform: uppercase; font-size: 28px; text-align: center; }
        .subtitle { color: #888; font-size: 10px; letter-spacing: 3px; text-align: center; margin-bottom: 20px; display: block; }

        select { width: 100%; padding: 15px; background: #000; color: white; border: 1px solid #333; border-radius: 12px; margin-bottom: 15px; outline: none; }
        .services { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .service-item { background: #000; padding: 15px; border-radius: 12px; border: 1px solid #333; text-align: center; cursor: pointer; }
        .service-item input { display: none; }
        .service-item.active { border-color: var(--gold); background: rgba(212, 175, 55, 0.1); }

        .price-display { margin-top: 20px; padding: 20px; background: #000; border-radius: 20px; text-align: center; border: 1px solid var(--gold); }
        .total-price { font-size: 42px; font-weight: 900; color: var(--gold); display: block; }
        .btn { background: var(--gold); color: black; border: none; padding: 20px; width: 100%; border-radius: 15px; font-weight: 900; margin-top: 20px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="card">
    <h1>KORICA</h1>
    <span class="subtitle">Sistem preciznog održavanja</span>

    <div class="tech-info" id="techPanel">
        <div class="tech-line">Analiza površine školjke: <span class="tech-val" id="povrsina">0 m²</span></div>
        <div class="tech-line">Složenost enterijera: <span class="tech-val" id="slozenost">0%</span></div>
        <div class="tech-line">Utrošak preparata: <span class="tech-val" id="utrosak">0.00 L</span></div>
        <div class="tech-line">Vreme tretmana: <span class="tech-val" id="vreme">0 min</span></div>
    </div>

    <label style="font-size: 11px; color: var(--gold);">MARKA VOZILA</label>
    <select id="marka" onchange="updateModels()"></select>

    <label style="font-size: 11px; color: var(--gold);">MODEL I GODIŠTE</label>
    <select id="model" onchange="calculate()"></select>

    <div class="services">
        <div class="service-item active" id="btnS" onclick="toggleS('spolja')">SPOLJAŠNJOST</div>
        <div class="service-item active" id="btnU" onclick="toggleS('unutra')">UNUTRAŠNJOST</div>
    </div>

    <div class="price-display">
        <span style="font-size: 10px; color: #888; letter-spacing: 2px;">PRECIZNA CENA ODRŽAVANJA</span>
        <span class="total-price" id="finalnaCena">0 RSD</span>
    </div>

    <button class="btn" onclick="sendWA()">Rezerviši termin</button>
</div>

<script>
// Dodao sam koeficijente koji simuliraju tvoj "skener" vozila
const data = {
    "Volkswagen": [
        "Golf 7 (2012-2020)|1000|900|12.5|60|65", // Model|C.Spolja|C.Unutra|Površina m2|Složenost %|Vreme min
        "Passat B8 (2014-2023)|1100|1000|14.2|75|85",
        "Passat B8 Variant (Karavan)|1200|1100|16.5|80|100",
        "Touareg (2018-2024)|1400|1300|22.8|95|140"
    ],
    "BMW": [
        "Serija 3 G20 (2019-2024)|1100|1000|13.8|70|85",
        "Serija 5 G30 (2017-2023)|1200|1100|15.5|85|110",
        "X5 G05 (2018-2024)|1400|1300|21.5|95|135"
    ]
};

let spoljaActive = true;
let unutraActive = true;

function init() {
    const mSel = document.getElementById("marka");
    Object.keys(data).sort().forEach(m => mSel.options.add(new Option(m, m)));
    updateModels();
}

function updateModels() {
    const m = document.getElementById("marka").value;
    const modSel = document.getElementById("model");
    modSel.innerHTML = "";
    data[m].forEach((item, index) => modSel.options.add(new Option(item.split('|')[0], index)));
    calculate();
}

function toggleS(tip) {
    if(tip === 'spolja') {
        spoljaActive = !spoljaActive;
        document.getElementById('btnS').classList.toggle('active');
    } else {
        unutraActive = !unutraActive;
        document.getElementById('btnU').classList.toggle('active');
    }
    calculate();
}

function calculate() {
    const m = document.getElementById("marka").value;
    const idx = document.getElementById("model").value;
    const [ime, cS, cU, m2, complex, min] = data[m][idx].split('|');

    let total = 0;
    if(spoljaActive) total += parseInt(cS);
    if(unutraActive) total += parseInt(cU);
    if((spoljaActive && !unutraActive) || (!spoljaActive && unutraActive)) total += 100;

    // Ažuriranje tehničkog panela (Ono što klijent vidi non-stop)
    document.getElementById("povrsina").innerText = spoljaActive ? m2 + " m²" : "0 m²";
    document.getElementById("slozenost").innerText = unutraActive ? complex + "%" : "0%";
    document.getElementById("utrosak").innerText = ((spoljaActive ? (m2 * 0.05) : 0) + (unutraActive ? 0.2 : 0)).toFixed(2) + " L";
    document.getElementById("vreme").innerText = ((spoljaActive ? (min*0.6) : 0) + (unutraActive ? (min*0.4) : 0)).toFixed(0) + " min";
    
    document.getElementById("finalnaCena").innerText = total.toLocaleString() + " RSD";
}

function sendWA() {
    const cena = document.getElementById("finalnaCena").innerText;
    const m = document.getElementById("marka").value;
    const mod = document.getElementById("model").options[document.getElementById("model").selectedIndex].text;
    const msg = `KORICA - Upit za termin: ${m} ${mod}. Precizna cena: ${cena}.`;
    window.open(`https://wa.me/38164XXXXXXX?text=${encodeURIComponent(msg)}`);
}

window.onload = init;
</script>
</body>
</html>
