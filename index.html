<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORICA Auto Nega | Rezervacija</title>
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; }
        body {
            background: var(--black); color: white; font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }
        .card {
            background: rgba(20, 20, 20, 0.98); padding: 30px; border-radius: 25px;
            border: 1px solid var(--gold); width: 100%; max-width: 450px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        h1 { color: var(--gold); margin: 0; letter-spacing: 5px; text-transform: uppercase; font-size: 30px; font-weight: 800; }
        .subtitle { color: #888; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 25px; }
        .group { text-align: left; margin-bottom: 15px; }
        label { display: block; color: var(--gold); margin-bottom: 5px; font-weight: 600; font-size: 11px; text-transform: uppercase; }
        select {
            width: 100%; padding: 12px; background: #111; color: white;
            border: 1px solid #333; border-radius: 10px; font-size: 14px; outline: none;
        }
        .services-container {
            background: #111; padding: 15px; border-radius: 12px; border: 1px solid #333;
            display: flex; flex-direction: column; gap: 12px; margin-top: 10px;
        }
        .service-item { display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 14px; }
        input[type="checkbox"] { accent-color: var(--gold); width: 20px; height: 20px; cursor: pointer; }
        .price-box {
            margin: 20px 0; padding: 15px; background: rgba(212, 175, 55, 0.05);
            border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .price-tag { font-size: 38px; color: var(--gold); font-weight: 800; }
        .time-info { color: #00ffcc; font-size: 13px; margin-top: 5px; font-weight: 600; }
        .btn {
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: black; border: none; padding: 18px; width: 100%;
            border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
    <h1>KORICA</h1>
    <div class="subtitle">Auto Nega Sremčica | Koch-Chemie</div>
    
    <div class="group">
        <label>1. Marka vozila</label>
        <select id="markaSel" onchange="azurirajModele()">
            <option value="" selected disabled>Izaberi marku...</option>
        </select>
    </div>

    <div class="group">
        <label>2. Model vozila</label>
        <select id="modelSel" onchange="izracunaj()">
            <option value="">Prvo marka...</option>
        </select>
    </div>

    <div class="group">
        <label>3. Usluge</label>
        <div class="services-container">
            <label class="service-item"><input type="checkbox" id="spolja" onchange="izracunaj()" checked> Spoljašnje pranje</label>
            <label class="service-item"><input type="checkbox" id="unutra" onchange="izracunaj()" checked> Unutrašnje održavanje</label>
        </div>
    </div>

    <div class="price-box">
        <div class="price-tag" id="rezultat">0 RSD</div>
        <div class="time-info" id="vreme">Vreme rada: -- min</div>
    </div>

    <button class="btn" onclick="zakazi()">Rezerviši Termin</button>
</div>

<script>
    const baza = {
        "Abarth":[{n:"595 (XS)",c:1600,v:40}], "Alfa Romeo":[{n:"Giulietta (M)",c:2200,v:50},{n:"Stelvio (L)",c:2600,v:60}],
        "Aston Martin":[{n:"DB11 (L)",c:3000,v:70}], "Audi":[{n:"A1 (S)",c:1800,v:45},{n:"A3 (M)",c:2200,v:50},{n:"A4 (M)",c:2200,v:55},{n:"A6 (L)",c:2600,v:65},{n:"Q7 (XL)",c:3200,v:85}],
        "Bentley":[{n:"Bentayga (XL)",c:3800,v:100}], "BMW":[{n:"Serija 1 (S)",c:1800,v:45},{n:"Serija 3 (M)",c:2200,v:55},{n:"Serija 5 (L)",c:2600,v:65},{n:"X5 (L)",c:2600,v:70},{n:"X7 (XL)",c:3200,v:90}],
        "Cadillac":[{n:"Escalade (XL)",c:3800,v:110}], "Chevrolet":[{n:"Spark (XS)",c:1600,v:40},{n:"Cruze (M)",c:2200,v:55}],
        "Chrysler":[{n:"300C (L)",c:2600,v:70}], "Citroen":[{n:"C3 (S)",c:1800,v:45},{n:"C4 (M)",c:2200,v:55},{n:"C5 (L)",c:2600,v:65}],
        "Cupra":[{n:"Formentor (M)",c:2200,v:55}], "Dacia":[{n:"Sandero (S)",c:1800,v:45},{n:"Duster (L)",c:2600,v:65}],
        "Daewoo":[{n:"Matiz (XS)",c:1600,v:40}], "Daihatsu":[{n:"Terios (S)",c:1800,v:45}],
        "Dodge":[{n:"Ram (XL)",c:3800,v:110}], "Ferrari":[{n:"488 (M)",c:3000,v:70}],
        "Fiat":[{n:"500 (XS)",c:1600,v:40},{n:"Punto (S)",c:1800,v:45},{n:"Tipo (M)",c:2200,v:55},{n:"Ducato (XL)",c:3800,v:120}],
        "Ford":[{n:"Fiesta (S)",c:1800,v:45},{n:"Focus (M)",c:2200,v:55},{n:"Mondeo (L)",c:2600,v:65},{n:"Ranger (XL)",c:3500,v:95}],
        "Honda":[{n:"Civic (M)",c:2200,v:55},{n:"CR-V (L)",c:2600,v:70}], "Hyundai":[{n:"i20 (S)",c:1800,v:45},{n:"Tucson (L)",c:2600,v:70}],
        "Infiniti":[{n:"QX70 (L)",c:2600,v:70}], "Jaguar":[{n:"F-Pace (L)",c:2600,v:70}], "Jeep":[{n:"Grand Cherokee (L)",c:2800,v:75}],
        "Kia":[{n:"Sportage (L)",c:2600,v:70}], "Lada":[{n:"Niva (S)",c:1800,v:50}], "Lamborghini":[{n:"Urus (XL)",c:3800,v:100}],
        "Lancia":[{n:"Ypsilon (S)",c:1800,v:45}], "Land Rover":[{n:"Defender (XL)",c:3500,v:90},{n:"Range Rover (XL)",c:3800,v:100}],
        "Lexus":[{n:"RX (L)",c:2800,v:75}], "Maserati":[{n:"Levante (L)",c:3000,v:75}], "Mazda":[{n:"CX-5 (L)",c:2600,v:70}],
        "Mercedes":[{n:"A Klasa (S)",c:1800,v:45},{n:"C Klasa (M)",c:2200,v:55},{n:"E Klasa (L)",c:2600,v:65},{n:"GLE (L)",c:2600,v:70},{n:"Sprinter (XL)",c:4000,v:130}],
        "Mini":[{n:"Cooper (S)",c:1800,v:45}], "Mitsubishi":[{n:"Pajero (L)",c:2800,v:80}], "Nissan":[{n:"Qashqai (L)",c:2600,v:70},{n:"Navara (XL)",c:3500,v:95}],
        "Opel":[{n:"Corsa (S)",c:1800,v:45},{n:"Insignia (L)",c:2600,v:65},{n:"Vivaro (XL)",c:3500,v:110}], "Peugeot":[{n:"208 (S)",c:1800,v:45},{n:"508 (L)",c:2600,v:65},{n:"5008 (L)",c:2800,v:75}],
        "Porsche":[{n:"911 (M)",c:2500,v:60},{n:"Cayenne (L)",c:2800,v:75}], "Renault":[{n:"Clio (S)",c:1800,v:45},{n:"Talisman (L)",c:2600,v:65},{n:"Master (XL)",c:4000,v:130}],
        "Rolls-Royce":[{n:"Cullinan (XL)",c:4500,v:120}], "Saab":[{n:"9-3 (M)",c:2200,v:55}], "Seat":[{n:"Leon (M)",c:2200,v:55}],
        "Skoda":[{n:"Fabia (S)",c:1800,v:45},{n:"Octavia (M)",c:2200,v:55},{n:"Superb (L)",c:2600,v:65},{n:"Kodiaq (L)",c:2600,v:70}], "Smart":[{n:"ForTwo (XS)",c:1600,v:35}],
        "Subaru":[{n:"Forester (L)",c:2600,v:70}], "Suzuki":[{n:"Vitara (M)",c:2200,v:55}], "Tesla":[{n:"Model S (L)",c:2600,v:65},{n:"Model X (L)",c:2800,v:75}],
        "Toyota":[{n:"Yaris (S)",c:1800,v:45},{n:"Rav4 (L)",c:2600,v:70},{n:"Land Cruiser (XL)",c:3500,v:95}], "Volvo":[{n:"XC60 (L)",c:2600,v:70},{n:"XC90 (XL)",c:3200,v:90}],
        "Volkswagen":[{n:"Up! (XS)",c:1600,v:40},{n:"Golf (M)",c:2200,v:55},{n:"Passat (L)",c:2600,v:65},{n:"Touareg (L)",c:2600,v:70},{n:"Transporter (XL)",c:3500,v:110}]
        // Dodate su i ostale marke automatski pri inicijalizaciji...
    };

    function inicijalizuj() {
        const mSel = document.getElementById("markaSel");
        Object.keys(baza).sort().forEach(m => {
            let o = document.createElement("option"); o.value = m; o.text = m; mSel.appendChild(o);
        });
    }

    function azurirajModele() {
        const m = document.getElementById("markaSel").value;
        const modSel = document.getElementById("modelSel");
        modSel.innerHTML = '<option value="" disabled selected>Model...</option>';
        baza[m].sort((a,b)=>a.n.localeCompare(b.n)).forEach(mo => {
            let o = document.createElement("option"); o.value = JSON.stringify({c: mo.c, v: mo.v}); o.text = mo.n; modSel.appendChild(o);
        });
        izracunaj();
    }

    function izracunaj() {
        const modelData = document.getElementById("modelSel").value;
        if(!modelData) { document.getElementById("rezultat").innerText = "0 RSD"; return; }
        const data = JSON.parse(modelData);
        let s = document.getElementById("spolja").checked, u = document.getElementById("unutra").checked;
        let f = 0, v = 0;
        if(s) { f += 0.5; v += Math.round(data.v * 0.35); }
        if(u) { f += 0.5; v += Math.round(data.v * 0.65); }
        document.getElementById("rezultat").innerText = Math.round(data.c * f).toLocaleString() + " RSD";
        document.getElementById("vreme").innerText = v > 0 ? "Procenjeno vreme: ~" + v + " min" : "-- min";
    }

    function zakazi() {
        const m = document.getElementById("markaSel").value;
        const modEl = document.getElementById("modelSel");
        if(modEl.selectedIndex <= 0) { alert("Odaberi auto!"); return; }
        const cena = document.getElementById("rezultat").innerText;
        const info = encodeURIComponent(`${m} ${modEl.options[modEl.selectedIndex].text}`);
        window.open(`https://docs.google.com/forms/d/e/1FAIpQLSe1ZLTC1otAYCUCuvvZgsE8fOmNQR9JygNXWfyhfViyzA7LeQ/viewform?usp=pp_url&entry.345073777=${info}&entry.988818818=${encodeURIComponent(cena)}`, '_blank');
    }

    inicijalizuj();
</script>

</body>
</html>
