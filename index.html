<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>KORICA Auto Nega | Rezervacije</title>
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --dark: #111; --gray: #222; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            background: var(--black); color: white; font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 15px;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }
        .card {
            background: rgba(20, 20, 20, 0.98); padding: 25px; border-radius: 25px;
            border: 1px solid var(--gold); width: 100%; max-width: 500px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        h1 { color: var(--gold); margin: 0; letter-spacing: 4px; text-transform: uppercase; font-size: 28px; font-weight: 800; }
        .subtitle { color: #888; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 25px; }
        
        .group { text-align: left; margin-bottom: 18px; }
        label { display: block; color: var(--gold); margin-bottom: 8px; font-weight: 600; font-size: 11px; text-transform: uppercase; }
        
        select {
            width: 100%; padding: 14px; background: var(--dark); color: white;
            border: 1px solid #333; border-radius: 12px; font-size: 15px; outline: none; appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23d4af37' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 15px center; background-size: 15px;
        }

        .vehicle-display {
            display: none; background: var(--gray); border-radius: 15px; padding: 15px;
            margin-top: 10px; border: 1px solid #333;
        }
        .dim-info { text-align: left; border-top: 1px solid #444; padding-top: 10px; }
        .dim-info span { color: var(--gold); font-size: 10px; text-transform: uppercase; }
        .dim-info p { margin: 5px 0 0 0; font-size: 13px; font-weight: 600; color: #fff; }

        .services-container {
            background: var(--dark); padding: 15px; border-radius: 12px; border: 1px solid #333;
            display: flex; flex-direction: column; gap: 12px;
        }
        .service-item { display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 14px; }
        input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--gold); }

        .note-box {
            display: none; margin-top: 12px; padding: 12px; border-radius: 10px; font-size: 11px; text-align: left;
        }
        .note-standard { background: rgba(212, 175, 55, 0.05); border: 1px dashed var(--gold); color: var(--gold); }
        .note-special { background: rgba(0, 255, 204, 0.05); border: 1px dashed #00ffcc; color: #00ffcc; }

        .price-box { margin: 20px 0; padding: 20px; background: rgba(212, 175, 55, 0.03); border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.1); }
        .price-tag { font-size: 42px; color: var(--gold); font-weight: 800; }
        .time-info { color: #00ffcc; font-size: 12px; margin-top: 8px; font-weight: 600; text-transform: uppercase; }

        .btn {
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: black; border: none; padding: 18px; width: 100%;
            border-radius: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>KORICA</h1>
    <div class="subtitle">Auto Nega | Sremčica</div>
    
    <div class="group">
        <label>1. Tip i Brend vozila</label>
        <select id="markaSel"></select>
    </div>

    <div class="group">
        <label>2. Model i Varijanta</label>
        <select id="modelSel">
            <option value="">Prvo odaberi brend...</option>
        </select>
    </div>

    <div class="group">
        <label>3. Godište / Specifikacija</label>
        <select id="genSel">
            <option value="">Prvo odaberi varijantu...</option>
        </select>
        
        <div id="vehicleDisplay" class="vehicle-display">
            <div class="dim-info">
                <span>Tehnički gabariti:</span>
                <p id="dimText"></p>
            </div>
        </div>
    </div>

    <div class="group">
        <label>4. Usluge</label>
        <div class="services-container">
            <label class="service-item"><input type="checkbox" id="spolja" checked> Spoljašnje pranje</label>
            <label class="service-item"><input type="checkbox" id="unutra" checked> Unutrašnje čišćenje</label>
        </div>
        <div id="pragoviNote" class="note-box note-standard">
            ✨ <b>KORICA Standard:</b> Detaljno čišćenje pragova uključeno (+100 RSD).
        </div>
        <div id="cargoNote" class="note-box note-special">
            🚛 <b>Teretni mod:</b> Fokus na tovarni prostor i kabinu bez zadnjih sedišta.
        </div>
    </div>

    <div class="price-box">
        <div class="price-tag" id="rezultat">0 RSD</div>
        <div id="vreme" class="time-info">Spreman</div>
    </div>

    <button class="btn" onclick="zakazi()">Rezerviši termin</button>
</div>

<script>
    // Format: [Godište|Spolja|Unutra|Minuta|Dimenzije]
    const baza = {
        "Volkswagen": {
            "Golf (Hatchback)": ["Golf 1, 2, 3|550|450|35|Dužina: ~3.90m / Širina: 1.65m", "Golf 4, 5, 6|700|600|50|Dužina: ~4.15m / Širina: 1.75m", "Golf 7, 8|850|750|60|Dužina: ~4.28m / Širina: 1.80m"],
            "Passat (Limuzina)": ["Stariji modeli (B5)|750|650|55|Dužina: 4.67m / Širina: 1.74m", "Noviji modeli (B6, B7, B8)|900|800|70|Dužina: 4.77m / Širina: 1.83m"],
            "Passat (Karavan)": ["Sve generacije Karavan|1000|900|80|Dužina: 4.77m / Širina: 1.83m (Povećan gepek)"],
            "Caddy (Teretni - 2 sedišta)": ["Cargo verzija|800|900|75|Dužina: 4.40m / Veliki tovarni prostor"],
            "Amarok (Pickup)": ["Standardni Pickup|1100|900|85|Dužina: 5.25m / Širina: 1.95m"]
        },
        "Audi": {
            "A3 (Hatchback)": ["1996 - 2012|700|600|45|Dužina: ~4.20m / Širina: 1.75m", "2012 - Danas|850|750|60|Dužina: 4.34m / Širina: 1.82m"],
            "A4 (Limuzina)": ["Sve generacije|900|800|70|Dužina: ~4.75m / Širina: 1.84m"],
            "A4 (Karavan/Avant)": ["Sve generacije Avant|1050|950|85|Dužina: 4.76m / Povećana stakla pozadi"]
        },
        "Toyota / Pickup": {
            "Hilux (Pickup)": ["Single Cab (2 sedišta)|1000|800|70|Dužina: 5.30m", "Double Cab (5 sedišta)|1200|1000|90|Dužina: 5.33m / Velika kabina"]
        },
        "Dostavna Vozila": {
            "Berlingo / Partner": ["Putnička verzija (5 sedišta)|900|850|75|Visoko vozilo / Veća površina", "Teretna verzija (Bez zadnjih sedišta)|900|1100|90|Fokus na pod tovarnog prostora"]
        }
    };

    const mSel = document.getElementById("markaSel");
    const modSel = document.getElementById("modelSel");
    const genSel = document.getElementById("genSel");
    const vDisplay = document.getElementById("vehicleDisplay");
    const dimText = document.getElementById("dimText");
    const cSpolja = document.getElementById("spolja");
    const cUnutra = document.getElementById("unutra");

    function inicijalizuj() {
        mSel.innerHTML = '<option value="" disabled selected>Izaberi brend...</option>';
        Object.keys(baza).sort().forEach(m => {
            let o = document.createElement("option"); o.value = m; o.text = m; mSel.appendChild(o);
        });
    }

    mSel.addEventListener('change', () => {
        modSel.innerHTML = '<option value="" disabled selected>Izaberi varijantu...</option>';
        genSel.innerHTML = '<option value="">Prvo odaberi varijantu...</option>';
        vDisplay.style.display = "none";
        Object.keys(baza[mSel.value]).forEach(mod => {
            let o = document.createElement("option"); o.value = mod; o.text = mod; modSel.appendChild(o);
        });
        izracunaj();
    });

    modSel.addEventListener('change', () => {
        genSel.innerHTML = '<option value="" disabled selected>Izaberi specifikaciju...</option>';
        baza[mSel.value][modSel.value].forEach(g => {
            let [ime] = g.split('|');
            let o = document.createElement("option"); o.value = g; o.text = ime; genSel.appendChild(o);
        });
        izracunaj();
    });

    [genSel, cSpolja, cUnutra].forEach(el => el.addEventListener('change', izracunaj));

    function izracunaj() {
        const val = genSel.value;
        if(!val || val.includes("Prvo odaberi")) {
            document.getElementById("rezultat").innerText = "0 RSD";
            return;
        }

        let [ime, cS, cU, min, dim] = val.split('|');
        vDisplay.style.display = "block";
        dimText.innerText = dim;

        let ukupno = 0;
        if(cSpolja.checked) ukupno += Number(cS);
        if(cUnutra.checked) ukupno += Number(cU);

        // Specijalne napomene
        document.getElementById("cargoNote").style.display = (modSel.value.toLowerCase().includes("teretn") || modSel.value.toLowerCase().includes("cargo")) ? "block" : "none";
        document.getElementById("pragoviNote").style.display = (cSpolja.checked && !cUnutra.checked) ? "block" : "none";
        if(cSpolja.checked && !cUnutra.checked) ukupno += 100;

        document.getElementById("rezultat").innerText = ukupno.toLocaleString() + " RSD";
        document.getElementById("vreme").innerText = (cSpolja.checked || cUnutra.checked) ? "~" + min + " MINUTA" : "Spreman";
    }

    function zakazi() {
        const poruka = `Rezervacija: ${mSel.value} - ${modSel.value}\nSpecifikacija: ${genSel.value.split('|')[0]}\nCena: ${document.getElementById("rezultat").innerText}`;
        window.open(`https://wa.me/38164XXXXXXX?text=${encodeURIComponent(poruka)}`, '_blank');
    }

    window.onload = inicijalizuj;
</script>
</body>
</html>
