<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>KORICA | Auto nega</title>
    <style>
        :root { --gold: #d4af37; --black: #000; --dark: #111; }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--black); color: white; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { width: 100%; max-width: 450px; }
        .header { margin-bottom: 30px; border-left: 4px solid var(--gold); padding-left: 20px; }
        h1 { color: var(--gold); margin: 0; letter-spacing: 10px; text-transform: uppercase; font-size: 38px; font-weight: 900; }
        .tagline { color: #fff; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; display: block; margin-top: 5px; }
        .synonym { color: #fff; font-size: 12px; text-transform: uppercase; letter-spacing: 3px; display: block; margin-top: 2px; }
        .group { margin-bottom: 20px; }
        label { display: block; color: #666; font-size: 10px; text-transform: uppercase; margin-bottom: 8px; }
        select { width: 100%; padding: 15px; background: #000; color: white; border: 1px solid #333; border-radius: 0; font-size: 14px; outline: none; appearance: none; }
        .tech-data { margin: 20px 0; padding: 15px; border-top: 1px solid #222; border-bottom: 1px solid #222; }
        .data-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; font-family: monospace; }
        .data-label { color: #444; text-transform: uppercase; }
        .data-val { color: var(--gold); }
        .services { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .opt { background: #000; border: 1px solid #222; padding: 15px; text-align: center; cursor: pointer; font-size: 12px; color: #444; }
        .opt.active { border-color: var(--gold); color: white; }
        .price-panel { margin-top: 40px; text-align: right; }
        .price-label { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 1px; }
        .price-val { display: block; font-size: 40px; color: var(--gold); font-weight: 900; }
        .btn { background: var(--gold); color: black; border: none; padding: 20px; width: 100%; margin-top: 25px; cursor: pointer; text-transform: uppercase; font-weight: 900; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>KORICA</h1>
        <span class="tagline">Auto nega</span>
        <span class="synonym">Sinonim kvaliteta</span>
    </div>

    <div class="group">
        <label>Marka vozila</label>
        <select id="marka" onchange="updateModels()"></select>
    </div>

    <div class="group">
        <label>Model i godište</label>
        <select id="model" onchange="calculate()"></select>
    </div>

    <div class="tech-data">
        <div class="data-line"><span class="data-label">Dužina vozila:</span> <span class="data-val" id="len">-- cm</span></div>
        <div class="data-line"><span class="data-label">Širina vozila:</span> <span class="data-val" id="wid">-- cm</span></div>
        <div class="data-line"><span class="data-label">Vremenski normativ:</span> <span class="data-val" id="time">-- min</span></div>
    </div>

    <div class="group">
        <label>Konfiguracija tretmana</label>
        <div class="services">
            <div class="opt active" id="btn-s" onclick="toggle('s')">SPOLJAŠNJOST</div>
            <div class="opt active" id="btn-u" onclick="toggle('u')">UNUTRAŠNJOST</div>
        </div>
    </div>

    <div class="price-panel">
        <span class="price-label">Cena održavanja</span>
        <span class="price-val" id="total">0 RSD</span>
    </div>

    <button class="btn" onclick="sendWA()">Rezerviši termin</button>
</div>

<script>
// Baza: Model|Spolja|Unutra|Dužina|Širina|Vreme
const db = {
    "Volkswagen": [
        "Polo (2017-2024)|850|750|405|175|55",
        "Golf 7 (2012-2020)|900|800|425|179|65",
        "Passat B8 (2014-2023)|1000|900|476|183|85",
        "Passat Variant B8 (Karavan)|1050|950|477|183|100",
        "Touareg (2018-2024)|1200|1100|487|198|130"
    ],
    "BMW": [
        "Serija 1 F20 (2011-2019)|950|850|432|176|70",
        "Serija 3 G20 (2019-2024)|1000|900|470|182|85",
        "Serija 5 G30 (2017-2023)|1050|950|493|186|110",
        "X5 G05 (2018-2024)|1250|1150|492|200|135"
    ],
    "Audi": [
        "A3 8V (2012-2020)|950|850|431|178|70",
        "A4 B9 (2015-2024)|1000|900|472|184|85",
        "A6 C8 (2018-2024)|1050|950|493|188|110",
        "Q7 4M (2015-2024)|1300|1200|506|197|145"
    ],
    "Skoda": [
        "Fabia (2014-2021)|850|750|399|173|55",
        "Octavia A7 (2013-2020)|1000|900|466|181|85",
        "Superb B8 (2015-2024)|1050|950|486|186|110",
        "Kodiaq (2016-2024)|1200|1100|469|188|125"
    ],
    "Opel": [
        "Corsa F (2019-2024)|850|750|406|176|55",
        "Astra K (2015-2021)|950|850|437|180|75",
        "Insignia B (2017-2022)|1050|950|489|186|110"
    ],
    "Fiat": [
        "500 (2007-2024)|800|700|357|162|50",
        "Tipo (2015-2024)|1000|900|453|179|80"
    ]
};

let activeS = true, activeU = true;

function init() {
    const mSel = document.getElementById("marka");
    Object.keys(db).sort().forEach(m => mSel.options.add(new Option(m, m)));
    updateModels();
}

function updateModels() {
    const m = document.getElementById("marka").value;
    const modSel = document.getElementById("model");
    modSel.innerHTML = "";
    db[m].forEach((item, index) => modSel.options.add(new Option(item.split('|')[0], index)));
    calculate();
}

function toggle(type) {
    if(type === 's') activeS = !activeS; else activeU = !activeU;
    document.getElementById('btn-s').className = activeS ? 'opt active' : 'opt';
    document.getElementById('btn-u').className = activeU ? 'opt active' : 'opt';
    calculate();
}

function calculate() {
    const m = document.getElementById("marka").value;
    const idx = document.getElementById("model").value;
    const [name, pS, pU, len, wid, time] = db[m][idx].split('|');

    let total = 0;
    if(activeS) total += parseInt(pS);
    if(activeU) total += parseInt(pU);
    if((activeS && !activeU) || (!activeS && activeU)) total += 100;

    document.getElementById("len").innerText = len + " cm";
    document.getElementById("wid").innerText = wid + " cm";
    document.getElementById("time").innerText = Math.round((activeS ? time*0.6 : 0) + (activeU ? time*0.4 : 0)) + " min";
    document.getElementById("total").innerText = total.toLocaleString() + " RSD";
}

function sendWA() {
    const m = document.getElementById("marka").value;
    const mod = document.getElementById("model").options[document.getElementById("model").selectedIndex].text;
    const price = document.getElementById("total").innerText;
    window.open(`https://wa.me/38164XXXXXXX?text=KORICA - Rezervacija: ${m} ${mod}. Cena: ${price}.`);
}

window.onload = init;
</script>
</body>
</html>
