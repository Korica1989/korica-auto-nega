<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>KORICA Auto Nega | Sinonim Kvaliteta</title>
    <style>
        :root { --gold: #d4af37; --black: #000; --dark: #0a0a0a; --grey: #121212; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { background: var(--black); color: white; line-height: 1.6; overflow-x: hidden; }

        /* PRESTIŽNA POČETNA SEKCIJA */
        .hero {
            height: 100vh; /* Zauzima ceo ekran pri otvaranju */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2?auto=format&fit=crop&q=80&w=1500'); 
            background-size: cover;
            background-position: center;
            border-bottom: 2px solid var(--gold);
        }

        .brand-name {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            letter-spacing: 15px;
            color: var(--gold);
            text-transform: uppercase;
            font-weight: 900;
            margin-bottom: 10px;
            animation: fadeInDown 1.5s ease-out;
        }

        .slogan {
            font-size: clamp(1rem, 3vw, 1.5rem);
            letter-spacing: 8px;
            color: white;
            text-transform: uppercase;
            font-weight: 300;
            opacity: 0.9;
            animation: fadeInUp 1.5s ease-out;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            color: var(--gold);
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: bounce 2s infinite;
        }

        /* SEKCIJA SA APLIKACIJOM */
        .app-section {
            padding: 80px 20px;
            display: flex;
            justify-content: center;
            background: var(--dark);
        }

        .expert-card {
            width: 100%;
            max-width: 500px;
            background: var(--black);
            border: 1px solid #222;
            padding: 40px;
            position: relative;
        }

        .expert-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: var(--gold);
        }

        .section-title {
            text-align: center;
            font-size: 14px;
            letter-spacing: 4px;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .input-group { margin-bottom: 25px; }
        label { display: block; color: #555; font-size: 10px; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        
        select { 
            width: 100%; padding: 18px; background: var(--grey); color: white; border: 1px solid #333; 
            border-radius: 0; font-size: 16px; outline: none; transition: 0.3s; cursor: pointer;
        }
        select:focus { border-color: var(--gold); }

        .service-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .service-btn { 
            background: var(--grey); border: 1px solid #333; padding: 18px 5px; 
            text-align: center; cursor: pointer; font-size: 11px; font-weight: bold; color: #666; 
            transition: 0.3s; text-transform: uppercase;
        }
        .service-btn.active { border-color: var(--gold); color: var(--gold); background: #1a160a; }

        .extra-option { 
            margin-top: 20px; display: none; padding: 15px; border: 1px solid #222;
            justify-content: space-between; align-items: center; 
        }

        .summary-box { 
            margin-top: 40px; padding: 30px; background: #050505; border: 1px solid #222;
            text-align: center; display: none;
        }

        .total-price { font-size: 50px; color: var(--gold); font-weight: 900; display: block; }
        .est-time { color: #555; font-size: 12px; text-transform: uppercase; margin-top: 10px; }

        /* ANIMACIJE */
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }

        footer { padding: 50px; text-align: center; font-size: 10px; color: #222; letter-spacing: 3px; }
    </style>
</head>
<body>

    <header class="hero">
        <h1 class="brand-name">KORICA</h1>
        <p class="slogan">Sinonim kvaliteta</p>
        <div class="scroll-indicator">Otkrijte više</div>
    </header>

    <main class="app-section">
        <div class="expert-card">
            <h2 class="section-title">Ekspert Sistem Procene</h2>
            
            <div class="input-group">
                <label>Odaberite brend</label>
                <select id="brand-select" onchange="loadModels()">
                    <option value="" disabled selected>Brend vozila...</option>
                </select>
            </div>

            <div class="input-group">
                <label>Odaberite model</label>
                <select id="model-select" onchange="runCalculation()">
                    <option value="" disabled selected>Prvo odaberite brend</option>
                </select>
            </div>

            <div class="input-group">
                <label>Vrsta usluge</label>
                <div class="service-grid">
                    <div class="service-btn" id="s-spolja" onclick="selectService('spolja')">Spolja</div>
                    <div class="service-btn" id="s-unutra" onclick="selectService('unutra')">Unutra</div>
                    <div class="service-btn" id="s-komplet" onclick="selectService('komplet')">Komplet</div>
                </div>
            </div>

            <div class="extra-option" id="pragovi-panel">
                <span style="font-size: 11px; color: #666; text-transform: uppercase;">Nega pragova (+200 RSD)</span>
                <input type="checkbox" id="pragovi-check" onchange="runCalculation()" style="width:22px; height:22px; accent-color:var(--gold)">
            </div>

            <div class="summary-box" id="result-area">
                <span style="font-size: 10px; color: #444; letter-spacing: 2px; font-weight: bold;">UKUPNA INVESTICIJA</span>
                <span class="total-price" id="out-price">0 RSD</span>
                <span class="est-time" id="out-time"></span>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 KORICA AUTO NEGA | SREMČICA
    </footer>

<script>
    const vehicleDB = {
        "Audi": ["A3 8P (2003-2012)|1.10", "A4 B8 (2008-2015)|1.25", "A6 C7 (2011-2018)|1.45", "Q7 4M (2015-)|1.90"],
        "BMW": ["Serija 3 E90|1.20", "Serija 5 F10|1.45", "X5 G05|1.95", "Serija 7 G11|1.90"],
        "Mercedes-Benz": ["C-Klasa W204|1.20", "E-Klasa W213|1.50", "GLE V167|1.95", "S-Klasa W222|1.90"],
        "Volkswagen": ["Golf 7|1.10", "Passat B8|1.35", "Tiguan G2|1.45", "Touareg CR|1.90"]
    };

    let selectedService = '';
    const basePrices = { spolja: 800, unutra: 800, komplet: 1500 };
    const baseTimes = { spolja: 30, unutra: 35, komplet: 60 };

    (function start() {
        const bSel = document.getElementById('brand-select');
        Object.keys(vehicleDB).sort().forEach(b => {
            let o = document.createElement('option');
            o.value = b; o.innerHTML = b;
            bSel.appendChild(o);
        });
    })();

    function loadModels() {
        const b = document.getElementById('brand-select').value;
        const mSel = document.getElementById('model-select');
        mSel.innerHTML = '<option value="" disabled selected>Model vozila...</option>';
        vehicleDB[b].forEach((v, i) => {
            let o = document.createElement('option');
            o.value = i; o.innerHTML = v.split('|')[0];
            mSel.appendChild(o);
        });
        document.getElementById('result-area').style.display = 'none';
    }

    function selectService(s) {
        selectedService = s;
        document.querySelectorAll('.service-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('s-' + s).classList.add('active');
        document.getElementById('pragovi-panel').style.display = (s === 'spolja') ? 'flex' : 'none';
        runCalculation();
    }

    function runCalculation() {
        const b = document.getElementById('brand-select').value;
        const mi = document.getElementById('model-select').value;
        if(!b || mi === "" || !selectedService) return;

        const k = parseFloat(vehicleDB[b][mi].split('|')[1]);
        let price = Math.round(basePrices[selectedService] * k);
        let time = Math.round(baseTimes[selectedService] * k);

        if(selectedService === 'spolja' && document.getElementById('pragovi-check').checked) {
            price += 200; time += 5;
        }

        document.getElementById('out-price').innerText = price + " RSD";
        document.getElementById('out-time').innerText = "PROCENJENO VREME: " + time + " MIN";
        document.getElementById('result-area').style.display = "block";
    }
</script>
</body>
</html>
