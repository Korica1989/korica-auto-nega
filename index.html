<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORICA Auto Nega | Rezervacija</title>
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --gray: #1a1a1a; }
        body {
            background: var(--black); color: white; font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }
        .card {
            background: rgba(20, 20, 20, 0.98); padding: 30px; border-radius: 25px;
            border: 1px solid var(--gold); width: 100%; max-width: 480px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        h1 { color: var(--gold); margin: 0; letter-spacing: 5px; text-transform: uppercase; font-size: 32px; font-weight: 800; }
        .subtitle { color: #888; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 25px; }
        .group { text-align: left; margin-bottom: 15px; position: relative; }
        label { display: block; color: var(--gold); margin-bottom: 5px; font-weight: 600; font-size: 11px; text-transform: uppercase; }
        
        select, input[type="text"] {
            width: 100%; padding: 12px; background: #111; color: white;
            border: 1px solid #333; border-radius: 10px; font-size: 14px; outline: none; box-sizing: border-box;
        }
        select:focus, input[type="text"]:focus { border-color: var(--gold); }

        .search-box { margin-bottom: 10px; }

        .services-container {
            background: #111; padding: 15px; border-radius: 12px; border: 1px solid #333;
            display: flex; flex-direction: column; gap: 12px; margin-top: 5px;
        }
        .service-item { display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 14px; }
        input[type="checkbox"] { accent-color: var(--gold); width: 20px; height: 20px; cursor: pointer; }

        .price-box {
            margin: 20px 0; padding: 20px; background: rgba(212, 175, 55, 0.05);
            border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .price-tag { font-size: 42px; color: var(--gold); font-weight: 800; line-height: 1; }
        .time-info { color: #00ffcc; font-size: 13px; margin-top: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .btn {
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: black; border: none; padding: 18px; width: 100%;
            border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase;
            transition: 0.3s;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3); }
        .btn:active { transform: translateY(0); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
    <h1>KORICA</h1>
    <div class="subtitle">Premium Auto Nega Sremčica</div>
    
    <div class="group">
        <label>1. Odaberi marku</label>
        <select id="markaSel" onchange="resetujModele()">
            <option value="" selected disabled>Izaberi brend...</option>
        </select>
    </div>

    <div class="group">
        <label>2. Pretraži i odaberi model</label>
        <input type="text" id="modelSearch" class="search-box" placeholder="Kucaj npr. Golf ili A4..." oninput="filtrirajModele()">
        <select id="modelSel" onchange="izracunaj()">
            <option value="">Prvo odaberi marku...</option>
        </select>
    </div>

    <div class="group">
        <label>3. Usluge (Bezkontaktno + Unutrašnje)</label>
        <div class="services-container">
            <label class="service-item">
                <input type="checkbox" id="spolja" onchange="izracunaj()" checked> Spoljašnje pranje
            </label>
            <label class="service-item">
                <input type="checkbox" id="unutra" onchange="izracunaj()" checked> Unutrašnje održavanje
            </label>
        </div>
    </div>

    <div class="price-box">
        <div class="price-tag" id="rezultat">0 RSD</div>
        <div class="time-info" id="vreme">Vreme rada: -- min</div>
    </div>

    <button class="btn" onclick="zakazi()">Rezerviši Termin</button>
</div>

        "Rover": ["25 (S)", "45 (M)", "75 (L)"],

        "Seat": ["Alhambra (XL)", "Altea (M)", "Arona (M)", "Ateca (L)", "Cordoba (M)", "Exeo (M)", "Ibiza (S)", "Leon (M)", "Tarraco (XL)", "Toledo (M)"],
        "Skoda": ["Citigo (XS)", "Enyaq (L)", "Fabia (S)", "Felicia (S)", "Kamiq (M)", "Karoq (L)", "Kodiaq (XL)", "Octavia (M)", "Rapid (M)", "Roomster (M)", "Scala (M)", "Superb (L)", "Yeti (M)"],
        "Smart": ["ForFour (S)", "ForTwo (XS)"],
        "Subaru": ["Forester (L)", "Impreza (M)", "Outback (L)"],
        "Suzuki": ["Grand Vitara (L)", "Ignis (XS)", "Jimny (S)", "S-Cross (M)", "Swift (S)", "SX4 (M)", "Vitara (L)"],
        "Tesla": ["Model 3 (M)", "Model S (L)", "Model X (XL)", "Model Y (L)"],
        "Toyota": ["Aygo (XS)", "C-HR (M)", "Camry (L)", "Corolla (M)", "Hilux (XL)", "Land Cruiser (XL)", "Prius (M)", "Proace (XL)", "Rav4 (L)", "Yaris (S)", "Yaris Cross (M)"],
        "Volkswagen": ["Amarok (XL)", "Arteon (L)", "Buba (S)", "Caddy (L)", "Crafter (XL)", "Golf 1 (XS)", "Golf 2 (S)", "Golf 3 (S)", "Golf 4 (S)", "Golf 5 (M)", "Golf 6 (M)", "Golf 7 (M)", "Golf 8 (M)", "ID.3 (M)", "ID.4 (L)", "ID.Buzz (XL)", "Jetta (M)", "Multivan (XL)", "Passat (L)", "Polo (S)", "Scirocco (S)", "Sharan (XL)", "T-Cross (M)", "Tiguan (L)", "Touareg (L)", "Touran (L)", "Transporter (XL)"],
        "Volvo": ["S60 (M)", "S90 (L)", "V40 (M)", "V60 (M)", "V90 (L)", "XC40 (M)", "XC60 (L)", "XC90 (XL)"],
        "Zastava": ["Florinda (M)", "Skala (S)", "Yugo (XS)", "10 (S)"]
    };

    const cene = { "XS": 1600, "S": 1800, "M": 2200, "L": 2600, "XL": 3200 };
    const vremena = { "XS": 40, "S": 45, "M": 55, "L": 70, "XL": 110 };

    function inicijalizujMarke() {
        const mSel = document.getElementById("markaSel");
        Object.keys(baza).sort().forEach(m => {
            let o = document.createElement("option"); o.value = m; o.text = m; mSel.appendChild(o);
        });
    }

    function resetujModele() {
        document.getElementById("modelSearch").value = "";
        azurirajModele();
    }

    function azurirajModele() {
        const marka = document.getElementById("markaSel").value;
        const modSel = document.getElementById("modelSel");
        modSel.innerHTML = '<option value="" disabled selected>Odaberi...</option>';
        if(baza[marka]) {
            baza[marka].sort().forEach(mo => {
                let o = document.createElement("option");
                o.text = mo; o.value = mo;
                modSel.appendChild(o);
            });
        }
        izracunaj();
    }

    function filtrirajModele() {
        const query = document.getElementById("modelSearch").value.toLowerCase();
        const marka = document.getElementById("markaSel").value;
        const modSel = document.getElementById("modelSel");
        if(!marka) return;
        
        modSel.innerHTML = '';
        const filtrirani = baza[marka].filter(m => m.toLowerCase().includes(query));
        
        if(filtrirani.length > 0) {
            filtrirani.forEach(mo => {
                let o = document.createElement("option");
                o.text = mo; o.value = mo;
                modSel.appendChild(o);
            });
        } else {
            modSel.innerHTML = '<option>Nema rezultata...</option>';
        }
    }

    function izracunaj() {
        const modelStr = document.getElementById("modelSel").value;
        const resEl = document.getElementById("rezultat");
        const timeEl = document.getElementById("vreme");
        
        if(!modelStr || modelStr.includes("Odaberi") || modelStr.includes("Nema")) {
            resEl.innerText = "0 RSD"; timeEl.innerText = "Vreme rada: -- min"; return;
        }

        const kat = modelStr.match(/\(([^)]+)\)/)[1];
        const punaCena = cene[kat];
        const punoVreme = vremena[kat];

        let s = document.getElementById("spolja").checked;
        let u = document.getElementById("unutra").checked;
        
        let f = 0, v = 0;
        if(s) { f += 0.5; v += Math.round(punoVreme * 0.35); }
        if(u) { f += 0.5; v += Math.round(punoVreme * 0.65); }

        resEl.innerText = Math.round(punaCena * f).toLocaleString() + " RSD";
        timeEl.innerText = v > 0 ? "Procenjeno vreme: ~" + v + " min" : "-- min";
    }

    function zakazi() {
        const m = document.getElementById("markaSel").value;
        const mo = document.getElementById("modelSel").value;
        if(!mo || mo.includes("Odaberi")) { alert("Odaberi auto!"); return; }
        const cena = document.getElementById("rezultat").innerText;
        const v = document.getElementById("vreme").innerText;
        const info = encodeURIComponent(`${m} ${mo} | ${v}`);
        window.open(`https://docs.google.com/forms/d/e/1FAIpQLSe1ZLTC1otAYCUCuvvZgsE8fOmNQR9JygNXWfyhfViyzA7LeQ/viewform?usp=pp_url&entry.345073777=${info}&entry.988818818=${encodeURIComponent(cena)}`, '_blank');
    }

    inicijalizujMarke();
</script>
</body>
</html>
