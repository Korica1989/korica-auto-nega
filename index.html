<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>KORICA | Automotive Expert System</title>
    <style>
        :root { --gold: #d4af37; --black: #000; --dark: #0a0a0a; --gray: #1a1a1a; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--black); color: white; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; background: var(--dark); border: 1px solid #222; padding: 25px; border-radius: 8px; }
        .header { border-left: 6px solid var(--gold); padding-left: 20px; margin-bottom: 30px; }
        h1 { color: var(--gold); margin: 0; letter-spacing: 6px; text-transform: uppercase; font-size: 28px; font-weight: 900; }
        .tagline { display: block; letter-spacing: 3px; font-size: 12px; margin-top: 5px; color: var(--gold); opacity: 0.7; }
        .section-title { color: var(--gold); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin: 25px 0 12px 0; display: flex; align-items: center; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--gray); margin-left: 15px; }
        .group { margin-bottom: 20px; }
        label { display: block; color: #555; font-size: 10px; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; }
        select { width: 100%; padding: 16px; background: #111; color: white; border: 1px solid #333; border-radius: 5px; font-size: 16px; outline: none; transition: 0.3s; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .opt-card { background: #111; border: 1px solid #333; padding: 15px 10px; border-radius: 5px; cursor: pointer; text-align: center; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #888; }
        .opt-card.active { border-color: var(--gold); background: rgba(212, 175, 55, 0.05); color: var(--gold); }
        .addon-box { margin-top: 15px; display: none; padding: 18px; background: #0c0c0c; border: 1px solid #222; border-radius: 5px; align-items: center; }
        .checkbox-custom { width: 22px; height: 22px; accent-color: var(--gold); }
        .results-panel { margin-top: 30px; padding-top: 20px; border-top: 2px solid var(--gray); display: none; }
        .price-display { background: #050505; padding: 30px; border-radius: 5px; text-align: center; border: 1px solid #222; margin-top: 20px; }
        .price-amt { font-size: 48px; color: var(--gold); font-weight: 900; display: block; }
        .btn-reserve { background: var(--gold); color: black; border: none; padding: 20px; width: 100%; border-radius: 5px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>KORICA</h1><span class="tagline">SINONIM KVALITETA</span></div>
    <div class="section-title">Vozilo</div>
    <div class="group">
        <label>Marka</label>
        <select id="marka" onchange="loadModels()"><option value="" disabled selected>Učitavanje baze...</option></select>
    </div>
    <div class="group">
        <label>Model i godište</label>
        <select id="model" onchange="calculate()"></select>
    </div>
    <div class="section-title">Usluga</div>
    <div class="options-grid">
        <div class="opt-card" id="opt-spolja" onclick="setMode('spolja')">Spolja</div>
        <div class="opt-card" id="opt-unutra" onclick="setMode('unutra')">Unutra</div>
        <div class="opt-card" id="opt-zajedno" onclick="setMode('zajedno')">Komplet</div>
    </div>
    <div class="addon-box" id="pragovi-box">
        <label style="flex:1; cursor:pointer;" onclick="togglePragovi()">Doplata za pragove (+200 RSD)</label>
        <input type="checkbox" id="pragovi-check" class="checkbox-custom" onchange="calculate()">
    </div>
    <div class="results-panel" id="results">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span style="color:#555; font-size:11px;">DIMENZIJE:</span>
            <span id="res-dim" style="font-weight:bold;"></span>
        </div>
        <div class="price-display">
            <span class="price-amt" id="res-price">0 RSD</span>
            <span id="res-time" style="color:#888; font-size:13px;"></span>
        </div>
        <button class="btn-reserve" onclick="sendOrder()">Rezerviši</button>
    </div>
</div>

<script>
    const masterDB = {}; 

    // OVDE ĆEMO SADA UBACIVATI MODELE (B, C, D...)
    const db_Part1 = {
        "Alfa Romeo": [
            "147 (2000-2010)|422|173|1.0",
            "156 Sedan (1997-2007)|443|174|1.1",
            "156 Sportwagon (1997-2007)|444|174|1.2",
            "159 Sedan (2005-2011)|466|183|1.2",
            "159 Sportwagon (2005-2011)|466|183|1.3",
            "Giulia (2016-2026)|464|186|1.2",
            "Giulietta (2010-2020)|435|180|1.1",
            "Stelvio (2016-2026)|468|190|1.5",
            "MiTo (2008-2018)|406|172|0.9"
        ],
        "Audi": [
            "A1 (2010-2018)|395|174|0.9",
            "A3 8P (2003-2012)|424|177|1.1",
            "A3 8V (2012-2020)|431|178|1.1",
            "A4 B7 Sedan (2004-2008)|458|177|1.2",
            "A4 B8 Sedan (2008-2015)|470|182|1.2",
            "A4 B8 Avant (2008-2015)|470|182|1.3",
            "A6 C6 Sedan (2004-2011)|491|185|1.4",
            "A6 C7 Avant (2011-2018)|494|187|1.5",
            "Q5 G1 (2008-2016)|463|188|1.5",
            "Q7 4L (2005-2015)|508|198|1.8"
        ],
        "BMW": [
            "Serija 1 E87|422|175|1.0",
            "Serija 3 E46 Sedan|447|174|1.1",
            "Serija 3 E90 Sedan|452|181|1.2",
            "Serija 3 F30 Sedan|462|181|1.2",
            "Serija 5 E60|484|184|1.4",
            "Serija 5 F10|489|186|1.4",
            "X3 F25|465|188|1.5",
            "X5 E70|485|193|1.7",
            "X5 G05|492|200|1.8"
        ],
        "Citroen": [
            "C3 G2 (2009-2016)|394|172|0.9",
            "C4 G2 (2010-2018)|433|179|1.1",
            "C5 G2 (2008-2017)|478|186|1.3",
            "C4 Picasso G1|447|183|1.3"
        ],
        "Dacia": [
            "Sandero G2|406|173|1.0",
            "Logan G2|435|173|1.1",
            "Duster G2|434|180|1.4"
        ]
    };
    Object.assign(masterDB, db_Part1);
    // LOGIKA RADA (Motor aplikacije)
    const base = { spolja: { p: 800, t: 30 }, unutra: { p: 800, t: 35 }, zajedno: { p: 1500, t: 60 } };
    let activeMode = '';

    function loadModels() {
        const m = document.getElementById("marka").value;
        const modSel = document.getElementById("model");
        modSel.innerHTML = '<option value="" disabled selected>Model...</option>';
        masterDB[m].forEach((item, index) => modSel.options.add(new Option(item.split('|')[0], index)));
    }

    function setMode(mode) {
        activeMode = mode;
        document.querySelectorAll('.opt-card').forEach(c => c.classList.remove('active'));
        document.getElementById('opt-' + mode).classList.add('active');
        document.getElementById('pragovi-box').style.display = (mode === 'spolja') ? 'flex' : 'none';
        calculate();
    }

    function togglePragovi() {
        const chk = document.getElementById('pragovi-check');
        chk.checked = !chk.checked;
        calculate();
    }

    function calculate() {
        const m = document.getElementById("marka").value;
        const idx = document.getElementById("model").value;
        if(!m || idx==="" || !activeMode) return;
        const data = masterDB[m][idx].split('|');
        const k = parseFloat(data[3]);
        let price = Math.round(base[activeMode].p * k);
        let time = Math.round(base[activeMode].t * k);
        if(activeMode === 'spolja' && document.getElementById('pragovi-check').checked) { price += 200; time += 5; }
        document.getElementById("res-dim").innerText = `${data[1]} x ${data[2]} cm`;
        document.getElementById("res-price").innerText = price.toLocaleString() + " RSD";
        document.getElementById("res-time").innerText = `Vreme: cca ${time} min`;
        document.getElementById("results").style.display = "block";
    }

    function sendOrder() {
        const m = document.getElementById("marka").value;
        const mod = document.getElementById("model").options[document.getElementById("model").selectedIndex].text;
        const price = document.getElementById("res-price").innerText;
        const msg = `KORICA%0AUpit za termin:%0AVozilo: ${m} ${mod}%0AUsluga: ${activeMode}%0ACena: ${price}`;
        window.open(`https://wa.me/381600000000?text=${msg}`);
    }

    function initApp() {
        const mSel = document.getElementById("marka");
        mSel.innerHTML = '<option value="" disabled selected>Marka...</option>';
        Object.keys(masterDB).sort().forEach(m => mSel.options.add(new Option(m, m)));
    }

    // Aplikaciju ćemo pokrenuti tek kada ubacimo podatke
</script>
</body>
</html>
