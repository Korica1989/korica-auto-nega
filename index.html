<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORICA Auto Nega | Kalkulator</title>
    <style>
        :root { --gold: #d4af37; --black: #0f0f0f; }
        body {
            background: var(--black);
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .card {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--gold);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h1 { color: var(--gold); margin-bottom: 25px; letter-spacing: 3px; text-transform: uppercase; }
        .group { text-align: left; margin-bottom: 20px; }
        label { display: block; color: var(--gold); margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        select {
            width: 100%;
            padding: 12px;
            background: #252525;
            color: white;
            border: 1px solid #444;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        select:focus { border-color: var(--gold); }
        .price-box {
            margin: 20px 0;
            padding: 20px;
            background: rgba(212, 175, 55, 0.1);
            border-radius: 10px;
            border: 1px dashed var(--gold);
        }
        .price-tag { font-size: 32px; color: var(--gold); font-weight: bold; }
        .btn {
            background: var(--gold);
            color: black;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn:hover { background: #b8860b; }
    </style>
</head>
<body>

<div class="card">
    <h1>KORICA</h1>
    
    <div class="group">
        <label>1. Odaberi marku vozila:</label>
        <select id="markaSel" onchange="azurirajModele()">
            <option value="" selected disabled>Izaberi marku...</option>
            <option value="Audi">Audi</option>
            <option value="BMW">BMW</option>
            <option value="Volkswagen">Volkswagen</option>
            <option value="Mercedes">Mercedes-Benz</option>
            <option value="Fiat">Fiat</option>
            <option value="Skoda">Škoda</option>
            <option value="Opel">Opel</option>
            <option value="Renault">Renault</option>
            <option value="Peugeot">Peugeot</option>
        </select>
    </div>

    <div class="group">
        <label>2. Odaberi model vozila:</label>
        <select id="modelSel" onchange="izracunaj()">
            <option value="">Prvo odaberi marku...</option>
        </select>
    </div>

    <div class="group">
        <label>3. Odaberi tretman:</label>
        <select id="tretmanSel" onchange="izracunaj()">
            <option value="1">Standard (Pranje + Usisavanje)</option>
            <option value="1.5">Premium (Vax + Detalji)</option>
            <option value="2.5">Deep Clean (Dubinsko pranje)</option>
        </select>
    </div>

    <div class="price-box">
        <div style="font-size: 12px; color: #888;">PROCENJENA CENA</div>
        <div class="price-tag" id="rezultat">0 RSD</div>
    </div>

    <button class="btn" onclick="zakazi()">Rezerviši termin</button>
</div>

<script>
    const baza = {
        "Audi": [
            {ime: "A1", cena: 1800}, {ime: "A3", cena: 2000}, {ime: "A4", cena: 2300}, 
            {ime: "A6", cena: 2300}, {ime: "A8", cena: 2600}, {ime: "Q3", cena: 2600}, 
            {ime: "Q5", cena: 2600}, {ime: "Q7", cena: 2600}
        ],
        "BMW": [
            {ime: "Serija 1", cena: 2000}, {ime: "Serija 3", cena: 2300}, 
            {ime: "Serija 5", cena: 2300}, {ime: "Serija 7", cena: 2600},
            {ime: "X1", cena: 2600}, {ime: "X3", cena: 2600}, {ime: "X5", cena: 2600}
        ],
        "Volkswagen": [
            {ime: "Polo", cena: 1800}, {ime: "Golf", cena: 2000}, 
            {ime: "Passat", cena: 2300}, {ime: "Tiguan", cena: 2600},
            {ime: "Arteon", cena: 2300}, {ime: "Touran", cena: 2300}
        ],
        "Mercedes": [
            {ime: "A Klasa", cena: 2000}, {ime: "C Klasa", cena: 2300}, 
            {ime: "E Klasa", cena: 2300}, {ime: "S Klasa", cena: 2600},
            {ime: "GLC", cena: 2600}, {ime: "GLE", cena: 2600}
        ],
        "Fiat": [
            {ime: "500", cena: 1800}, {ime: "Punto", cena: 1800}, 
            {ime: "Tipo", cena: 2000}, {ime: "500L", cena: 2300}
        ],
        "Skoda": [
            {ime: "Fabia", cena: 1800}, {ime: "Octavia", cena: 2300}, 
            {ime: "Superb", cena: 2300}, {ime: "Kodiaq", cena: 2600}
        ],
        "Opel": [
            {ime: "Corsa", cena: 1800}, {ime: "Astra", cena: 2000}, 
            {ime: "Insignia", cena: 2300}, {ime: "Mokka", cena: 2600}
        ],
        "Renault": [
            {ime: "Clio", cena: 1800}, {ime: "Megane", cena: 2000}, 
            {ime: "Captur", cena: 2600}, {ime: "Talisman", cena: 2300}
        ],
        "Peugeot": [
            {ime: "208", cena: 1800}, {ime: "308", cena: 2000}, 
            {ime: "508", cena: 2300}, {ime: "3008", cena: 2600}
        ]
    };

    function azurirajModele() {
        const marka = document.getElementById("markaSel").value;
        const modelMeni = document.getElementById("modelSel");
        modelMeni.innerHTML = '<option value="" disabled selected>Izaberi model...</option>';
        if (baza[marka]) {
            baza[marka].forEach(auto => {
                let opcija = document.createElement("option");
                opcija.value = auto.cena;
                opcija.text = auto.ime;
                modelMeni.appendChild(opcija);
            });
        }
        izracunaj();
    }

    function izracunaj() {
        const cenaModela = parseInt(document.getElementById("modelSel").value);
        const mnozilac = parseFloat(document.getElementById("tretmanSel").value);
        const polje = document.getElementById("rezultat");
        if (cenaModela) {
            const ukupno = cenaModela * mnozilac;
            polje.innerText = ukupno.toLocaleString() + " RSD";
        } else {
            polje.innerText = "0 RSD";
        }
    }

    function zakazi() {
        const marka = document.getElementById("markaSel").value;
        const modelEl = document.getElementById("modelSel");
        const model = modelEl.options[modelEl.selectedIndex].text;
        const cena = document.getElementById("rezultat").innerText;
        if (cena === "0 RSD" || !marka) {
            alert("Molimo odaberite vozilo!");
            return;
        }
        const baseURL = "https://docs.google.com/forms/d/e/1FAIpQLSe1ZLTC1otAYCUCuvvZgsE8fOmNQR9JygNXWfyhfViyzA7LeQ/viewform?usp=pp_url";
        const finalURL = `${baseURL}&entry.345073777=${encodeURIComponent(marka + " " + model)}&entry.988818818=${encodeURIComponent(cena)}`;
        window.open(finalURL, '_blank');
    }
</script>

</body>
</html>
