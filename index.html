<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORICA Auto Nega | Kalkulator</title>
    <style>
        :root {
            --gold: #d4af37;
            --black: #0a0a0a;
            --dark-grey: #1a1a1a;
        }

        body {
            background-color: var(--black);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--dark-grey);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 { color: var(--gold); margin-bottom: 10px; font-size: 28px; letter-spacing: 2px; }
        p { color: #888; margin-bottom: 25px; font-size: 14px; text-transform: uppercase; }

        .group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--gold); font-weight: bold; font-size: 14px; }

        select {
            width: 100%;
            padding: 12px;
            background: #252525;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
        }

        .price-tag {
            font-size: 36px;
            font-weight: bold;
            color: var(--gold);
            margin: 25px 0;
            padding: 15px;
            border-top: 1px solid #333;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .order-btn {
            background: var(--gold);
            color: black;
            border: none;
            padding: 18px 25px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .order-btn:hover {
            background: #f1c40f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .footer-note {
            margin-top: 15px;
            font-size: 11px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>KORICA</h1>
    <p>Premium Auto Nega Sremčica</p>

    <div class="group">
        <label>Izaberite vozilo:</label>
        <select id="auto">
            <option value="0" disabled selected>Odaberi kategoriju...</option>
            <option value="1800">Malo vozilo (npr. Polo, Corsa, Yaris)</option>
            <option value="2000">Srednje vozilo (npr. Golf, Astra, Focus)</option>
            <option value="2300">Limuzina/Karavan (npr. Passat, A6, BMW 5)</option>
            <option value="2600">Džip/SUV (npr. Tiguan, X5, Q7)</option>
            <option value="3200">Kombi/Lux (npr. V-Klasa, Multivan)</option>
        </select>
    </div>

    <div class="group">
        <label>Izaberite paket usluga:</label>
        <select id="tretman">
            <option value="1">Standard (Pranje + Usisavanje)</option>
            <option value="1.5">Premium (Vax + Detaljan enterijer)</option>
            <option value="2.5">Deep Clean (Dubinsko pranje)</option>
        </select>
    </div>

    <div class="price-tag" id="displayCena">0 RSD</div>

    <button class="order-btn" onclick="zakazi()">REZERVIŠI TERMIN</button>
    <div class="footer-note">Cena je informativnog karaktera i zavisi od stanja vozila.</div>
</div>

<script>
    const autoEl = document.getElementById('auto');
    const tretmanEl = document.getElementById('tretman');
    const display = document.getElementById('displayCena');

    function osveziCenu() {
        const baza = parseInt(autoEl.value);
        const mnozilac = parseFloat(tretmanEl.value);
        if (baza > 0) {
            const ukupno = baza * mnozilac;
            display.innerText = ukupno.toLocaleString() + " RSD";
        }
    }

    autoEl.addEventListener('change', osveziCenu);
    tretmanEl.addEventListener('change', osveziCenu);

    function zakazi() {
        const cena = display.innerText;
        const model = autoEl.options[autoEl.selectedIndex].text;

        if (cena === "0 RSD" || autoEl.value === "0") {
            alert("Molimo Vas da prvo izaberete kategoriju vozila.");
            return;
        }

        // TVOJ PAMETNI LINK SA GOOGLE FORME
        const baseURL = "https://docs.google.com/forms/d/e/1FAIpQLSe1ZLTC1otAYCUCuvvZgsE8fOmNQR9JygNXWfyhfViyzA7LeQ/viewform?usp=pp_url";
        
        // entry.345073777 je za Model, entry.988818818 je za Cenu
        const finalURL = `${baseURL}&entry.345073777=${encodeURIComponent(model)}&entry.988818818=${encodeURIComponent(cena)}`;
        
        window.open(finalURL, '_blank');
    }
</script>

</body>
</html>
