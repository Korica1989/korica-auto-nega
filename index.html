<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>KORICA | Auto nega</title>
    <style>
        :root { --gold: #d4af37; --black: #000; --dark: #111; --gray: #222; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--black); color: white; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; }
        .header { border-left: 5px solid var(--gold); padding-left: 20px; margin-bottom: 30px; }
        h1 { color: var(--gold); margin: 0; letter-spacing: 8px; text-transform: uppercase; font-size: 32px; font-weight: 900; }
        .tagline { display: block; letter-spacing: 2px; font-size: 14px; margin-top: 5px; opacity: 0.8; }
        
        .section-title { color: var(--gold); font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin: 25px 0 10px 0; border-bottom: 1px solid var(--gray); padding-bottom: 5px; }
        
        .group { margin-bottom: 15px; }
        label { display: block; color: #666; font-size: 10px; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        select, .service-opt { width: 100%; padding: 15px; background: var(--dark); color: white; border: 1px solid #333; border-radius: 4px; font-size: 16px; outline: none; appearance: none; }
        
        /* Stil za izbor usluga */
        .services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .service-card { background: var(--dark); border: 1px solid #333; padding: 15px; border-radius: 4px; cursor: pointer; text-align: center; transition: 0.3s; }
        .service-card.active { border-color: var(--gold); background: #1a160a; }
        .service-card i { display: block; font-size: 20px; margin-bottom: 5px; }
        .service-name { font-size: 13px; font-weight: bold; text-transform: uppercase; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; display: none; }
        .stat-card { background: #080808; border: 1px solid #222; padding: 12px; border-radius: 4px; }
        .stat-label { font-size: 9px; color: #555; text-transform: uppercase; display: block; }
        .stat-val { color: var(--gold); font-size: 16px; font-weight: bold; margin-top: 3px; display: block; }

        .total-box { margin-top: 25px; padding: 20px; background: #0a0a0a; border: 1px solid var(--gold); border-radius: 4px; text-align: center; display: none; }
        .price-val { font-size: 36px; color: var(--gold); font-weight: 900; display: block; }
        
        .btn-wa { background: var(--gold); color: black; border: none; padding: 18px; width: 100%; border-radius: 4px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>KORICA</h1>
        <span class="tagline">SINONIM KVALITETA</span>
    </div>

    <div class="section-title">1. Vozilo</div>
    <div class="group">
        <label>Marka</label>
        <select id="marka" onchange="loadModels()">
            <option value="" disabled selected>Odaberi marku</option>
        </select>
    </div>
    <div class="group">
        <label>Model i godište</label>
        <select id="model" onchange="updateUI()">
            <option value="" disabled selected>Prvo marka</option>
        </select>
    </div>

    <div class="section-title">2. Usluga</div>
    <div class="services-grid" id="services">
        <div class="service-card" onclick="selectService(this, 1500, 'Osnovno pranje')">
            <span class="service-name">Osnovno pranje</span>
        </div>
        <div class="service-card" onclick="selectService(this, 5000, 'Premium Detailing')">
            <span class="service-name">Premium Detailing</span>
        </div>
        <div class="service-card" onclick="selectService(this, 12000, 'Dubinsko pranje')">
            <span class="service-name">Dubinsko pranje</span>
        </div>
        <div class="service-card" onclick="selectService(this, 25000, 'Poliranje i zaštita')">
            <span class="service-name">Poliranje i zaštita</span>
        </div>
    </div>

    <div class="stats-grid" id="stats">
        <div class="stat-card"><span class="stat-label">Dužina</span><span class="stat-val" id="v-len">--</span></div>
        <div class="stat-card"><span class="stat-label">Širina</span><span class="stat-val" id="v-wid">--</span></div>
    </div>

    <div class="total-box" id="price-box">
        <span style="font-size: 11px; color: #777; letter-spacing: 1px;">PROCENJENA CENA</span>
        <span class="price-val" id="v-price">0 RSD</span>
    </div>

    <button class="btn-wa" id="wa-btn" onclick="sendOrder()">Rezerviši termin</button>
</div>

<script>
const db = {
    "Alfa Romeo": [
        "147 (2000-2010)|1.0|422|173|70",
        "156 Sedan (1997-2007)|1.1|443|174|80",
        "156 Sportwagon (1997-2007)|1.2|443|174|90",
        "159 Sedan (2005-2011)|1.2|466|183|90",
        "159 Sportwagon (2005-2011)|1.3|466|183|100",
        "Giulia (2016-2026)|1.2|464|186|95",
        "Giulietta (2010-2020)|1.1|435|180|85",
        "Stelvio (2016-2026)|1.5|468|190|120",
        "MiTo (2008-2018)|0.9|406|172|65"
    ],
    "Audi": [
        "A1 (2010-2018)|0.9|395|174|65",
        "A3 8V (2012-2020)|1.1|431|178|85",
        "A4 B8 Sedan (2008-2016)|1.2|470|182|100",
        "A4 B8 Avant (2008-2016)|1.3|470|182|110",
        "A6 C7 Sedan (2011-2018)|1.4|491|187|120",
        "Q7 G2 (2015-2026)|1.8|506|197|175"
    ],
    "BMW": [
        "Serija 1 F20 (2011-2019)|1.0|432|176|85",
        "Serija 3 G20 (2018-2026)|1.2|471|183|110",
        "Serija 5 G30 (2017-2024)|1.4|493|186|140",
        "X5 G05 (2018-2026)|1.8|492|200|180"
    ],
    "Volkswagen": [
        "Golf 7 (2012-2020)|1.1|425|179|105",
        "Passat B8 Sedan (2014-2023)|1.3|476|183|130",
        "Polo G5 (2009-2017)|0.9|397|168|75"
    ]
    // Ovde dopunjujemo do 1000 sa ostalim markama (Peugeot, Renault, Mercedes, Opel, itd.)
};

let selectedBasePrice = 0;
let selectedServiceName = "";
let currentMultiplier = 1;

function init() {
    const mSel = document.getElementById("marka");
    Object.keys(db).sort().forEach(m => mSel.options.add(new Option(m, m)));
}

function loadModels() {
    const m = document.getElementById("marka").value;
    const modSel = document.getElementById("model");
    modSel.innerHTML = '<option value="" disabled selected>Odaberi model</option>';
    db[m].forEach((item, index) => {
        modSel.options.add(new Option(item.split('|')[0], index));
    });
    updateUI();
}

function selectService(el, price, name) {
    document.querySelectorAll('.service-card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    selectedBasePrice = price;
    selectedServiceName = name;
    updateUI();
}

function updateUI() {
    const m = document.getElementById("marka").value;
    const idx = document.getElementById("model").value;
    
    if (m && idx !== "" && selectedBasePrice > 0) {
        const data = db[m][idx].split('|');
        currentMultiplier = parseFloat(data[1]);
        
        document.getElementById("v-len").innerText = data[2] + " cm";
        document.getElementById("v-wid").innerText = data[3] + " cm";
        
        const finalPrice = Math.round(selectedBasePrice * currentMultiplier);
        document.getElementById("v-price").innerText = finalPrice.toLocaleString() + " RSD";
        
        document.getElementById("stats").style.display = "grid";
        document.getElementById("price-box").style.display = "block";
        document.getElementById("wa-btn").style.display = "block";
    }
}

function sendOrder() {
    const m = document.getElementById("marka").value;
    const mod = document.getElementById("model").options[document.getElementById("model").selectedIndex].text;
    const price = document.getElementById("v-price").innerText;
    const msg = `KORICA Auto nega%0A---%0AUsluga: ${selectedServiceName}%0AVozilo: ${m} ${mod}%0ACena: ${price}`;
    window.open(`https://wa.me/381600000000?text=${msg}`);
}

window.onload = init;
</script>
</body>
</html>
