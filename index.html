<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORICA Auto Nega | Personalizovano Održavanje</title>
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; }
        body {
            background: var(--black); color: white; font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }
        .card {
            background: rgba(20, 20, 20, 0.98); padding: 30px; border-radius: 25px;
            border: 1px solid var(--gold); width: 100%; max-width: 450px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        h1 { color: var(--gold); margin: 0; letter-spacing: 5px; text-transform: uppercase; font-size: 30px; font-weight: 800; }
        .subtitle { color: #888; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 25px; }
        .group { text-align: left; margin-bottom: 15px; }
        label { display: block; color: var(--gold); margin-bottom: 5px; font-weight: 600; font-size: 11px; text-transform: uppercase; }
        select {
            width: 100%; padding: 12px; background: #111; color: white;
            border: 1px solid #333; border-radius: 10px; font-size: 14px; outline: none;
        }
        .services {
            background: #111; padding: 15px; border-radius: 12px; border: 1px solid #333;
            display: flex; flex-direction: column; gap: 12px; margin-top: 10px;
        }
        .service-item {
            display: flex; align-items: center; justify-content: flex-start; gap: 10px;
            cursor: pointer; font-size: 14px;
        }
        input[type="checkbox"] {
            accent-color: var(--gold); width: 18px; height: 18px; cursor: pointer;
        }
        .price-box {
            margin: 20px 0; padding: 15px; background: rgba(212, 175, 55, 0.05);
            border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .price-tag { font-size: 38px; color: var(--gold); font-weight: 800; }
        .btn {
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: black; border: none; padding: 18px; width: 100%;
            border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
    <h1>KORICA</h1>
    <div class="subtitle">Auto Nega Sremčica | Koch-Chemie</div>
    
    <div class="group">
        <label>1. Izaberi marku</label>
        <select id="markaSel" onchange="azurirajModele()">
            <option value="" selected disabled>Marka...</option>
        </select>
    </div>

    <div class="group">
        <label>2. Izaberi model</label>
        <select id="modelSel" onchange="izracunaj()">
            <option value="">Prvo marka...</option>
        </select>
    </div>

    <div class="group">
        <label>3. Šta radimo danas?</label>
        <div class="services">
            <label class="service-item">
                <input type="checkbox" id="spolja" onchange="izracunaj()" checked> 
                Spoljašnje pranje (Koch-Chemie)
            </label>
            <label class="service-item">
                <input type="checkbox" id="unutra" onchange="izracunaj()" checked> 
                Unutrašnje održavanje & Detalji
            </label>
        </div>
    </div>

    <div class="price-box">
        <div style="font-size: 10px; color: #888; margin-bottom: 5px;">UKUPNO ZA NAPLATU</div>
        <div class="price-tag" id="rezultat">0 RSD</div>
    </div>

    <button class="btn" onclick="zakazi()">Rezerviši Termin</button>
</div>

<script>
    // Cene su podeljene: Spolja (50%) + Unutra (50%) = Ukupna baza
    // Primer Touareg baza 3000 RSD -> Spolja 1500, Unutra 1500
    const baza = {
        "Audi": [{n:"A3",c:2200},{n:"A4",c:2500},{n:"A6",c:2800},{n:"Q7",c:3500}],
        "BMW": [{n:"Serija 1",c:2200},{n:"Serija 3",c:2500},{n:"Serija 5",c:2800},{n:"X5",c:3200}],
        "Volkswagen": [{n:"Polo",c:1800},{n:"Golf",c:2200},{n:"Passat",c:2800},{n:"Touareg",c:3000},{n:"Amarok",c:3500}],
        "Mercedes": [{n:"C Klasa",c:2500},{n:"E Klasa",c:2800},{n:"GLE",c:3200}],
        "Skoda": [{n:"Fabia",c:1800},{n:"Octavia",c:2500},{n:"Superb",c:2800}],
        "Fiat": [{n:"500",c:1800},{n:"Tipo",c:2200}]
    };

    function inicijalizuj() {
        const mSel = document.getElementById("markaSel");
        Object.keys(baza).sort().forEach(m => {
            let o = document.createElement("option"); o.value = m; o.text = m; mSel.appendChild(o);
        });
    }

    function azurirajModele() {
        const m = document.getElementById("markaSel").value;
        const modSel = document.getElementById("modelSel");
        modSel.innerHTML = '<option value="" disabled selected>Model...</option>';
        if(baza[m]) {
            baza[m].forEach(mo => {
                let o = document.createElement("option"); o.value = mo.c; o.text = mo.n; modSel.appendChild(o);
            });
        }
        izracunaj();
    }

    function izracunaj() {
        const osnovnaCena = parseInt(document.getElementById("modelSel").value);
        const r = document.getElementById("rezultat");
        
        if(!osnovnaCena) { r.innerText = "0 RSD"; return; }

        let finalnaCena = 0;
        const spoljaCheckbox = document.getElementById("spolja").checked;
        const unutraCheckbox = document.getElementById("unutra").checked;

        // Logika: Pola cene je spolja, pola unutra
        if(spoljaCheckbox) finalnaCena += (osnovnaCena / 2);
        if(unutraCheckbox) finalnaCena += (osnovnaCena / 2);

        r.innerText = Math.round(finalnaCena).toLocaleString() + " RSD";
    }

    function zakazi() {
        const m = document.getElementById("markaSel").value;
        const modEl = document.getElementById("modelSel");
        const mo = modEl.options[modEl.selectedIndex].text;
        const c = document.getElementById("rezultat").innerText;
        
        let usluge = [];
        if(document.getElementById("spolja").checked) usluge.push("Spolja");
        if(document.getElementById("unutra").checked) usluge.push("Unutra");

        if(c === "0 RSD") { alert("Izaberi bar jednu uslugu!"); return; }

        const bURL = "https://docs.google.com/forms/d/e/1FAIpQLSe1ZLTC1otAYCUCuvvZgsE8fOmNQR9JygNXWfyhfViyzA7LeQ/viewform?usp=pp_url";
        const msg = encodeURIComponent(`${m} ${mo} (${usluge.join(" + ")})`);
        window.open(`${bURL}&entry.345073777=${msg}&entry.988818818=${encodeURIComponent(c)}`, '_blank');
    }

    inicijalizuj();
</script>

</body>
</html>
