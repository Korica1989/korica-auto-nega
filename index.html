<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORICA Auto Nega | Rezervacije</title>
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --dark: #111; }
        body {
            background: var(--black); color: white; font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }
        .card {
            background: rgba(20, 20, 20, 0.98); padding: 35px; border-radius: 30px;
            border: 1px solid var(--gold); width: 100%; max-width: 520px; text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
        }
        h1 { color: var(--gold); margin: 0; letter-spacing: 6px; text-transform: uppercase; font-size: 34px; font-weight: 800; }
        .subtitle { color: #888; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 30px; }
        
        .group { text-align: left; margin-bottom: 22px; }
        label { display: block; color: var(--gold); margin-bottom: 10px; font-weight: 600; font-size: 12px; text-transform: uppercase; }
        
        select {
            width: 100%; padding: 16px; background: var(--dark); color: white;
            border: 1px solid #333; border-radius: 14px; font-size: 16px; outline: none; cursor: pointer;
        }

        .services-container {
            background: var(--dark); padding: 18px; border-radius: 14px; border: 1px solid #333;
            display: flex; flex-direction: column; gap: 14px;
        }
        .service-item { display: flex; align-items: center; gap: 14px; cursor: pointer; font-size: 15px; }
        input[type="checkbox"] { accent-color: var(--gold); width: 22px; height: 22px; cursor: pointer; }

        .note-box {
            display: none; margin-top: 15px; padding: 15px; 
            background: rgba(212, 175, 55, 0.05); border: 1px dashed var(--gold);
            border-radius: 12px; font-size: 12px; color: var(--gold); text-align: left; line-height: 1.5;
        }

        .price-box {
            margin: 25px 0; padding: 25px; background: rgba(212, 175, 55, 0.03);
            border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .price-tag { font-size: 48px; color: var(--gold); font-weight: 800; }
        .time-info { color: #00ffcc; font-size: 13px; margin-top: 12px; font-weight: 600; text-transform: uppercase; }

        .btn {
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: black; border: none; padding: 22px; width: 100%;
            border-radius: 16px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 16px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
    <h1>KORICA</h1>
    <div class="subtitle">Auto Nega | Sremčica</div>
    
    <div class="group">
        <label>1. Brend vozila</label>
        <select id="markaSel" onchange="azurirajModele()">
        </select>
    </div>

    <div class="group">
        <label>2. Model</label>
        <select id="modelSel" onchange="izracunaj()">
            <option value="">Prvo odaberi brend...</option>
        </select>
    </div>

    <div class="group">
        <label>3. Usluge</label>
        <div class="services-container">
            <label class="service-item"><input type="checkbox" id="spolja" onchange="izracunaj()" checked> Spoljašnje pranje</label>
            <label class="service-item"><input type="checkbox" id="unutra" onchange="izracunaj()" checked> Unutrašnje čišćenje</label>
        </div>
        <div id="pragoviNote" class="note-box">
            ✨ <b>KORICA Standard:</b> Uz pranje spolja, uključeno je detaljno čišćenje pragova (+100 RSD).
        </div>
    </div>

    <div class="price-box">
        <div class="price-tag" id="rezultat">0 RSD</div>
        <div class="time-info" id="vreme">Spreman</div>
    </div>

    <button class="btn" onclick="zakazi()">Rezerviši termin</button>
</div>
