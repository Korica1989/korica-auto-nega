        body { background: var(--black); color: white; padding-bottom: 40px; }
        .header { padding: 40px 20px; text-align: center; border-bottom: 2px solid var(--gold); background: linear-gradient(to bottom, #111, #000); }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        #search-input { width: 100%; padding: 18px; background: var(--grey); color: white; border: 1px solid var(--dark-grey); border-radius: 12px; font-size: 16px; border-left: 5px solid var(--gold); outline: none; }
        .results-dropdown { position: absolute; width: 100%; background: var(--grey); border: 1px solid var(--dark-grey); border-radius: 0 0 12px 12px; max-height: 450px; overflow-y: auto; z-index: 100; display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        .search-item { padding: 15px; border-bottom: 1px solid #111; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; }
        .search-item b { color: var(--gold); }
        .selected-display { background: #1a160a; padding: 18px; border-radius: 12px; border: 1px dashed var(--gold); margin-top: 15px; display: none; text-align: center; font-weight: 900; color: var(--gold); text-transform: uppercase; font-size: 12px; }
        .option-card { background: var(--grey); border: 1px solid var(--dark-grey); padding: 20px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .option-card.active { border-color: var(--gold); background: #1a160a; }
        .result-box { margin-top: 25px; padding: 25px; background: var(--grey); border-radius: 20px; text-align: center; display: none; border-top: 5px solid var(--gold); }
        .price { font-size: 48px; color: var(--gold); font-weight: 900; display: block; margin-bottom: 10px; }
        .call-btn { display: block; width: 100%; padding: 18px; background: var(--gold); color: black; text-align: center; text-decoration: none; font-weight: 900; border-radius: 12px; text-transform: uppercase; font-size: 15px; }

    let selectedVehicle = null;
    const BAZA_SPOLJA = 800; 
    const BAZA_UNUTRA = 700;

    function filterVehicles() {
        const input = document.getElementById('search-input').value.toLowerCase();
        const resultsDiv = document.getElementById('search-results');
        resultsDiv.innerHTML = '';
        if (input.length < 1) { resultsDiv.style.display = 'none'; return; }
        const filtered = vehicleData.filter(v => v.name.toLowerCase().includes(input)).slice(0, 15);
        if (filtered.length > 0) {
            resultsDiv.style.display = 'block';
            filtered.forEach(v => {
                const div = document.createElement('div');
                div.className = 'search-item';
                div.innerHTML = `<span>${v.name}</span> <b>(${v.years})</b>`;
                div.onclick = () => selectVehicle(v);
                resultsDiv.appendChild(div);
            });
        } else { resultsDiv.style.display = 'none'; }
    }

    function selectVehicle(v) {
        selectedVehicle = v;
        document.getElementById('search-input').value = v.name;
        document.getElementById('search-results').style.display = 'none';
        document.getElementById('selected-info').innerText = v.name + " (" + v.years + ")";
        document.getElementById('selected-info').style.display = 'block';
        calculate();
    }

    function toggleOption(id) {
        const ch = document.getElementById('check-' + id);
        ch.checked = !ch.checked;
        document.getElementById('card-' + id).className = ch.checked ? 'option-card active' : 'option-card';
        calculate();
    }

    function calculate() {
        if (!selectedVehicle) return;
        const isSpolja = document.getElementById('check-spolja').checked;
        const isUnutra = document.getElementById('check-unutra').checked;
        if (!isSpolja && !isUnutra) { document.getElementById('results-box').style.display = 'none'; return; }
        let total = 0;
        if(isSpolja) total += (BAZA_SPOLJA * selectedVehicle.ks);
        if(isUnutra) total += (BAZA_UNUTRA * selectedVehicle.ku);
        document.getElementById('res-price').innerText = (Math.round(total / 100) * 100) + " RSD";
        document.getElementById('results-box').style.display = "block";
    }
