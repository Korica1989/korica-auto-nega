<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>KORICA Auto Nega | Rezervacije</title>
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --dark: #111; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            background: var(--black); color: white; font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 15px;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }
        .card {
            background: rgba(20, 20, 20, 0.98); padding: 25px; border-radius: 25px;
            border: 1px solid var(--gold); width: 100%; max-width: 450px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        h1 { color: var(--gold); margin: 0; letter-spacing: 4px; text-transform: uppercase; font-size: 28px; font-weight: 800; }
        .subtitle { color: #888; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 25px; }
        
        .group { text-align: left; margin-bottom: 18px; }
        label { display: block; color: var(--gold); margin-bottom: 8px; font-weight: 600; font-size: 11px; text-transform: uppercase; }
        
        select {
            width: 100%; padding: 14px; background: var(--dark); color: white;
            border: 1px solid #333; border-radius: 12px; font-size: 16px; outline: none; appearance: none;
        }

        .services-container {
            background: var(--dark); padding: 15px; border-radius: 12px; border: 1px solid #333;
            display: flex; flex-direction: column; gap: 12px;
        }
        .service-item { display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 14px; }
        input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--gold); }

        .note-box {
            display: none; margin-top: 12px; padding: 12px; 
            border-radius: 10px; font-size: 11px; text-align: left; line-height: 1.4;
        }
        .note-standard { background: rgba(212, 175, 55, 0.05); border: 1px dashed var(--gold); color: var(--gold); }
        .note-karavan { background: rgba(0, 255, 204, 0.05); border: 1px dashed #00ffcc; color: #00ffcc; margin-top: 5px; }

        .price-box { margin: 20px 0; padding: 20px; background: rgba(212, 175, 55, 0.03); border-radius: 15px; }
        .price-tag { font-size: 40px; color: var(--gold); font-weight: 800; }
        .time-info { color: #00ffcc; font-size: 12px; margin-top: 8px; text-transform: uppercase; }

        .btn {
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: black; border: none; padding: 18px; width: 100%;
            border-radius: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 14px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
    <h1>KORICA</h1>
    <div class="subtitle">Auto Nega | Sremčica</div>
    
    <div class="group">
        <label>1. Brend vozila</label>
        <select id="markaSel"></select>
    </div>

    <div class="group">
        <label>2. Model</label>
        <select id="modelSel">
            <option value="">Prvo odaberi brend...</option>
        </select>
    </div>

    <div class="group">
        <label>3. Usluge</label>
        <div class="services-container">
            <label class="service-item"><input type="checkbox" id="spolja" checked> Spoljašnje pranje</label>
            <label class="service-item"><input type="checkbox" id="unutra" checked> Unutrašnje čišćenje</label>
        </div>
        <div id="pragoviNote" class="note-box note-standard">
            ✨ <b>KORICA Standard:</b> Uz pranje spolja, uključeno je detaljno čišćenje pragova (+100 RSD).
        </div>
        <div id="karavanNote" class="note-box note-karavan">
            📦 <b>Karavan info:</b> Zbog veće zapremine gepeka i staklenih površina, potrebno je više vremena za detaljan rad.
        </div>
    </div>

    <div class="price-box">
        <div class="price-tag" id="rezultat">0 RSD</div>
        <div id="vreme" class="time-info">Spreman</div>
    </div>

    <button class="btn" onclick="zakazi()">Rezerviši termin</button>
</div>

<script>
    // Baza sa razdvojenim limuzinama i karavanima za najčešće marke
    const baza = {
        "Audi": ["A4 Limuzina|1000|800|60", "A4 Karavan (Avant)|1100|900|75", "A6 Limuzina|1100|900|70", "A6 Karavan (Avant)|1200|1000|85"],
        "BMW": ["Serija 3 Limuzina|1000|800|60", "Serija 3 Karavan (Touring)|1100|900|75", "Serija 5 Limuzina|1100|900|70", "Serija 5 Karavan (Touring)|1200|1000|85"],
        "Ford": ["Mondeo Limuzina|1000|800|60", "Mondeo Karavan|1100|900|75", "Focus Limuzina|900|700|55", "Focus Karavan|1000|800|70"],
        "Mercedes-Benz": ["C Klasa Limuzina|1000|800|60", "C Klasa Karavan|1100|900|75", "E Klasa Limuzina|1100|900|70", "E Klasa Karavan|1200|1000|85"],
        "Opel": ["Astra Limuzina|900|700|55", "Astra Karavan|1000|800|70", "Insignia Limuzina|1050|850|65", "Insignia Karavan|1150|950|80"],
        "Peugeot": ["308 Limuzina|900|700|55", "308 Karavan (SW)|1000|800|70", "508 Limuzina|1050|850|65", "508 Karavan (SW)|1150|950|80"],
        "Renault": ["Megane Limuzina|900|700|55", "Megane Karavan|1000|800|70", "Talisman Limuzina|1100|900|70", "Talisman Karavan|1200|1000|85"],
        "Skoda": ["Octavia Limuzina|1000|800|60", "Octavia Karavan (Combi)|1100|900|75", "Superb Limuzina|1100|900|70", "Superb Karavan (Combi)|1200|1000|85", "Fabia Limuzina|800|600|45", "Fabia Karavan|900|700|55"],
        "Volkswagen": ["Passat B6/B7/B8 Limuzina|1000|800|60", "Passat B6/B7/B8 Karavan|1100|900|75", "Golf 7/8 Hatchback|900|700|55", "Golf 7/8 Karavan (Variant)|1000|800|70"],
        "Volvo": ["V60 Karavan|1100|900|75", "V90 Karavan|1250|1050|85", "S60 Limuzina|1050|850|65", "S90 Limuzina|1200|1000|75"]
    };

    const mSel = document.getElementById("markaSel");
    const modSel = document.getElementById("modelSel");
    const cSpolja = document.getElementById("spolja");
    const cUnutra = document.getElementById("unutra");

    function inicijalizuj() {
        mSel.innerHTML = '<option value="" disabled selected>Odaberi brend...</option>';
        Object.keys(baza).sort().forEach(m => {
            let o = document.createElement("option"); o.value = m; o.text = m; mSel.appendChild(o);
        });
    }

    mSel.addEventListener('change', () => {
        const m = mSel.value;
        modSel.innerHTML = '<option value="" disabled selected>Odaberi model...</option>';
        baza[m].sort().forEach(mo => {
            let [ime] = mo.split('|');
            let o = document.createElement("option"); o.value = mo; o.text = ime; modSel.appendChild(o);
        });
        izracunaj();
    });

    [modSel, cSpolja, cUnutra].forEach(el => {
        el.addEventListener('change', izracunaj);
    });

    function izracunaj() {
        const val = modSel.value;
        const pNote = document.getElementById("pragoviNote");
        const kNote = document.getElementById("karavanNote");
        
        if(!val) return;

        let [ime, cS, cU, min] = val.split('|');
        let ukupno = 0;
        let t = parseInt(min);

        if(cSpolja.checked) { ukupno += parseInt(cS); }
        if(cUnutra.checked) { ukupno += parseInt(cU); }

        // Logika za Karavan obaveštenje
        if(ime.includes("Karavan") || ime.includes("Combi") || ime.includes("Variant") || ime.includes("Touring") || ime.includes("Avant")) {
            kNote.style.display = "block";
        } else {
            kNote.style.display = "none";
        }

        // Logika za pragove (Standard)
        if(cSpolja.checked && !cUnutra.checked) {
            ukupno += 100;
            pNote.style.display = "block";
        } else {
            pNote.style.display = "none";
        }

        document.getElementById("rezultat").innerText = ukupno.toLocaleString() + " RSD";
        document.getElementById("vreme").innerText = (cSpolja.checked || cUnutra.checked) ? "~" + t + " MINUTA" : "Spreman";
    }

    function zakazi() {
        if(!modSel.value) { alert("Molimo Vas, odaberite vozilo."); return; }
        const poruka = `Pozdrav! Želim da zakažem termin.\nVozilo: ${mSel.value} ${modSel.value.split('|')[0]}\nCena: ${document.getElementById("rezultat").innerText}`;
        window.open(`https://wa.me/38164XXXXXXX?text=${encodeURIComponent(poruka)}`, '_blank');
    }

    window.onload = inicijalizuj;
</script>
</body>
</html>
