<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORICA Auto Nega | Kalkulator</title>
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; }
        body {
            background: var(--black); color: white; font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }
        .card {
            background: rgba(20, 20, 20, 0.98); padding: 30px; border-radius: 25px;
            border: 1px solid var(--gold); width: 100%; max-width: 450px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        h1 { color: var(--gold); margin: 0; letter-spacing: 5px; text-transform: uppercase; font-size: 30px; font-weight: 800; }
        .subtitle { color: #888; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 25px; }
        .group { text-align: left; margin-bottom: 15px; }
        label { display: block; color: var(--gold); margin-bottom: 5px; font-weight: 600; font-size: 11px; text-transform: uppercase; }
        select {
            width: 100%; padding: 12px; background: #111; color: white;
            border: 1px solid #333; border-radius: 10px; font-size: 14px; outline: none;
        }
        .services-container {
            background: #111; padding: 15px; border-radius: 12px; border: 1px solid #333;
            display: flex; flex-direction: column; gap: 12px; margin-top: 10px;
        }
        .service-item {
            display: flex; align-items: center; justify-content: flex-start; gap: 12px;
            cursor: pointer; font-size: 14px; transition: 0.3s;
        }
        input[type="checkbox"] {
            accent-color: var(--gold); width: 20px; height: 20px; cursor: pointer;
        }
        .price-box {
            margin: 20px 0; padding: 15px; background: rgba(212, 175, 55, 0.05);
            border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .price-tag { font-size: 38px; color: var(--gold); font-weight: 800; }
        .btn {
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: black; border: none; padding: 18px; width: 100%;
            border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase;
            transition: 0.3s;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
    <h1>KORICA</h1>
    <div class="subtitle">Auto Nega Sremčica | Koch-Chemie</div>
    
    <div class="group">
        <label>1. Odaberi marku</label>
        <select id="markaSel" onchange="azurirajModele()">
            <option value="" selected disabled>Izaberi marku...</option>
        </select>
    </div>

    <div class="group">
        <label>2. Odaberi model</label>
        <select id="modelSel" onchange="izracunaj()">
            <option value="">Prvo odaberi marku...</option>
        </select>
    </div>

    <div class="group">
        <label>3. Odaberi usluge</label>
        <div class="services-container">
            <label class="service-item">
                <input type="checkbox" id="spolja" onchange="izracunaj()" checked> 
                Spoljašnje pranje
            </label>
            <label class="service-item">
                <input type="checkbox" id="unutra" onchange="izracunaj()" checked> 
                Unutrašnje održavanje
            </label>
        </div>
    </div>

    <div class="price-box">
        <div style="font-size: 10px; color: #888; margin-bottom: 5px;">UKUPNA CENA</div>
        <div class="price-tag" id="rezultat">0 RSD</div>
    </div>

    <button class="btn" onclick="zakazi()">Rezerviši Termin</button>
</div>

<script>
    // BAZA SA REPRODUKCIJOM CENA (Touareg = 2600)
    const baza = {
        "Alfa Romeo": [{n:"Giulietta",c:2000},{n:"Giulia",c:2200},{n:"Stelvio",c:2600}],
        "Audi": [{n:"A1",c:1600},{n:"A3",c:1800},{n:"A4",c:2200},{n:"A6",c:2400},{n:"Q3",c:2400},{n:"Q5",c:2600},{n:"Q7",c:3000},{n:"Q8",c:3000}],
        "BMW": [{n:"Serija 1",c:1800},{n:"Serija 3",c:2200},{n:"Serija 5",c:2400},{n:"Serija 7",c:2800},{n:"X1",c:2400},{n:"X3",c:2600},{n:"X5",c:2800},{n:"X7",c:3200}],
        "Citroen": [{n:"C3",c:1600},{n:"C4",c:1800},{n:"C5",c:2200}],
        "Dacia": [{n:"Sandero",c:1600},{n:"Duster",c:2400}],
        "Fiat": [{n:"500",c:1600},{n:"Punto",c:1600},{n:"Tipo",c:1800},{n:"500L",c:2200}],
        "Ford": [{n:"Fiesta",c:1600},{n:"Focus",c:1800},{n:"Mondeo",c:2200},{n:"Kuga",c:2600}],
        "Hyundai": [{n:"i20",c:1600},{n:"i30",c:1800},{n:"Tucson",c:2600}],
        "Kia": [{n:"Ceed",c:1800},{n:"Sportage",c:2600}],
        "Mercedes": [{n:"A Klasa",c:1800},{n:"C Klasa",c:2200},{n:"E Klasa",c:2400},{n:"S Klasa",c:2800},{n:"GLC",c:2600},{n:"GLE",c:2800},{n:"GLS",c:3200}],
        "Opel": [{n:"Corsa",c:1600},{n:"Astra",c:1800},{n:"Insignia",c:2200}],
        "Peugeot": [{n:"208",c:1600},{n:"308",c:1800},{n:"508",c:2200},{n:"3008",c:2600},{n:"5008",c:2800}],
        "Renault": [{n:"Clio",c:1600},{n:"Megane",c:1800},{n:"Talisman",c:2200},{n:"Captur",c:2200},{n:"Kadjar",c:2600}],
        "Skoda": [{n:"Fabia",c:1600},{n:"Octavia",c:2200},{n:"Superb",c:2400},{n:"Kodiaq",c:2600}],
        "Toyota": [{n:"Yaris",c:1600},{n:"Corolla",c:1800},{n:"Rav4",c:2600},{n:"Land Cruiser",c:3200}],
        "Volkswagen": [{n:"Up!",c:1600},{n:"Polo",c:1600},{n:"Golf",c:1800},{n:"Passat",c:2400},{n:"Arteon",c:2400},{n:"Tiguan",c:2600},{n:"Touareg",c:2600},{n:"Caddy",c:2400},{n:"Amarok",c:3200},{n:"Transporter",c:3400}],
        "Volvo": [{n:"XC40",c:2200},{n:"XC60",c:2600},{n:"XC90",c:3200}]
    };

    function inicijalizuj() {
        const mSel = document.getElementById("markaSel");
        Object.keys(baza).sort().forEach(m => {
            let o = document.createElement("option"); o.value = m; o.text = m; mSel.appendChild(o);
        });
    }

    function azurirajModele() {
        const m = document.getElementById("markaSel").value;
        const modSel = document.getElementById("modelSel");
        modSel.innerHTML = '<option value="" disabled selected>Izaberi model...</option>';
        if(baza[m]) {
            baza[m].sort((a,b)=>a.n.localeCompare(b.n)).forEach(mo => {
                let o = document.createElement("option"); o.value = mo.c; o.text = mo.n; modSel.appendChild(o);
            });
        }
        izracunaj();
    }

    function izracunaj() {
        const mc = parseInt(document.getElementById("modelSel").value);
        const r = document.getElementById("rezultat");
        if(!mc) { r.innerText = "0 RSD"; return; }

        let s = document.getElementById("spolja").checked;
        let u = document.getElementById("unutra").checked;
        
        let faktor = 0;
        if(s) faktor += 0.5;
        if(u) faktor += 0.5;

        r.innerText = Math.round(mc * faktor).toLocaleString() + " RSD";
    }

    function zakazi() {
        const m = document.getElementById("markaSel").value;
        const modEl = document.getElementById("modelSel");
        if(modEl.selectedIndex <= 0) { alert("Odaberi auto!"); return; }
        const mo = modEl.options[modEl.selectedIndex].text;
        const c = document.getElementById("rezultat").innerText;
        const usluge = [];
        if(document.getElementById("spolja").checked) usluge.push("Spolja");
        if(document.getElementById("unutra").checked) usluge.push("Unutra");
        
        const bURL = "https://docs.google.com/forms/d/e/1FAIpQLSe1ZLTC1otAYCUCuvvZgsE8fOmNQR9JygNXWfyhfViyzA7LeQ/viewform?usp=pp_url";
        const msg = encodeURIComponent(`${m} ${mo} (${usluge.join("+")})`);
        window.open(`${bURL}&entry.345073777=${msg}&entry.988818818=${encodeURIComponent(c)}`, '_blank');
    }

    inicijalizuj();
</script>

</body>
</html>
