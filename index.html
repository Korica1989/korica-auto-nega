<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORICA Auto Nega | Rezervacija</title>
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; }
        body {
            background: var(--black); color: white; font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }
        .card {
            background: rgba(20, 20, 20, 0.98); padding: 30px; border-radius: 25px;
            border: 1px solid var(--gold); width: 100%; max-width: 450px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        h1 { color: var(--gold); margin: 0; letter-spacing: 5px; text-transform: uppercase; font-size: 30px; font-weight: 800; }
        .subtitle { color: #888; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 25px; }
        .group { text-align: left; margin-bottom: 15px; }
        label { display: block; color: var(--gold); margin-bottom: 5px; font-weight: 600; font-size: 11px; text-transform: uppercase; }
        select {
            width: 100%; padding: 12px; background: #111; color: white;
            border: 1px solid #333; border-radius: 10px; font-size: 14px; outline: none;
        }
        .services-container {
            background: #111; padding: 15px; border-radius: 12px; border: 1px solid #333;
            display: flex; flex-direction: column; gap: 12px; margin-top: 10px;
        }
        .service-item { display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 14px; }
        input[type="checkbox"] { accent-color: var(--gold); width: 20px; height: 20px; cursor: pointer; }
        .price-box {
            margin: 20px 0; padding: 15px; background: rgba(212, 175, 55, 0.05);
            border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .price-tag { font-size: 38px; color: var(--gold); font-weight: 800; }
        .time-info { color: #00ffcc; font-size: 13px; margin-top: 5px; font-weight: 600; }
        .btn {
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: black; border: none; padding: 18px; width: 100%;
            border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
    <h1>KORICA</h1>
    <div class="subtitle">Auto Nega Sremčica | Koch-Chemie</div>
    
    <div class="group">
        <label>1. Marka vozila</label>
        <select id="markaSel" onchange="azurirajModele()">
            <option value="" selected disabled>Izaberi marku...</option>
        </select>
    </div>

    <div class="group">
        <label>2. Model vozila</label>
        <select id="modelSel" onchange="izracunaj()">
            <option value="">Prvo odaberi marku...</option>
        </select>
    </div>

    <div class="group">
        <label>3. Usluge</label>
        <div class="services-container">
            <label class="service-item"><input type="checkbox" id="spolja" onchange="izracunaj()" checked> Spoljašnje pranje</label>
            <label class="service-item"><input type="checkbox" id="unutra" onchange="izracunaj()" checked> Unutrašnje održavanje</label>
        </div>
    </div>

    <div class="price-box">
        <div class="price-tag" id="rezultat">0 RSD</div>
        <div class="time-info" id="vreme">Vreme rada: -- min</div>
    </div>

    <button class="btn" onclick="zakazi()">Rezerviši Termin</button>
</div>

<script>
    const baza = {
        "Abarth": [{n:"500",c:1600,v:40},{n:"595",c:1600,v:40}],
        "Alfa Romeo": [{n:"147",c:1800,v:45},{n:"156",c:2000,v:50},{n:"159",c:2200,v:55},{n:"Brera",c:2200,v:55},{n:"GT",c:2000,v:50},{n:"Giulietta",c:2000,v:50},{n:"Giulia",c:2200,v:55},{n:"Stelvio",c:2600,v:65}],
        "Audi": [
            {n:"A1",c:1800,v:45},{n:"A2",c:1800,v:45},{n:"A3",c:2000,v:50},{n:"A4",c:2200,v:55},{n:"A5",c:2300,v:55},{n:"A6",c:2500,v:65},{n:"A7",c:2600,v:65},{n:"A8",c:2800,v:75},
            {n:"Q1",c:2000,v:50},{n:"Q2",c:2200,v:55},{n:"Q3",c:2300,v:60},{n:"Q5",c:2500,v:65},{n:"Q7",c:3000,v:85},{n:"Q8",c:3000,v:85}
        ],
        "BMW": [
            {n:"Serija 1",c:1800,v:45},{n:"Serija 2",c:2000,v:50},{n:"Serija 3",c:2200,v:55},{n:"Serija 4",c:2300,v:55},{n:"Serija 5",c:2500,v:65},{n:"Serija 7",c:2800,v:75},
            {n:"X1",c:2200,v:55},{n:"X2",c:2300,v:55},{n:"X3",c:2500,v:65},{n:"X4",c:2500,v:65},{n:"X5",c:2600,v:70},{n:"X6",c:2800,v:75},{n:"X7",c:3200,v:90}
        ],
        "Citroen": [{n:"C1",c:1600,v:40},{n:"C2",c:1600,v:40},{n:"C3",c:1800,v:45},{n:"C4",c:2000,v:50},{n:"C5",c:2400,v:65},{n:"Berlingo",c:2400,v:65}],
        "Dacia": [{n:"Sandero",c:1800,v:45},{n:"Logan",c:2000,v:50},{n:"Duster",c:2400,v:65},{n:"Jogger",c:2500,v:70}],
        "Fiat": [{n:"500",c:1600,v:40},{n:"Panda",c:1600,v:40},{n:"Punto",c:1800,v:45},{n:"Stilo",c:2000,v:50},{n:"Bravo",c:2000,v:50},{n:"Tipo",c:2200,v:55},{n:"500L",c:2300,v:60},{n:"Ducato",c:3500,v:110}],
        "Ford": [{n:"Ka",c:1600,v:40},{n:"Fiesta",c:1800,v:45},{n:"Focus",c:2000,v:55},{n:"Mondeo",c:2400,v:65},{n:"Kuga",c:2500,v:70},{n:"S-Max",c:2600,v:75},{n:"Ranger",c:3200,v:90}],
        "Honda": [{n:"Jazz",c:1800,v:45},{n:"Civic",c:2100,v:55},{n:"Accord",c:2400,v:65},{n:"CR-V",c:2600,v:70}],
        "Hyundai": [{n:"i10",c:1600,v:40},{n:"i20",c:1800,v:45},{n:"i30",c:2100,v:55},{n:"Elantra",c:2300,v:60},{n:"Tucson",c:2600,v:70},{n:"Santa Fe",c:2800,v:80}],
        "Kia": [{n:"Picanto",c:1600,v:40},{n:"Rio",c:1800,v:45},{n:"Ceed",c:2100,v:55},{n:"Sportage",c:2600,v:70},{n:"Sorento",c:2800,v:80}],
        "Mazda": [{n:"Mazda 2",c:1800,v:45},{n:"Mazda 3",c:2100,v:55},{n:"Mazda 6",c:2400,v:65},{n:"CX-3",c:2200,v:55},{n:"CX-5",c:2600,v:70},{n:"CX-30",c:2400,v:60}],
        "Mercedes": [
            {n:"A Klasa",c:1900,v:45},{n:"B Klasa",c:2100,v:50},{n:"C Klasa",c:2300,v:55},{n:"E Klasa",c:2500,v:65},{n:"S Klasa",c:3000,v:80},
            {n:"CLA",c:2300,v:55},{n:"CLS",c:2600,v:65},{n:"GLA",c:2200,v:55},{n:"GLC",c:2600,v:65},{n:"GLE",c:2800,v:75},{n:"GLS",c:3500,v:100},{n:"G Klasa",c:3200,v:90},{n:"V Klasa",c:3500,v:110}
        ],
        "Nissan": [{n:"Micra",c:1700,v:45},{n:"Juke",c:2100,v:50},{n:"Qashqai",c:2500,v:65},{n:"X-Trail",c:2700,v:75},{n:"Navara",c:3200,v:90}],
        "Opel": [{n:"Corsa",c:1800,v:45},{n:"Astra",c:2100,v:55},{n:"Insignia",c:2400,v:65},{n:"Mokka",c:2200,v:55},{n:"Zafira",c:2500,v:70}],
        "Peugeot": [{n:"108",c:1600,v:40},{n:"206/207/208",c:1800,v:45},{n:"307/308",c:2100,v:55},{n:"407/508",c:2400,v:65},{n:"2008",c:2200,v:55},{n:"3008",c:2500,v:70},{n:"5008",c:2800,v:80}],
        "Renault": [{n:"Twingo",c:1600,v:40},{n:"Clio",c:1800,v:45},{n:"Megane",c:2100,v:55},{n:"Laguna/Talisman",c:2400,v:65},{n:"Captur",c:2200,v:55},{n:"Kadjar",c:2500,v:70},{n:"Scenic",c:2400,v:70},{n:"Espace",c:2800,v:80}],
        "Seat": [{n:"Ibiza",c:1800,v:45},{n:"Leon",c:2100,v:55},{n:"Arona",c:2200,v:55},{n:"Ateca",c:2500,v:70},{n:"Tarraco",c:2800,v:80}],
        "Skoda": [{n:"Citigo",c:1600,v:40},{n:"Fabia",c:1800,v:45},{n:"Scala",c:2100,v:55},{n:"Octavia",c:2300,v:60},{n:"Superb",c:2600,v:70},{n:"Kamiq",c:2200,v:55},{n:"Karoq",c:2500,v:70},{n:"Kodiaq",c:2800,v:80}],
        "Toyota": [{n:"Aygo",c:1600,v:40},{n:"Yaris",c:1800,v:45},{n:"Corolla",c:2200,v:55},{n:"Avensis",c:2400,v:65},{n:"CH-R",c:2400,v:60},{n:"Rav4",c:2700,v:75},{n:"Land Cruiser",c:3500,v:100}],
        "Volkswagen": [
            {n:"Up!",c:1600,v:40},{n:"Polo",c:1800,v:45},{n:"Golf",c:2100,v:55},{n:"Passat",c:2400,v:65},{n:"Arteon",c:2500,v:65},{n:"Scirocco",c:2100,v:50},
            {n:"T-Cross",c:2200,v:55},{n:"T-Roc",c:2300,v:60},{n:"Tiguan",c:2600,v:70},{n:"Touareg",c:2600,v:70},{n:"Touran",c:2500,v:70},{n:"Sharan",c:2800,v:80},{n:"Caddy",c:2500,v:70},{n:"Amarok",c:3200,v:90},{n:"Transporter",c:3500,v:110}
        ],
        "Volvo": [{n:"V40",c:2100,v:50},{n:"S60/V60",c:2400,v:65},{n:"S90/V90",c:2700,v:75},{n:"XC40",c:2400,v:60},{n:"XC60",c:2700,v:70},{n:"XC90",c:3200,v:90}]
    };

    function inicijalizuj() {
        const mSel = document.getElementById("markaSel");
        Object.keys(baza).sort().forEach(m => {
            let o = document.createElement("option"); o.value = m; o.text = m; mSel.appendChild(o);
        });
    }

    function azurirajModele() {
        const m = document.getElementById("markaSel").value;
        const modSel = document.getElementById("modelSel");
        modSel.innerHTML = '<option value="" disabled selected>Izaberi model...</option>';
        if(baza[m]) {
            baza[m].sort((a,b)=>a.n.localeCompare(b.n)).forEach(mo => {
                let o = document.createElement("option"); o.value = JSON.stringify({c: mo.c, v: mo.v}); o.text = mo.n; modSel.appendChild(o);
            });
        }
        izracunaj();
    }

    function izracunaj() {
        const modelData = document.getElementById("modelSel").value;
        if(!modelData) { document.getElementById("rezultat").innerText = "0 RSD"; document.getElementById("vreme").innerText = "-- min"; return; }
        const data = JSON.parse(modelData);
        let s = document.getElementById("spolja").checked, u = document.getElementById("unutra").checked;
        let f = 0, v = 0;
        if(s) { f += 0.5; v += Math.round(data.v * 0.35); }
        if(u) { f += 0.5; v += Math.round(data.v * 0.65); }
        document.getElementById("rezultat").innerText = Math.round(data.c * f).toLocaleString() + " RSD";
        document.getElementById("vreme").innerText = v > 0 ? "Procenjeno vreme: ~" + v + " min" : "-- min";
    }

    function zakazi() {
        const m = document.getElementById("markaSel").value;
        const modEl = document.getElementById("modelSel");
        if(modEl.selectedIndex <= 0) { alert("Odaberi auto!"); return; }
        const cena = document.getElementById("rezultat").innerText;
        const info = encodeURIComponent(`${m} ${modEl.options[modEl.selectedIndex].text}`);
        window.open(`https://docs.google.com/forms/d/e/1FAIpQLSe1ZLTC1otAYCUCuvvZgsE8fOmNQR9JygNXWfyhfViyzA7LeQ/viewform?usp=pp_url&entry.345073777=${info}&entry.988818818=${encodeURIComponent(cena)}`, '_blank');
    }

    inicijalizuj();
</script>

</body>
</html>
