<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORICA Auto Nega | Premium Detailing</title>
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f1c40f;
            --black: #050505;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://upload.wikimedia.org/wikipedia/commons/thumb/5/52/Hram_Svetog_Save_no%C4%87u.jpg/1200px-Hram_Svetog_Save_no%C4%87u.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: rgba(20, 20, 20, 0.85);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            width: 100%;
            max-width: 420px;
            text-align: center;
            backdrop-filter: blur(15px); /* Efekat zamućenog stakla */
        }

        .logo-area { margin-bottom: 30px; }
        h1 { 
            color: var(--gold); 
            margin: 0; 
            font-size: 38px; 
            letter-spacing: 6px; 
            font-weight: 800;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        .subtitle { 
            color: #ccc; 
            font-size: 13px; 
            letter-spacing: 4px; 
            text-transform: uppercase;
            margin-top: 5px;
        }

        .group { text-align: left; margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; color: var(--gold); font-size: 13px; font-weight: 600; text-transform: uppercase; }

        select {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #444;
            color: #fff;
            border-radius: 12px;
            outline: none;
            font-size: 15px;
            transition: all 0.3s;
        }

        select:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }

        .price-container {
            background: rgba(212, 175, 55, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin: 30px 0;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .price-label { font-size: 12px; color: #bbb; text-transform: uppercase; margin-bottom: 5px; }
        .price-tag {
            font-size: 44px;
            font-weight: 700;
            color: var(--gold);
            margin: 0;
            text-shadow: 0 2px 15px rgba(212, 175, 55, 0.3);
        }

        .order-btn {
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: black;
            border: none;
            padding: 20px;
            width: 100%;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .order-btn:hover {
            transform: translateY(-3px);
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.3);
        }

        .info-text { font-size: 11px; color: #999; margin-top: 20px; line-height: 1.6; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
    <div class="logo-area">
        <h1>KORICA</h1>
        <div class="subtitle">Auto Nega Sremčica</div>
    </div>

    <div class="group">
        <label>Kategorija vozila</label>
        <select id="auto">
            <option value="0" disabled selected>Izaberi vozilo...</option>
            <option value="1800">Malo vozilo (Polo, Corsa...)</option>
            <option value="2000">Srednje vozilo (Golf, Astra...)</option>
            <option value="2300">Limuzina/Karavan (Passat, BMW 5...)</option>
            <option value="2600">Džip/SUV (X5, Tiguan...)</option>
            <option value="3200">Kombi / Lux vozila</option>
        </select>
    </div>

    <div class="group">
        <label>Izbor tretmana</label>
        <select id="tretman">
            <option value="1">Standard (Pranje + Usisavanje)</option>
            <option value="1.5">Premium (Vax + Detalji)</option>
            <option value="2.5">Deep Clean (Dubinsko pranje)</option>
        </select>
    </div>

    <div class="price-container">
        <div class="price-label">Procenjena cena</div>
        <div class="price-tag" id="displayCena">0 RSD</div>
    </div>

    <button class="order-btn" onclick="zakazi()">Rezerviši tretman</button>
    
    <div class="info-text">
        Cena je informativnog karaktera.<br>
        Lokacija: Sremčica, Beograd.
    </div>
</div>

<script>
    const autoEl = document.getElementById('auto');
    const tretmanEl = document.getElementById('tretman');
    const display = document.getElementById('displayCena');

    function osveziCenu() {
        const baza = parseInt(autoEl.value);
        const mnozilac = parseFloat(tretmanEl.value);
        if (baza > 0) {
            const ukupno = baza * mnozilac;
            display.innerText = ukupno.toLocaleString() + " RSD";
        }
    }

    autoEl.addEventListener('change', osveziCenu);
    tretmanEl.addEventListener('change', osveziCenu);

    function zakazi() {
        const cena = display.innerText;
        const model = autoEl.options[autoEl.selectedIndex].text;

        if (cena === "0 RSD" || autoEl.value === "0") {
            alert("Molimo Vas da prvo izaberete kategoriju vozila.");
            return;
        }

        const baseURL = "https://docs.google.com/forms/d/e/1FAIpQLSe1ZLTC1otAYCUCuvvZgsE8fOmNQR9JygNXWfyhfViyzA7LeQ/viewform?usp=pp_url";
        const finalURL = `${baseURL}&entry.345073777=${encodeURIComponent(model)}&entry.988818818=${encodeURIComponent(cena)}`;
        
        window.open(finalURL, '_blank');
    }
</script>

</body>
</html>
