<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Korica Auto Nega | Sinonim kvaliteta</title>
    <style>
        :root { --gold: #d4af37; --black: #000; --dark: #0a0a0a; --grey: #151515; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        
        body { background: var(--black); color: white; padding-bottom: 50px; }

        /* GLAVNI NATPIS - BRENDIRANJE */
        .header {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #1a1a1a, var(--black));
            border-bottom: 2px solid var(--gold);
        }
        .header h1 { 
            font-size: 28px; 
            letter-spacing: 4px; 
            color: var(--gold); 
            text-transform: uppercase; 
            font-weight: 900;
            line-height: 1.2;
        }
        .header .brand-subtitle { 
            font-size: 16px; 
            letter-spacing: 2px; 
            color: #fff; 
            text-transform: uppercase; 
            margin-top: 5px;
            font-weight: 400;
        }
        .header .slogan { 
            font-size: 12px; 
            letter-spacing: 5px; 
            color: var(--gold); 
            text-transform: uppercase; 
            margin-top: 15px;
            opacity: 0.9;
            font-style: italic;
        }

        /* Ostatak stila za kalkulator */
        .container { max-width: 450px; margin: 0 auto; padding: 25px; }
        .label-text { display: block; color: #555; font-size: 10px; text-transform: uppercase; margin: 20px 0 10px 0; font-weight: bold; letter-spacing: 1px; }
        select { width: 100%; padding: 18px; background: var(--grey); color: white; border: 1px solid #222; border-radius: 8px; font-size: 16px; outline: none; appearance: none; }
        .option-card { background: var(--grey); border: 1px solid #222; padding: 22px; border-radius: 10px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; transition: 0.3s; cursor: pointer; }
        .option-card.active { border-color: var(--gold); background: #1a160a; }
        .option-card span { font-weight: bold; text-transform: uppercase; font-size: 13px; color: #888; }
        .option-card.active span { color: var(--gold); }
        input[type="checkbox"] { width: 24px; height: 24px; accent-color: var(--gold); }
        .quality-alert { background: #1a160a; border: 1px solid var(--gold); padding: 15px; border-radius: 8px; margin: 20px 0; display: none; font-size: 13px; color: var(--gold); text-align: center; }
        .result-box { margin-top: 30px; padding: 30px; background: var(--grey); border-radius: 15px; text-align: center; display: none; border-top: 4px solid var(--gold); }
        .price { font-size: 48px; color: var(--gold); font-weight: 900; display: block; }
        .call-now { display: block; width: 100%; padding: 20px; background: var(--gold); color: black; text-align: center; text-decoration: none; font-weight: 900; border-radius: 8px; margin-top: 25px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Korica Auto Nega</h1>
        <div class="brand-subtitle">Profesionalna Estetika</div>
        <div class="slogan">Sinonim kvaliteta</div>
    </div>

    <div class="container">
        <label class="label-text">Izbor vozila</label>
        <select id="brand" onchange="loadModels()">
            <option value="" disabled selected>Brend...</option>
        </select>
        <select id="model" onchange="calculate()" style="margin-top: 10px;">
            <option value="" disabled selected>Model...</option>
        </select>

        <label class="label-text">Usluge</label>
        <div class="option-card" id="card-spolja" onclick="toggleOption('spolja')">
            <span>Spoljašnje pranje (Koch-Chemie)</span>
            <input type="checkbox" id="check-spolja" onchange="calculate()" onclick="event.stopPropagation()">
        </div>

        <div class="option-card" id="card-unutra" onclick="toggleOption('unutra')">
            <span>Unutrašnje održavanje</span>
            <input type="checkbox" id="check-unutra" onchange="calculate()" onclick="event.stopPropagation()">
        </div>

        <div id="quality-msg" class="quality-alert">
            Uz samostalno spoljašnje pranje, obavezna je Koch-Chemie zaštita (+100 RSD).
        </div>

        <div class="result-box" id="results">
            <span style="font-size: 10px; color: #555; letter-spacing: 2px;">PROCENA</span>
            <span class="price" id="res-price">0 RSD</span>
            <a href="tel:+38160000000" class="call-now">Zakaži termin</a>
        </div>
    </div>

<script>
    // Isti JS kod kao malopre, on drži bazu i računicu
    const vehicleDB = {
        "Audi": ["A3|1.1|1.1", "A4|1.25|1.25", "A6|1.45|1.45", "Q7|1.8|2.2"],
        "BMW": ["Serija 3|1.2|1.2", "Serija 5|1.45|1.45", "X5|1.8|2.1"],
        "Mercedes-Benz": ["C-Klasa|1.25|1.25", "E-Klasa|1.5|1.5", "GLE|1.8|2.1"],
        "Volkswagen": ["Golf|1.1|1.1", "Passat|1.35|1.35", "Tiguan|1.5|1.6"]
    };

    const BAZA_SPOLJA = 900;
    const BAZA_UNUTRA = 800;

    (function init() {
        const s = document.getElementById('brand');
        Object.keys(vehicleDB).sort().forEach(m => {
            let o = document.createElement('option');
            o.value = m; o.textContent = m;
            s.appendChild(o);
        });
    })();

    function loadModels() {
        const b = document.getElementById('brand').value;
        const s = document.getElementById('model');
        s.innerHTML = '<option value="" disabled selected>Model...</option>';
        vehicleDB[b].forEach((v, i) => {
            let o = document.createElement('option');
            o.value = i; o.textContent = v.split('|')[0];
            s.appendChild(o);
        });
    }

    function toggleOption(id) {
        const cb = document.getElementById('check-' + id);
        cb.checked = !cb.checked;
        calculate();
    }

    function calculate() {
        const b = document.getElementById('brand').value;
        const mi = document.getElementById('model').value;
        const isS = document.getElementById('check-spolja').checked;
        const isU = document.getElementById('check-unutra').checked;

        document.getElementById('card-spolja').className = isS ? 'option-card active' : 'option-card';
        document.getElementById('card-unutra').className = isU ? 'option-card active' : 'option-card';

        if(!b || mi === "" || (!isS && !isU)) {
            document.getElementById('results').style.display = 'none';
            document.getElementById('quality-msg').style.display = 'none';
            return;
        }

        const podaci = vehicleDB[b][mi].split('|');
        let total = 0;
        if(isS) total += BAZA_SPOLJA * parseFloat(podaci[1]);
        if(isU) total += BAZA_UNUTRA * parseFloat(podaci[2]);

        if(isS && !isU) {
            total += 100;
            document.getElementById('quality-msg').style.display = 'block';
        } else {
            document.getElementById('quality-msg').style.display = 'none';
        }

        document.getElementById('res-price').innerText = (Math.ceil(total / 50) * 50) + " RSD";
        document.getElementById('results').style.display = "block";
    }
</script>
</body>
</html>
